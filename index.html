<script>
const SUPABASE_URL="https://matuflemwleglsrzrlkp.supabase.co";
const SUPABASE_KEY="sb_publishable_D1z2s-S-GrnWH9u9D8P1nA_H3T9W7hF";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const URL_PARAMS=new URLSearchParams(location.search);
const INITIAL_CLIENT=(URL_PARAMS.get("client")||URL_PARAMS.get("clientId")||"").trim().toLowerCase();
const WORKOUT_OFFSETS=[0,2,4,5,7,9];
const MEASUREMENTS=[
  ["waga","Waga","kg"],["udo","Udo","cm"],["dupa","Dupa","cm"],["brzuch","Brzuch","cm"],
  ["klatka","Klatka","cm"],["biceps","Biceps","cm"],["szyja","Szyja","cm"]
];
const app={
  athletes:[],athlete:null,plan:null,links:[],trainings:[],trainingExercises:[],blocks:[],
  progressionExercises:[],progressionSets:[],weekNotes:[],sessions:[],setLogs:[],measurements:[],
  sourcePlanKey:null,view:"train",mode:"calendar",activeSessionId:null,exerciseIndex:0,previewWeek:1,
  draft:{logs:{},skips:{},sessionNotes:{},measurements:{},modeOverrides:{}},
  status:"Ładowanie Supabase…",statusKind:"loading"
};
function $(id){return document.getElementById(id)}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function todayISO(){return new Date().toISOString().slice(0,10)}
function addDays(iso,days){const d=new Date(`${iso}T00:00:00`);d.setDate(d.getDate()+Number(days||0));return d.toISOString().slice(0,10)}
function dateLabel(iso){if(!iso)return"-";return String(iso).slice(5,10).replace("-",".")}
function nullableNumber(v){const text=String(v??"").trim().replace(",",".");return /^-?\d+(?:\.\d+)?$/.test(text)?Number(text):null}
function money(v){if(v===null||v===undefined||v==="")return"";return Number(v).toLocaleString("pl-PL",{maximumFractionDigits:2})}
function norm(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/ł/g,"l").trim()}
function setStatus(text,kind="loading"){app.status=text;app.statusKind=kind;const el=$("apiStatus");if(el){el.textContent=text;el.className=`api ${kind}`}}
function showToast(text){const el=$("toast");el.textContent=text;el.classList.remove("hidden");clearTimeout(showToast.t);showToast.t=setTimeout(()=>el.classList.add("hidden"),2600)}
function showFatalError(err){
  const msg=err?.message||String(err||"Błąd aplikacji");
  console.error(err);
  setStatus(msg,"err");
  showToast(msg);
  const view=$("view");
  if(view&&!app.plan)view.innerHTML=`<section class="card"><div class="empty">${esc(msg)}</div></section>`;
}
window.addEventListener("error",event=>showFatalError(event.error||event.message));
window.addEventListener("unhandledrejection",event=>showFatalError(event.reason));
function storageKey(){return app.athlete&&app.plan?`monkey_supabase_v03__${app.athlete.id}__${app.plan.id}`:"monkey_supabase_v03"}
function loadDraft(){try{app.draft={logs:{},skips:{},sessionNotes:{},measurements:{},modeOverrides:{},...(JSON.parse(localStorage.getItem(storageKey())||"{}"))}}catch{app.draft={logs:{},skips:{},sessionNotes:{},measurements:{},modeOverrides:{}}}}
function saveDraft(){if(app.athlete&&app.plan)localStorage.setItem(storageKey(),JSON.stringify(app.draft))}
async function init(){
  try{
    setStatus("Ładowanie podopiecznych…","loading");
    await loadAthletes();
    if(INITIAL_CLIENT&&app.athletes.some(a=>String(a.client_key||"").trim().toLowerCase()===INITIAL_CLIENT))await selectAthlete(INITIAL_CLIENT,false);
    else{setStatus("Wybierz podopiecznego","ok");render()}
  }catch(err){console.error(err);setStatus(err.message||"Błąd ładowania","err");render()}
}
async function loadAthletes(){
  const {data,error}=await sb.from("athletes").select("id,client_key,name,status,notes").order("name");
  if(error)throw error;
  app.athletes=(data||[]).filter(a=>a.status!=="archived");
}
async function selectAthlete(clientKey,updateUrl=true){
  const key=String(clientKey||"").trim().toLowerCase();
  const athlete=app.athletes.find(a=>String(a.client_key||"").trim().toLowerCase()===key);
  if(!athlete)throw new Error("Nie znaleziono podopiecznego");
  app.athlete=athlete;app.view="train";app.mode="calendar";app.activeSessionId=null;app.exerciseIndex=0;
  if(updateUrl)history.replaceState(null,"",`${location.pathname}?client=${encodeURIComponent(athlete.client_key)}`);
  setStatus(`Ładowanie planu: ${athlete.name}`,"loading");render();
  await loadAthletePlan();
}
async function loadAthletePlan(){
  const {data,error}=await sb.from("plan_athletes")
    .select("plan_id,assigned_at,plans(id,slug,name,start_date,weeks,status,notes,created_at,published_at)")
    .eq("athlete_id",app.athlete.id)
    .order("assigned_at",{ascending:false});
  if(error)throw error;
  app.links=data||[];
  const active=app.links.find(l=>l.plans?.status==="active")||app.links[0];
  if(!active?.plans)throw new Error("Podopieczny nie ma przypisanego planu");
  app.plan=active.plans;
  await loadPlanBundle();
}
async function loadPlanBundle(){
  const planId=app.plan.id, athleteId=app.athlete.id;
  const [tr,blocks,sessions,measurements]=await Promise.all([
    sb.from("trainings").select("id,plan_id,name,focus,order_index").eq("plan_id",planId).order("order_index"),
    sb.from("progression_blocks").select("id,plan_id,name,block_index,start_week,end_week,notes").eq("plan_id",planId).order("block_index"),
    sb.from("workout_sessions").select("id,athlete_id,plan_id,source_plan_key,client_key,session_id,workout_date,performed_date,week_number,workout_id,workout_name,status,completed_exercises,total_exercises,session_note,recorded_at").eq("athlete_id",athleteId).eq("plan_id",planId).order("workout_date",{ascending:false}),
    sb.from("athlete_measurements").select("id,athlete_id,plan_id,source_plan_key,client_key,measurement_date,week_number,waga,udo,dupa,brzuch,klatka,biceps,szyja,recorded_at").eq("athlete_id",athleteId).eq("plan_id",planId).order("measurement_date",{ascending:false})
  ]);
  for(const res of [tr,blocks,sessions,measurements])if(res.error)throw res.error;
  app.trainings=tr.data||[];app.blocks=blocks.data||[];app.sessions=sessions.data||[];app.measurements=measurements.data||[];
  app.sourcePlanKey=app.sessions.find(s=>s.source_plan_key)?.source_plan_key||app.plan.slug;
  const trainingIds=app.trainings.map(t=>t.id);
  app.trainingExercises=[];
  if(trainingIds.length){
    const te=await sb.from("training_exercises").select("id,training_id,exercise_id,exercise_no,order_index,sets_text,reps_text,rest_text,weight,load_text,tempo_text,use_wg,progression_mode,superset_key,mode,notes,exercises(id,name,youtube_url)").in("training_id",trainingIds).order("order_index");
    if(te.error)throw te.error;
    app.trainingExercises=te.data||[];
  }
  const blockIds=app.blocks.map(b=>b.id);
  app.progressionExercises=[];app.progressionSets=[];app.weekNotes=[];
  if(blockIds.length){
    const [pe,wn]=await Promise.all([
      sb.from("progression_exercises").select("id,block_id,exercise_id,training_exercise_id,order_index,source_name,exercises(id,name)").in("block_id",blockIds).order("order_index"),
      sb.from("progression_week_notes").select("id,block_id,week_number,notes").in("block_id",blockIds).order("week_number")
    ]);
    if(pe.error)throw pe.error;if(wn.error)throw wn.error;
    app.progressionExercises=pe.data||[];app.weekNotes=wn.data||[];
    const peIds=app.progressionExercises.map(x=>x.id);
    if(peIds.length){
      const ps=await sb.from("progression_sets").select("id,progression_exercise_id,week_number,set_no,label,reps_text,kg,raw_text,load_text,set_count,is_skip,is_deload,rest_text,notes").in("progression_exercise_id",peIds).order("week_number");
      if(ps.error)throw ps.error;
      app.progressionSets=ps.data||[];
    }
  }
  app.setLogs=[];
  const sessionIds=app.sessions.map(s=>s.id);
  if(sessionIds.length){
    const logs=await sb.from("workout_set_logs").select("id,workout_session_id,athlete_id,plan_id,source_plan_key,client_key,session_id,exercise_no,exercise_name,set_no,planned_label,kg,reps_text,rpe,done,note,recorded_at").in("workout_session_id",sessionIds).order("session_id").order("set_no");
    if(logs.error)throw logs.error;
    app.setLogs=logs.data||[];
  }
  loadDraft();
  const next=nextPendingSession();
  app.activeSessionId=next?.id||schedule()[0]?.id||null;
  app.previewWeek=next?.week||Math.min(Number(app.plan.weeks)||1,firstGeneratedWeek());
  setStatus(`Połączono · ${app.athlete.name} · ${app.plan.name}`,"ok");
  render();
}
function workouts(){return app.trainings.map((t,i)=>({num:String(i+1),...t,exercises:app.trainingExercises.filter(r=>r.training_id===t.id).sort((a,b)=>(a.order_index||0)-(b.order_index||0))}))}
function workoutByNum(num){return workouts().find(w=>String(w.num)===String(num))||workouts()[0]}
function sessionMap(){return new Map(app.sessions.map(s=>[s.session_id,s]))}
function maxDbWeek(){return app.sessions.reduce((m,s)=>Math.max(m,Number(s.week_number)||0),0)}
function firstGeneratedWeek(){
  const max=maxDbWeek();
  if(!max)return 1;
  const candidate=max+1;
  const containing=app.blocks.filter(b=>Number(b.start_week)<=candidate&&Number(b.end_week)>=candidate).sort((a,b)=>Number(b.start_week)-Number(a.start_week))[0];
  if(containing)return Number(containing.start_week)||candidate;
  const future=app.blocks.filter(b=>Number(b.start_week)>max).sort((a,b)=>Number(a.start_week)-Number(b.start_week))[0];
  return future?Number(future.start_week):candidate;
}
function nominalDateFor(week,num){return addDays(app.plan.start_date||todayISO(),(Number(week)-1)*7+(WORKOUT_OFFSETS[Number(num)-1]??((Number(num)-1)*2)))}
function schedule(){
  if(!app.plan)return[];
  const map=sessionMap(), generatedStart=firstGeneratedWeek(), out=[];
  for(const s of app.sessions){
    if(Number(s.week_number)<generatedStart)out.push(sessionFromDb(s));
  }
  for(let week=generatedStart;week<=Number(app.plan.weeks||1);week++){
    for(const w of workouts()){
      const id=`W${week}T${w.num}`;
      const db=map.get(id);
      out.push(db?sessionFromDb(db):{id,week,workoutNum:w.num,workoutId:w.num,workoutName:w.name,date:nominalDateFor(week,w.num),nominalDate:nominalDateFor(week,w.num),db:null});
    }
  }
  const seen=new Set(out.map(s=>s.id));
  for(const s of app.sessions){if(!seen.has(s.session_id))out.push(sessionFromDb(s))}
  return out.sort((a,b)=>(a.week-b.week)||Number(a.workoutNum)-Number(b.workoutNum)||String(a.date).localeCompare(String(b.date)));
}

function setMeasurement(col,value){const key=todayISO();app.draft.measurements[key]=app.draft.measurements[key]||{};app.draft.measurements[key][col]=value;saveDraft()}
async function saveMeasurements(){
  const date=todayISO(),vals=app.draft.measurements[date]||{},week=nextPendingSession()?.week||currentSession()?.week||1;
  const payload={athlete_id:app.athlete.id,plan_id:app.plan.id,source_plan_key:app.sourcePlanKey,client_key:app.athlete.client_key,measurement_date:date,week_number:week,recorded_at:new Date().toISOString()};
  for(const [col] of MEASUREMENTS)payload[col]=nullableNumber(vals[col]);
  try{
    const {error}=await sb.from("athlete_measurements").upsert(payload,{onConflict:"athlete_id,source_plan_key,measurement_date"});
    if(error)throw error;
    delete app.draft.measurements[date];saveDraft();await loadPlanBundle();showToast("Pomiary zapisane w Supabase");
  }catch(err){console.error(err);showToast("Nie udało się zapisać pomiarów")}
}
function measurementHistoryHTML(){
  if(!app.measurements.length)return`<div class="empty">Brak pomiarów dla tego planu.</div>`;
  return `<div class="historyTable"><table><thead><tr><th>Data</th><th>Tydz.</th>${MEASUREMENTS.map(([,label])=>`<th>${label}</th>`).join("")}</tr></thead><tbody>${app.measurements.map(r=>`<tr><td>${esc(r.measurement_date)}</td><td>${esc(r.week_number||"-")}</td>${MEASUREMENTS.map(([col])=>`<td>${esc(r[col]??"-")}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
}
function renderHistory(){
  const rows=[...app.sessions].sort((a,b)=>String(b.workout_date||"").localeCompare(String(a.workout_date||"")));
  $("view").innerHTML=`<section class="card"><h2>Log treningowy</h2><div class="subtitle" style="margin-bottom:12px">${rows.length} treningów zapisanych w Supabase</div>${rows.length?`<div class="list">${rows.map(historySessionHTML).join("")}</div>`:`<div class="empty">Brak zapisanych treningów.</div>`}</section>`;
}
function historySessionHTML(s){
  const logs=app.setLogs.filter(l=>l.workout_session_id===s.id),exCount=new Set(logs.map(l=>`${l.exercise_no}|${l.exercise_name}`)).size;
  return `<button class="item planButton" onclick="setSession('${esc(s.session_id)}')"><strong>${esc(s.workout_name)} · tydz. ${esc(s.week_number)}</strong><div class="subtitle">${esc(s.performed_date||s.workout_date)} · ${esc(s.status)} · ${exCount} ćwiczeń · ${logs.filter(l=>l.done).length} serii</div></button>`;
}
function renderClient(){
  const st=currentPlanStats();
  $("view").innerHTML=`<section class="card"><h2>${esc(app.athlete.name)}</h2><div class="subtitle">${esc(app.athlete.client_key)} · ${esc(app.athlete.status||"active")}</div><div class="metaGrid"><div class="metaBox"><small>Plan</small><strong>${esc(app.plan.name)}</strong></div><div class="metaBox"><small>Start</small><strong>${esc(app.plan.start_date)}</strong></div><div class="metaBox"><small>Postęp</small><strong>${st.done}/${st.total}</strong></div><div class="metaBox"><small>Źródło</small><strong>Supabase</strong></div></div><button class="btn secondary full" onclick="changeClient()">Zmień podopiecznego</button></section><section class="card" style="margin-top:12px"><h2>Przypisane plany</h2><div class="list">${app.links.map(l=>`<div class="item ${l.plan_id===app.plan.id?"activePlan":""}"><strong>${esc(l.plans?.name||l.plan_id)}</strong><div class="subtitle">${esc(l.plans?.status||"")} · ${esc(l.plans?.start_date||"-")}</div></div>`).join("")}</div></section>`;
}
function changeClient(){app.athlete=null;app.plan=null;history.replaceState(null,"",location.pathname);render()}
function scrollToTop(){requestAnimationFrame(()=>scrollTo({top:0,behavior:"smooth"}))}
async function reloadCurrent(){setStatus("Odświeżanie…","loading");render();await loadPlanBundle()}
init();
</script>


</body></html>
