<script>
const FRONTEND_VERSION="v0.2.5-supabase";

const SUPABASE_KEY="sb_publishable_D1z2s-S-GrnWH9u9D8P1nA_H3T9W7hF";

}
if(!window.supabase||!window.supabase.createClient){

  renderClientSelector();

}

async function renderClientSelector(){

  document.body.innerHTML = `
  <style>
    body{
      display:flex;

      margin:0 0 8px;

    .selector p{

      margin-bottom:20px;

    }

    .clientBtn{
      width:100%;
      margin-bottom:12px;
      border:1px solid #303030;
      background:#202020;
      color:#f4f4f5;
      border-radius:20px;
      padding:18px;
      text-align:left;
      font-size:18px;
      font-weight:800;
      cursor:pointer;
    }

    .clientBtn small{
      display:block;
      margin-top:4px;
      color:#a1a1aa;
      font-size:13px;
      font-weight:500;
    }
  </style>

  <div class="selector">
    <div class="eyebrow">MonkeyPanel</div>
    <h1>Wybierz podopiecznego</h1>
    <p>Wspólny frontend. Plan i logi dobierane dynamicznie z Supabase.</p>

  try{
      const {data,error}=await sb.from("athletes").select("client_key,name,status").order("name");
      if(error)throw error;
      const clients = (data || []).filter(c=>c.status!=="archived");

      document.getElementById('clientList').innerHTML =
        clients.map(c => `
          <button class="clientBtn"
            onclick="location.href='?client=${encodeURIComponent(c.client_key)}'">

            ${esc(c.name || c.client_key)}

            <small>
              ${esc(c.client_key)} · ${esc(c.status || 'active')}

          </button>
        `).join('') || '<div style="color:#a1a1aa">Brak aktywnych podopiecznych.</div>';
  }catch(err){

      document.getElementById('clientList').innerHTML =
        '<div style="color:#fca5a5">Błąd ładowania klientów<br><br>' +
        esc(err.message || err) +
        '</div>';
  }
}

const STATE_KEY=`monkeypanel.alpha.v04.${CLIENT_ID}`;
let START_DATE="2026-05-12";let TOTAL_WEEKS=11;let DAYS=[{dow:"wt.",workoutId:1,offset:0},{dow:"czw.",workoutId:2,offset:2},{dow:"sob.",workoutId:3,offset:4},{dow:"ndz.",workoutId:4,offset:5}];
const MEASUREMENTS=["Udo","Dupa","Brzuch","Klatka","Biceps","Szyja","Waga"];
let PLAN=[{id:1,name:"1 TRENING",focus:"",exercises:[]},{id:2,name:"2 TRENING",focus:"",exercises:[]},{id:3,name:"3 TRENING",focus:"",exercises:[]},{id:4,name:"4 TRENING",focus:"",exercises:[]}];let VIDEOS={};let RPE=[["10","Maksimum. Więcej nie dasz rady.","0"],["9","Bardzo ciężko, ale jedno powtórzenie jeszcze da się zrobić.","1"],["8","Mocno, ale kontrolujesz. 2 powtórzenia w zapasie.","2"],["7","Średnio ciężko. 3 powtórzenia w zapasie.","3"],["6","Lekko.","4+"]];
let CURRENT_PLAN={planId:"loading",planName:"Ładowanie planu",planStatus:"active"};
let state=load(STATE_KEY,{view:"train",mode:"calendar",activeSessionId:null,workoutId:1,week:1,exerciseIndex:0,logs:{},skips:{},serverStatus:{},measurements:{},notes:{},sessionNotes:{},videoOpen:{},modeOverrides:{},planArchive:{},selectedPlanId:null});state.modeOverrides=state.modeOverrides||{};let apiStatus="Ładowanie planu…",apiStatusKind="loading";
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}}function save(){localStorage.setItem(STATE_KEY,JSON.stringify(state))}function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function scrollToExerciseTop(){requestAnimationFrame(()=>{window.scrollTo({top:0,behavior:"smooth"})})}
window.addEventListener("beforeunload",e=>{if(hasActiveDraft()){e.preventDefault();e.returnValue=""}});
function hasActiveDraft(){if(state.mode!=="session")return false;const sess=currentSession();if(sessionDone(sess))return false;const prefix=sessionKey(sess)+"__E";return Object.keys(state.logs||{}).some(k=>k.startsWith(prefix)&&Array.isArray(state.logs[k])&&state.logs[k].some(s=>s.kg||s.reps||s.rpe||s.done||s.freeNote)) || Object.keys(state.skips||{}).some(k=>k.startsWith(prefix)) || !!state.sessionNotes?.[sessionKey(sess)]}
function dateObj(iso){const[y,m,d]=iso.split("-").map(Number);return new Date(y,m-1,d)}function isoDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}function addDays(iso,days){const d=dateObj(iso);d.setDate(d.getDate()+days);return isoDate(d)}function todayKey(){const d=new Date();return isoDate(d)}function dateLabel(iso){if(!iso)return"-";return dateObj(iso).toLocaleDateString("pl-PL",{day:"2-digit",month:"2-digit"})}
function planId(){return CURRENT_PLAN.planId||"unknown_plan"}
function sourcePlanKey(){return CURRENT_PLAN.sourcePlanKey||CURRENT_PLAN.planId||"unknown_plan"}
function planKey(k){return `${planId()}__${k}`}
function nominalDateFor(week,workoutId){const d=DAYS.find(x=>Number(x.workoutId)===Number(workoutId))||DAYS[0];return addDays(START_DATE,(week-1)*7+(d?d.offset:0))}
function dbSlotKey(s){const week=Number(s.week_number||s.week)||1,workoutId=Number(s.workout_id||s.workoutId)||1;return `${week}__${workoutId}`}
function dbSessionStamp(s){return String(s.recorded_at||s.updated_at||s.created_at||s.performed_date||s.workout_date||"")}
function dbSessionToSchedule(s){return{id:s.session_id,week:Number(s.week_number)||1,nominalDate:s.workout_date||nominalDateFor(Number(s.week_number)||1,s.workout_id||1),date:s.workout_date||s.performed_date||nominalDateFor(Number(s.week_number)||1,s.workout_id||1),workoutId:Number(s.workout_id)||1,db:s}}
function schedule(){
  const dbBySlot=new Map();
  DB_WORKOUT_SESSIONS.forEach(s=>{
    const key=dbSlotKey(s),prev=dbBySlot.get(key);
    if(!prev||dbSessionStamp(s).localeCompare(dbSessionStamp(prev))>=0)dbBySlot.set(key,s);
  });
  const out=[],usedDbSessions=new Set();
  for(let week=1;week<=TOTAL_WEEKS;week++){
    for(const d of DAYS){
      const db=dbBySlot.get(`${week}__${Number(d.workoutId)}`);
      if(db){out.push(dbSessionToSchedule(db));usedDbSessions.add(db.session_id)}
      else out.push({id:`W${week}T${d.workoutId}`,week,nominalDate:nominalDateFor(week,d.workoutId),date:nominalDateFor(week,d.workoutId),workoutId:d.workoutId});
    }
  }
  DB_WORKOUT_SESSIONS.forEach(s=>{if(!usedDbSessions.has(s.session_id))out.push(dbSessionToSchedule(s))});
  return out.sort((a,b)=>(a.week-b.week)||Number(a.workoutId)-Number(b.workoutId)||String(a.date).localeCompare(String(b.date)))
}
function workout(id=state.workoutId){return PLAN.find(w=>Number(w.id)===Number(id))||PLAN[0]}
function currentSession(){return schedule().find(s=>s.id===state.activeSessionId)||nextPendingSession()||schedule()[0]}
function exercise(){const w=workout();return w.exercises[Math.min(state.exerciseIndex,w.exercises.length-1)]||{no:"",name:"Brak ćwiczeń",sets:1,reps:"-",rest:"-",notes:"",type:""}}
function exerciseKey(ex=exercise(),sess=currentSession()){return planKey(`${sess.id}__E${ex.no}`)}
function serverSessionKey(sess=currentSession()){return planKey(`${sess.id}`)}
function serverStatusFor(sess=currentSession()){state.serverStatus=state.serverStatus||{};return state.serverStatus[serverSessionKey(sess)]||null}
function statusSaysDone(sess=currentSession()){const st=serverStatusFor(sess);return !!st&&(st.status==="done"||st.status==="done_with_skips"||String(st.status||"").toLowerCase()==="wykonany"||(Number(st.completed||0)>0&&Number(st.total||0)>0&&Number(st.completed)>=Number(st.total)))}
function sessionKey(sess=currentSession()){return planKey(`${sess.id}`)}function sessionPerformedDate(sess=currentSession()){const st=serverStatusFor(sess);return st&&(st.performedDate||st.workoutDate||String(st.timestamp||"").slice(0,10))||""}function nextPendingSession(){return schedule().find(x=>!sessionDone(x))||null}
function exerciseModeKey(ex=exercise()){return planKey(`mode__${normText(ex.name||"")}`)}
function prescriptionForCurrentWeek(ex,sess=currentSession()){const p=ex.prescriptions||{};return p[String(sess.week)]||p[sess.week]||[]}
function exerciseMode(ex=exercise(),sess=currentSession()){
  const override=state.modeOverrides?.[exerciseModeKey(ex)];
  if(override)return override;
  if(prescriptionForCurrentWeek(ex,sess).length)return "sets";
  const raw=normText([ex.name,ex.notes,ex.rest,ex.reps,ex.type].join(" "));
  if((ex.type||"")==="time"||/orbitrek|rower|bieznia|biezni|marsz|cardio|airbike|ergometr|interwal/.test(raw))return "time";
  if((ex.type||"")==="mobility"||(ex.type||"")==="warmup"||/rolowanie|rozciaganie|stretch|mobility|mobilizacja|aktywacja|cooldown|rozgrzewka/.test(raw))return "done";
  return "sets";
}
function modeLabel(mode){return mode==="time"?"Czas":mode==="done"?"Wykonane":"Serie"}
function setExerciseMode(mode){
  const ex=exercise(),key=exerciseKey(ex),current=exerciseMode(ex);
  if(current===mode)return;
  const existing=state.logs[key]||[];
  const dirty=existing.some(s=>s.kg||s.reps||s.rpe||s.done||s.freeNote);
  if(dirty&&!confirm("Zmiana trybu wyczyści wpisane dane dla tego ćwiczenia. Kontynuować?"))return;
  state.modeOverrides=state.modeOverrides||{};
  state.modeOverrides[exerciseModeKey(ex)]=mode;
  delete state.logs[key];
  save();render();
}
function countSets(ex){const mode=exerciseMode(ex);if(mode==="time"||mode==="done")return 1;const n=parseInt(String(ex.sets||"").match(/\d+/)?.[0]||"0",10);if(n>0)return n;if((ex.type||"")==="core")return 3;return 5}
function defaultSets(ex,sess=currentSession()){const mode=exerciseMode(ex,sess);const prescribed=prescriptionForCurrentWeek(ex,sess);if(mode==="sets"&&Array.isArray(prescribed)&&prescribed.length){return prescribed.map((p,i)=>({id:uid(),note:p.note||`Seria ${i+1}`,kg:String(p.kg||""),reps:String(p.reps||""),rpe:"",done:false,freeNote:""}))}if(mode==="time")return[{id:uid(),note:"Czas",kg:"",reps:"",rpe:"",done:false,freeNote:""}];if(mode==="done")return[{id:uid(),note:"Wykonane",kg:"",reps:"",rpe:"",done:false,freeNote:""}];return Array.from({length:countSets(ex)},(_,i)=>({id:uid(),note:`Seria ${i+1}`,kg:"",reps:"",rpe:"",done:false,freeNote:""}))}
function setsFor(ex=exercise(),sess=currentSession()){const key=exerciseKey(ex,sess);if(!state.logs[key])state.logs[key]=defaultSets(ex,sess);return state.logs[key]}
function existingSetsFor(ex=exercise(),sess=currentSession()){const s=state.logs?.[exerciseKey(ex,sess)];return Array.isArray(s)?s:[]}
function skipFor(ex=exercise(),sess=currentSession()){return state.skips?.[exerciseKey(ex,sess)]||null}
function exerciseSkipped(ex,sess=currentSession()){return !!skipFor(ex,sess)}
function exerciseDone(ex,sess=currentSession()){if(exerciseSkipped(ex,sess))return true;const s=existingSetsFor(ex,sess);return s.length&&s.every(x=>x.done)}
function sessionDone(sess=currentSession()){if(statusSaysDone(sess))return true;const w=workout(sess.workoutId);return w.exercises.length&&w.exercises.every(ex=>exerciseDone(ex,sess))}
function sessionProgress(sess=currentSession()){const st=serverStatusFor(sess);if(st&&Number(st.total)>0)return Math.min(100,Math.round(Number(st.completed||0)/Number(st.total)*100));const w=workout(sess.workoutId);if(!w.exercises.length)return 0;if(sessionDone(sess))return 100;return Math.round(w.exercises.filter(ex=>exerciseDone(ex,sess)).length/w.exercises.length*100)}
function sessionStatus(sess){if(sessionDone(sess))return"done";const next=nextPendingSession();return next&&next.id===sess.id?"due":"future"}
function statusLabel(s,sess){if(s==="done"){const d=sessionPerformedDate(sess);return d?`wykonany ${dateLabel(d)}`:"wykonany"}return s==="due"?"następny":"przyszły"}
function setView(v){state.view=v;if(v!=="train")state.mode="calendar";render();scrollToExerciseTop()}function setSession(sess){state.activeSessionId=sess.id;state.workoutId=sess.workoutId;state.week=sess.week;state.exerciseIndex=0;state.mode="session";state.view="train";render();scrollToExerciseTop()}function exitSession(){state.mode="calendar";render();scrollToExerciseTop()}function overallProgress(){const s=schedule();return Math.round(s.filter(x=>sessionDone(x)).length/s.length*100)}function currentPlanStats(){const s=schedule();const done=s.filter(x=>sessionDone(x)).length;const next=nextPendingSession();return{done,missed:0,total:s.length,progress:Math.round(done/s.length*100),nextWeek:next?next.week:"-",nextWorkout:next?next.workoutId:"-"}}
function rememberPlan(){const st=currentPlanStats();state.planArchive[planId()]={planId:planId(),planName:CURRENT_PLAN.planName||planId(),planStatus:CURRENT_PLAN.planStatus||"active",lastSeen:todayKey(),done:st.done,total:st.total,progress:st.progress,startDate:START_DATE};save()}
function render(){rememberPlan();save();document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===state.view));const st=document.getElementById("apiStatus");st.textContent=apiStatus;st.className=`api ${apiStatusKind}`;const sess=currentSession(),w=workout(sess.workoutId);if(state.view==="train"&&state.mode==="session")header(`${w.name} · tydzień ${sess.week}`,`Ćwiczenie ${state.exerciseIndex+1}/${Math.max(1,w.exercises.length)} · ${sessionPerformedDate(sess)?`wykonany ${dateLabel(sessionPerformedDate(sess))}`:"postęp planu"}`);else header(state.view==="plan"?"Rozpiska planu":state.view==="measure"?"Pomiary":state.view==="history"?"Log treningowy":state.view==="plans"?"Moje plany":"Postęp planu",`${CURRENT_PLAN.planName||"Plan"} · ${TOTAL_WEEKS} tygodni · start ${START_DATE}`);document.getElementById("progressBar").style.width=`${state.view==="train"&&state.mode==="session"?sessionProgress(sess):overallProgress()}%`;if(state.view==="train"&&state.mode==="calendar")renderCalendar();if(state.view==="train"&&state.mode==="session")renderSession();if(state.view==="plan")renderPlan();if(state.view==="plans")renderPlans();if(state.view==="measure")renderMeasurements();if(state.view==="history")renderHistory()}function header(t,s){document.getElementById("headerTitle").textContent=t;document.getElementById("headerSub").textContent=s}
function renderCalendar(){const s=schedule(),done=s.filter(x=>sessionStatus(x)==="done").length,next=nextPendingSession(),left=s.length-done;let html=`<div class="summary"><div class="kpi"><strong>${done}</strong><span class="subtitle">zrobione</span></div><div class="kpi"><strong>${next?`W${next.week}`:"✓"}</strong><span class="subtitle">następny tydzień</span></div><div class="kpi"><strong>${left}</strong><span class="subtitle">przed Tobą</span></div></div><div class="legend"><span>🟢 wykonany</span><span>🟡 następny logiczny krok</span><span>🔵 dalsza część planu</span></div><div class="note"><strong>Zeszyt treningowy:</strong> kafelki pokazują postęp w planie, nie sztywny kalendarz. Data pojawia się dopiero po wykonaniu treningu. Start planu służy tylko do orientacji i raportów: ${esc(START_DATE)}.</div><div class="calendar">`;for(let week=1;week<=TOTAL_WEEKS;week++){const items=s.filter(x=>x.week===week);html+=`<section class="weekCard"><div class="weekHead"><strong>Tydzień ${week}</strong><span class="subtitle">${items.filter(x=>sessionDone(x)).length}/${items.length} wykonane</span></div><div class="days">`;for(const it of items){const st=sessionStatus(it),prog=sessionProgress(it),wo=workout(it.workoutId),performed=sessionPerformedDate(it);html+=`<button class="dayBtn status-${st}" onclick='setSession(${JSON.stringify(it)})'><div class="date">${performed?`wykonany ${dateLabel(performed)}`:`${st==="due"?"następny":"do zrobienia"}`}</div><div class="name">${wo.name.replace(" TRENING","")}</div><div class="subtitle">Tydz. ${it.week} · ${statusLabel(st,it)}</div><div class="bar"><div style="width:${prog}%"></div></div><div class="subtitle">${prog}%</div></button>`}html+=`</div></section>`}document.getElementById("view").innerHTML=html+`</div>`}
function renderSession(){const sess=currentSession(),w=workout(),ex=exercise(),mode=exerciseMode(ex,sess),sets=setsFor(ex),skipped=skipFor(ex,sess);if(sessionDone(sess)){document.getElementById("view").innerHTML=finishHTML(sess);return}document.getElementById("view").innerHTML=`<section class="card"><div class="exerciseNav"><button class="btn secondary" onclick="exitSession()">← Kalendarz</button><button class="btn secondary navMini" onclick="prevExercise()" ${state.exerciseIndex===0?"disabled":""}>‹</button><button class="btn secondary navMini" onclick="nextExercise()" ${state.exerciseIndex>=w.exercises.length-1?"disabled":""}>›</button></div><div class="exerciseTop"><div><div class="subtitle">Ćwiczenie ${state.exerciseIndex+1}/${w.exercises.length}</div><div class="exercise-title">${esc(ex.name)}</div></div><span class="pill">${modeLabel(mode)}</span></div><div class="exerciseProgress">${w.exercises.map((e,i)=>`<div class="dot ${exerciseDone(e)?"done":i===state.exerciseIndex?"current":""}"></div>`).join("")}</div><div class="stats"><div class="stat"><small>Tryb</small><strong>${modeLabel(mode)}</strong></div><div class="stat"><small>Plan</small><strong>${esc(ex.sets||"-")}</strong></div><div class="stat"><small>Reps/czas</small><strong>${esc(ex.reps||"-")}</strong></div></div>${modeSwitchHTML(mode)}${videoBlock(ex.name)}<div class="note"><strong>Uwagi trenera</strong><br>${esc(ex.notes||"Brak uwag")}</div>${skipped?`<div class="note" style="border:1px solid #92400e"><strong>Ćwiczenie pominięte</strong><br>${esc(skipped.reason)}</div>`:mode==="time"?timeHTML(sets[0]):mode==="done"?doneHTML(sets[0]):sets.map((s,i)=>setHTML(s,i,sets)).join("")}${mode==="sets"&&!skipped?`<div class="actions"><button class="btn secondary" onclick="addSet()">+ Seria</button><button class="btn secondary" onclick="removeSet()">− Usuń</button></div>`:""}<div class="actions"><button class="btn secondary" onclick="skipExercise()">Pomiń ćwiczenie</button><button class="btn secondary" onclick="unskipExercise()">Cofnij pominięcie</button></div><textarea style="margin-top:12px" placeholder="Notatka do ćwiczenia / samopoczucie" oninput="state.notes[exerciseKey()]=this.value;save()">${esc(state.notes[exerciseKey()]||"")}</textarea></section>`}
function modeSwitchHTML(mode){return `<div class="actions" style="grid-template-columns:repeat(3,1fr);margin:10px 0"><button class="btn ${mode==="sets"?"":"secondary"}" onclick="setExerciseMode('sets')">Serie</button><button class="btn ${mode==="time"?"":"secondary"}" onclick="setExerciseMode('time')">Czas</button><button class="btn ${mode==="done"?"":"secondary"}" onclick="setExerciseMode('done')">Wykonane</button></div><div class="subtitle" style="margin:4px 0 10px">Apka zgaduje tryb z planu. Jeśli zgadła źle, popraw tutaj — zapamięta wybór dla tego ćwiczenia.</div>`}
function rpeSelectHTML(s){return `<select style="width:100%;background:var(--card2);color:var(--text);border:1px solid #3a3a3a;border-radius:16px;padding:11px 6px;font-weight:850;text-align:center" onchange="updateSet('${s.id}','rpe',this.value)"><option value="">RPE</option>${[6,7,8,9,10].map(v=>`<option value="${v}" ${String(s.rpe)===String(v)?"selected":""}>${v}</option>`).join("")}</select>`}
function timeHTML(s){s=s||setsFor()[0];return `<div class="set ${s.done?"done":""}"><div class="doneCompact"><div><strong>✓ ${esc(s.note||"Czas")}</strong><div class="subtitle">${esc(s.reps||"")}${s.kg?` · poziom/opór ${esc(s.kg)}`:""}${s.rpe?` · RPE ${esc(s.rpe)}`:""}</div></div><button class="btn secondary tiny" onclick="toggleSet('${s.id}')">edytuj</button></div><div class="openSet"><div class="set-head"><span>Czas / cardio</span></div><div class="inputs"><div><label class="small">czas</label><input inputmode="text" placeholder="np. 10 min" value="${esc(s.reps||"")}" oninput="updateSet('${s.id}','reps',this.value)"></div><div><label class="small">poziom/opór</label><input inputmode="decimal" placeholder="opcjonalnie" value="${esc(s.kg||"")}" oninput="updateSet('${s.id}','kg',this.value)"></div><div><label class="small"><button class="btn secondary tiny" type="button" onclick="showRPE()">RPE?</button></label>${rpeSelectHTML(s)}</div></div><input style="margin-top:8px;font-size:14px;font-weight:500;text-align:left;padding:12px" placeholder="Notatka" value="${esc(s.freeNote||"")}" oninput="updateSet('${s.id}','freeNote',this.value)"><button class="btn good full" style="margin-top:10px" onclick="toggleSet('${s.id}')">Zalicz</button></div></div>`}
function doneHTML(s){s=s||setsFor()[0];return `<div class="set ${s.done?"done":""}"><div class="doneCompact"><div><strong>✓ Wykonane</strong><div class="subtitle">${esc(s.freeNote||"bez notatki")}</div></div><button class="btn secondary tiny" onclick="toggleSet('${s.id}')">edytuj</button></div><div class="openSet"><div class="set-head"><span>Wykonanie</span></div><textarea placeholder="Notatka opcjonalnie" oninput="updateSet('${s.id}','freeNote',this.value)">${esc(s.freeNote||"")}</textarea><button class="btn good full" style="margin-top:10px" onclick="toggleSet('${s.id}')">Zalicz ćwiczenie</button></div></div>`}
function setHTML(s,i,sets){const first=sets.findIndex(x=>!x.done),locked=i>first&&first>=0,prev=previousSetHint(i);return `<div class="set ${s.done?"done":""} ${locked?"locked":""}"><div class="doneCompact"><div><strong>✓ ${esc(s.note)}</strong><div class="subtitle">${esc(s.kg||"")} kg × ${esc(s.reps||"")} ${s.rpe?` · RPE ${esc(s.rpe)}`:""}</div></div><button class="btn secondary tiny" onclick="toggleSet('${s.id}')">edytuj</button></div><div class="openSet"><div class="set-head"><span>${esc(s.note)}</span>${locked?`<span class="subtitle">najpierw poprzednia</span>`:""}</div><div class="inputs"><div><label class="small">kg ${prev?`<span class="subtitle">ostatnio ${esc(prev)}</span>`:""}</label><input inputmode="decimal" placeholder="kg" value="${esc(s.kg)}" oninput="updateSet('${s.id}','kg',this.value)"></div><div><label class="small">reps</label><input inputmode="numeric" placeholder="reps" value="${esc(s.reps)}" oninput="updateSet('${s.id}','reps',this.value)"></div><div><label class="small"><button class="btn secondary tiny" type="button" onclick="showRPE()">RPE?</button></label><select style="width:100%;background:var(--card2);color:var(--text);border:1px solid #3a3a3a;border-radius:16px;padding:11px 6px;font-weight:850;text-align:center" value="${esc(s.rpe)}" onchange="updateSet('${s.id}','rpe',this.value)"><option value="">RPE</option>${[6,7,8,9,10].map(v=>`<option value="${v}" ${String(s.rpe)===String(v)?"selected":""}>${v}</option>`).join("")}</select></div></div><input style="margin-top:8px;font-size:14px;font-weight:500;text-align:left;padding:12px" placeholder="Notatka do serii" value="${esc(s.freeNote||"")}" oninput="updateSet('${s.id}','freeNote',this.value)"><button class="btn good full" style="margin-top:10px" onclick="toggleSet('${s.id}')">Zalicz serię</button></div></div>`}
function updateSet(id,field,value){const s=setsFor().find(x=>x.id===id);if(s)s[field]=value;save()}function previousSetHint(setIndex){const sess=currentSession(),ex=exercise();const past=schedule().filter(x=>x.workoutId===sess.workoutId&&x.date<sess.date).sort((a,b)=>b.date.localeCompare(a.date));for(const ps of past){const arr=state.logs[exerciseKey(ex,ps)];if(arr&&arr[setIndex]&&arr[setIndex].kg)return `${arr[setIndex].kg} kg${arr[setIndex].reps?`×${arr[setIndex].reps}`:""}`}return ""}function skipExercise(){const reason=prompt("Dlaczego pomijasz ćwiczenie? Wpisz krótką notatkę dla trenera.");if(!reason||!reason.trim()){showToast("Notatka jest wymagana");return}state.skips=state.skips||{};state.skips[exerciseKey()]={reason:reason.trim(),at:new Date().toISOString()};save();render()}function unskipExercise(){if(state.skips)delete state.skips[exerciseKey()];save();render()}function toggleSet(id){const sets=setsFor(),idx=sets.findIndex(x=>x.id===id),first=sets.findIndex(x=>!x.done);if(!sets[idx])return;if(!sets[idx].done&&first>=0&&idx>first)return;sets[idx].done=!sets[idx].done;render();if(sets[idx].done&&exerciseDone(exercise()))celebrateNext()}function addSet(){setsFor().push({id:uid(),note:`Seria ${setsFor().length+1}`,kg:"",reps:"",rpe:"",done:false,freeNote:""});render()}function removeSet(){const s=setsFor();if(s.length>1)s.pop();render()}function nextExercise(){const w=workout();state.exerciseIndex=Math.min(w.exercises.length-1,state.exerciseIndex+1);render();scrollToExerciseTop()}function prevExercise(){state.exerciseIndex=Math.max(0,state.exerciseIndex-1);render();scrollToExerciseTop()}
function celebrateNext(){const w=workout();if(state.exerciseIndex>=w.exercises.length-1){showCelebration("🍌🍌🍌","Dobra robota!","Trening wykonany.",1850,()=>{render();scrollToExerciseTop()});return}const next=w.exercises[state.exerciseIndex+1];showCelebration("🍌","Ćwiczenie zrobione!",`Za chwilę: ${next.name}`,1550,()=>{state.exerciseIndex++;render();scrollToExerciseTop()})}function showCelebration(icon,title,text,ms,cb){const el=document.createElement("div");el.className="celebrationOverlay";el.innerHTML=`<div class="celebrationCard"><div class="${icon.length>2?"bananaBunch":"bananaOne"}">${icon}</div><div class="celebrationTitle">${esc(title)}</div><div class="subtitle">${esc(text)}</div></div>`;document.body.appendChild(el);setTimeout(()=>el.style.opacity="0",ms-350);setTimeout(()=>{el.remove();cb&&cb()},ms)}
function formatSetSummary(s){if(!s)return"";if((s.note||"")==="Czas")return `${s.reps||"czas?"}${s.kg?` · opór ${s.kg}`:""}${s.rpe?` · RPE ${s.rpe}`:""}`;if((s.note||"")==="Wykonane")return `Wykonane${s.freeNote?`: ${s.freeNote}`:""}`;return `${s.kg||""} kg × ${s.reps||""}${s.rpe?` · RPE ${s.rpe}`:""}`}
function finishHTML(sess){const w=workout(sess.workoutId),skipped=w.exercises.filter(ex=>exerciseSkipped(ex,sess));const items=w.exercises.map(ex=>{const skip=skipFor(ex,sess);const sets=state.logs[exerciseKey(ex,sess)]||[];return `<div class="doneItem"><strong>${skip?"⚠️":"✅"} ${esc(ex.name)}</strong><div class="subtitle">${skip?`Pominięte: ${esc(skip.reason)}`:sets.map(formatSetSummary).join(" / ")}</div></div>`}).join("");return `<section class="finishScreen"><div class="finishHero"><div class="bananaBunch">🍌🍌🍌</div><h2>Dobra robota!</h2><div class="subtitle">Trening wykonany. Oto co zrobiłeś:</div></div><div class="list">${items}</div>${skipped.length?`<div class="note"><strong>Pominięte ćwiczenia</strong><br>${skipped.map(ex=>`${esc(ex.name)} — ${esc(skipFor(ex,sess).reason)}`).join("<br>")}</div>`:""}<textarea style="margin-top:12px" placeholder="Notatka do całego treningu — zeszyt treningowy" oninput="state.sessionNotes[sessionKey(sess)]=this.value;save()">${esc(state.sessionNotes?.[sessionKey(sess)]||"")}</textarea><div class="actions"><button class="btn secondary" onclick="exitSession()">Kalendarz</button><button class="btn good" onclick="syncWorkout(${JSON.stringify(sess).replace(/"/g,"&quot;")})">Zapisz do Supabase</button></div></section>`}
function renderPlan(){const w=workout(state.planPreviewId||1);document.getElementById("view").innerHTML=`<div class="actions" style="grid-template-columns:repeat(4,1fr);margin-bottom:12px">${PLAN.map(x=>`<button class="btn ${x.id===(state.planPreviewId||1)?"":"secondary"}" onclick="state.planPreviewId=${x.id};renderPlan();save()">${x.id}</button>`).join("")}</div><section class="card"><h2>${w.name}</h2><div class="subtitle" style="margin-bottom:12px">${esc(w.focus||"")} Podgląd rozpiski.</div><div class="list">${w.exercises.map(ex=>`<div class="item"><div class="subtitle">${esc(ex.no)} · ${esc(ex.type||"")}</div><strong>${esc(ex.name)}</strong><div class="subtitle">${esc(ex.sets||"")} × ${esc(ex.reps||"")} · ${esc(ex.rest||"")}</div></div>`).join("")}</div></section>`}
function renderPlans(){const st=currentPlanStats();const archive=Object.values(state.planArchive).sort((a,b)=>(b.lastSeen||"").localeCompare(a.lastSeen||""));const selected=archive.find(p=>p.planId===state.selectedPlanId)||archive.find(p=>p.planId===planId())||null;document.getElementById("view").innerHTML=`<section class="card"><h2>Aktywny plan</h2><button class="item activePlan planButton" onclick="state.selectedPlanId='${esc(planId())}';renderPlans();save()"><strong>${esc(CURRENT_PLAN.planName||planId())}</strong><div class="subtitle">${esc(planId())} · ${esc(CURRENT_PLAN.planStatus||"active")}</div><div class="metaGrid"><div class="metaBox"><small>Ukończenie</small><strong>${st.done}/${st.total} treningów</strong></div><div class="metaBox"><small>Postęp</small><strong>${st.progress}%</strong></div><div class="metaBox"><small>Start</small><strong>${START_DATE}</strong></div><div class="metaBox"><small>Status</small><strong>${esc(CURRENT_PLAN.planStatus||"active")}</strong></div></div><div class="progress"><div style="width:${st.progress}%"></div></div></button></section><section class="card" style="margin-top:12px"><h2>Plany archiwalne</h2><div class="subtitle" style="margin-bottom:12px">Tu zostaną poprzednie plany po zmianie aktywnego planu. Kliknięcie pokaże podgląd.</div><div class="list">${archive.filter(p=>p.planId!==planId()).map(p=>planArchiveButton(p)).join("")||`<div class="empty">Brak archiwalnych planów.</div>`}</div></section>${selected?planPreviewCard(selected):""}`}
function planArchiveButton(p){return `<button class="item planButton ${p.planId===state.selectedPlanId?"activePlan":""}" onclick="state.selectedPlanId='${esc(p.planId)}';renderPlans();save()"><strong>${esc(p.planName)}</strong><div class="subtitle">${esc(p.planId)} · ${esc(p.planStatus||"archived")}</div><div class="summaryLine"><span>Postęp</span><span>${p.done||0}/${p.total||0} · ${p.progress||0}%</span></div><div class="summaryLine"><span>Ostatnio otwarty</span><span>${esc(p.lastSeen||"-")}</span></div></button>`}
function planPreviewCard(p){const active=p.planId===planId();return `<section class="card" style="margin-top:12px"><h2>Podgląd planu</h2><div class="item ${active?"activePlan":""}"><strong>${esc(p.planName)}</strong><div class="subtitle">${esc(p.planId)} · ${active?"aktywny":"archiwalny"}</div><div class="summaryLine"><span>Start</span><span>${esc(p.startDate||START_DATE)}</span></div><div class="summaryLine"><span>Ukończenie</span><span>${p.done||0}/${p.total||0} treningów</span></div><div class="summaryLine"><span>Postęp</span><span>${p.progress||0}%</span></div><div class="summaryLine"><span>Ostatnio otwarty</span><span>${esc(p.lastSeen||"-")}</span></div></div>${active?`<div class="note">To jest obecnie aktywny plan. Pełną rozpiskę znajdziesz w zakładce Plan.</div><button class="btn full" onclick="setView('plan')">Pokaż rozpiskę aktywnego planu</button>`:`<div class="note">To jest zapis historii planu na tym urządzeniu. Pełny podgląd archiwalnej rozpiski będzie możliwy, gdy dodamy indeks planów po stronie backendu.</div>`}</section>`}

function serverSessionBaseFromRow(r){const pid=r.plan_id||r.planId||planId();const sid=r.session_id||r.sessionId||"";if(pid!==planId()||!sid)return "";return `${pid}__${sid}`;}
function sessionBaseFromLogKey(key){const parts=String(key||"").split("__");if(parts.length<3)return "";if(/^\d{4}-\d{2}-\d{2}$/.test(parts[1])&&parts.length>=4)return `${parts[0]}__${parts[2]}`;return `${parts[0]}__${parts[1]}`;}
function localSessionCompleteFromBase(base){const parts=String(base||"").split("__");if(parts.length<2)return false;const sid=parts[1];const sess=schedule().find(x=>x.id===sid);if(!sess)return false;const w=workout(sess.workoutId);if(!w.exercises.length)return false;return w.exercises.every(ex=>{const key=`${base}__E${ex.no}`;const sets=state.logs[key];return sets&&sets.length>0&&sets.every(s=>s.done);});}

function trainingExerciseName(te){return te.exercises?.name||te.source_name||te.source_no_text||"Ćwiczenie"}
function progressionMatches(te,week){
  const blocks=DB_PROGRESSION_BLOCKS.filter(b=>Number(b.start_week)<=Number(week)&&Number(b.end_week)>=Number(week));
  const candidates=DB_PROGRESSION_EXERCISES.filter(x=>blocks.some(b=>b.id===x.block_id));
  const exact=candidates.filter(x=>x.training_exercise_id===te.id);
  if(exact.length)return exact;
  const byExercise=candidates.filter(x=>!x.training_exercise_id&&te.exercise_id&&x.exercise_id===te.exercise_id);
  if(byExercise.length)return byExercise;
  const name=normText(trainingExerciseName(te));
  return candidates.filter(x=>!x.training_exercise_id&&normText(x.source_name||x.exercises?.name)===name);
}
function progressionRowsFor(te,week){
  const matches=progressionMatches(te,week);
  if(!matches.length)return[];
  const order=new Map(matches.map((x,i)=>[x.id,Number(x.order_index||i)]));
  const ids=new Set(matches.map(x=>x.id));
  const rows=DB_PROGRESSION_SETS
    .filter(s=>ids.has(s.progression_exercise_id)&&Number(s.week_number)===Number(week))
    .sort((a,b)=>(order.get(a.progression_exercise_id)-order.get(b.progression_exercise_id))||Number(a.set_no||0)-Number(b.set_no||0));
  const out=[];
  for(const row of rows){
    const repeat=Math.max(1,Number(row.set_count)||1);
    for(let i=0;i<repeat;i++)out.push({...row,_expandedIndex:i});
  }
  return out;
}
function prescriptionFromRow(row,i){

  return {note,kg:kg||load,reps};
}
function prescriptionsFor(te){

async function apiGetWorkoutLog(){
  try{
    if(!ATHLETE||!DB_PLAN)return;
    const sessions=await must(await sb.from("workout_sessions").select("id,athlete_id,plan_id,source_plan_key,client_key,session_id,workout_date,performed_date,week_number,workout_id,workout_name,status,completed_exercises,total_exercises,session_note,recorded_at,created_at,updated_at").eq("athlete_id",ATHLETE.id).eq("plan_id",DB_PLAN.id).order("workout_date",{ascending:false}));
    DB_WORKOUT_SESSIONS=sessions;
    const existingSource=sessions.find(s=>s.source_plan_key)?.source_plan_key;
    if(existingSource)CURRENT_PLAN.sourcePlanKey=existingSource;
    let logs=[];
    const sessionIds=sessions.map(s=>s.id);
    if(sessionIds.length)logs=await must(await sb.from("workout_set_logs").select("id,workout_session_id,athlete_id,plan_id,source_plan_key,client_key,session_id,exercise_no,exercise_name,set_no,planned_label,kg,reps_text,rpe,done,note,recorded_at,created_at,updated_at").in("workout_session_id",sessionIds).order("session_id").order("set_no"));
    const mappedLogs=logs.map(mapDbLogRow),mappedStatuses=sessions.map(mapDbSessionRow);
    pruneLocalCacheBeforeServerHydrate(mappedLogs,mappedStatuses);
    hydrateLogsFromServer(mappedLogs);
    hydrateStatusesFromServer(mappedStatuses);
    render();
  }catch(e){console.warn(e)}
}

    if(!active?.plans)throw new Error("Podopieczny nie ma przypisanego planu");
    DB_PLAN=active.plans;
    CURRENT_PLAN={planId:DB_PLAN.slug||DB_PLAN.id,planName:DB_PLAN.name||DB_PLAN.slug||"Plan",planStatus:DB_PLAN.status||"active",clientId:CLIENT_ID,clientName:ATHLETE.name||CLIENT_ID,dbPlanId:DB_PLAN.id};
    if(DB_PLAN.start_date)START_DATE=String(DB_PLAN.start_date).slice(0,10);
    TOTAL_WEEKS=Number(DB_PLAN.weeks)||TOTAL_WEEKS;
    const [trainings,blocks,rpeRows]=await Promise.all([
      must(await sb.from("trainings").select("id,plan_id,name,focus,order_index").eq("plan_id",DB_PLAN.id).order("order_index")),
      must(await sb.from("progression_blocks").select("id,plan_id,name,block_index,start_week,end_week,notes").eq("plan_id",DB_PLAN.id).order("block_index")),
      must(await sb.from("rpe_scale").select("rpe,description,reserve").order("rpe",{ascending:false}))
    ]);
    DB_TRAININGS=trainings;DB_PROGRESSION_BLOCKS=blocks;DAYS=buildDays(DB_TRAININGS.length);
    const trainingIds=DB_TRAININGS.map(t=>t.id);
    DB_TRAINING_EXERCISES=trainingIds.length?await must(await sb.from("training_exercises").select("id,training_id,exercise_id,exercise_no,order_index,sets_text,reps_text,rest_text,weight,load_text,tempo_text,use_wg,progression_mode,superset_key,mode,notes,source_name,source_no_text,video_hint,exercises(id,name,youtube_url,notes,default_mode,default_category)").in("training_id",trainingIds).order("order_index")):[];
    const blockIds=DB_PROGRESSION_BLOCKS.map(b=>b.id);
    DB_PROGRESSION_EXERCISES=blockIds.length?await must(await sb.from("progression_exercises").select("id,block_id,exercise_id,training_exercise_id,order_index,source_name,exercises(id,name)").in("block_id",blockIds).order("order_index")):[];
    const peIds=DB_PROGRESSION_EXERCISES.map(x=>x.id);
    DB_PROGRESSION_SETS=peIds.length?await must(await sb.from("progression_sets").select("id,progression_exercise_id,week_number,set_no,label,reps_text,kg,raw_text,load_text,set_count,is_skip,is_deload,rest_text,notes").in("progression_exercise_id",peIds).order("week_number")):[];
    PLAN=mapPlanWorkouts();
    VIDEOS={};
    DB_TRAINING_EXERCISES.forEach(te=>{const url=te.exercises?.youtube_url||te.video_hint;if(url)VIDEOS[trainingExerciseName(te)]=url});
    if(rpeRows.length)RPE=rpeRows.map(x=>[String(x.rpe),x.description,x.reserve||""]);
    apiStatus=`Połączono · ${CURRENT_PLAN.clientName||CLIENT_ID} · ${CURRENT_PLAN.planId} · start ${START_DATE}`;
    apiStatusKind="ok";
  }catch(e){console.error(e);apiStatus="Nie udało się pobrać danych z Supabase";apiStatusKind="err"}finally{render()}
}
async function apiGetMeasurements(){
  try{
    if(!ATHLETE||!DB_PLAN)return;
    const rows=await must(await sb.from("athlete_measurements").select("id,athlete_id,plan_id,source_plan_key,client_key,measurement_date,week_number,waga,udo,dupa,brzuch,klatka,biceps,szyja,recorded_at").eq("athlete_id",ATHLETE.id).eq("plan_id",DB_PLAN.id).order("measurement_date",{ascending:false}));
    Object.keys(state.measurements||{}).forEach(k=>{if(k.startsWith(planId()+"__"))delete state.measurements[k]});
    rows.map(mapDbMeasurement).forEach(r=>{const pid=r.plan_id||planId();if(pid!==planId())return;const key=`${pid}__${r.measurement_date||r.date||todayKey()}__W${r.week||""}`;state.measurements[key]={};MEASUREMENTS.forEach(m=>{if(r[m]!==null&&r[m]!==undefined&&r[m]!=="")state.measurements[key][m]=r[m]})});
    save();
  }catch(e){console.warn(e)}
}
apiGetPlan().then(()=>{migrateLegacyLocalKeys();pruneCompletedLocalSessionsBeforeBackend();render();return apiGetWorkoutLog()}).then(()=>apiGetMeasurements());
</script>
