<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MonkeyPanel Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<style>
:root{
  --app-bg:#eeeeea;
  --card:#ffffff;
  --ink:#232629;
  --muted:#888d95;
  --faint:#b4b4ac;
  --line:#e7e7e2;
  --accent:#4e7a5e;
  --accent-ink:#3c6450;
  --accent-soft:#e8f0eb;
  --on-accent-soft:#cfe0d6;
  --on-accent-bar:#dcebe2;
  --bar-track:#e1e3df;
  --warn:#9a6a22;
  --warn-soft:#fbf3e3;
  --danger:#a34b45;
  --shadow:0 8px 24px rgba(35,38,41,.08);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--app-bg)}
body{
  margin:0;
  background:#deded9;
  color:var(--ink);
  font-family:"Public Sans",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-variant-numeric:tabular-nums;
}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:3px solid rgba(78,122,94,.25);outline-offset:2px}
h1,h2,h3{font-family:"Archivo","Public Sans",sans-serif;letter-spacing:0}
.app{
  width:min(480px,100%);
  min-height:100dvh;
  margin:0 auto;
  background:var(--app-bg);
  padding-bottom:92px;
  box-shadow:0 0 40px rgba(35,38,41,.08);
}
.app.session-active{padding-bottom:96px}
.top{
  position:sticky;
  top:0;
  z-index:20;
  padding:18px 18px 15px;
  background:rgba(255,255,255,.98);
  border-bottom:1px solid var(--line);
}
.top.hidden{display:none}
.eyebrow{
  color:#a0a4ab;
  font-size:11px;
  line-height:1.3;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0;
}
.header-title-row{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:3px}
h1{font-size:25px;line-height:1.08;margin:0}
h2{font-size:21px;line-height:1.15;margin:0}
h3{font-size:15px;line-height:1.25;margin:0}
.avatar{
  display:none;
  width:44px;
  height:44px;
  border-radius:50%;
  place-items:center;
  flex:0 0 44px;
  background:#dfeae3;
  color:var(--accent-ink);
  font-weight:700;
}
.avatar.show{display:grid}
.header-meta{display:none;align-items:center;justify-content:space-between;gap:12px;margin-top:14px}
.header-meta.show{display:flex}
.header-meta strong{color:var(--accent-ink);font-size:12.5px}
.header-meta span{color:var(--muted);font-size:12px}
.api{display:none;margin-top:7px;font-size:11px}
.api.err,.api.loading{display:block}
.api.err{color:var(--danger)}
.api.loading{color:var(--muted)}
.progress{display:none;height:7px;margin-top:9px;overflow:hidden;border-radius:4px;background:var(--bar-track)}
.progress.show{display:block}
.progress>div{height:100%;width:0;background:var(--accent);border-radius:4px;transition:width .2s ease}
#view{min-height:calc(100dvh - 170px)}
.tabs{
  position:fixed;
  z-index:30;
  left:50%;
  bottom:0;
  width:min(480px,100%);
  min-height:76px;
  padding:9px 12px calc(8px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  background:rgba(255,255,255,.98);
  border-top:1px solid var(--line);
}
.tabs.hidden{display:none}
.tab{
  min-height:54px;
  padding:4px 2px;
  border:0;
  background:transparent;
  color:#a1a6ae;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-size:11px;
  font-weight:600;
}
.tab svg{width:21px;height:21px}
.tab.active{color:var(--accent)}
.btn{
  min-height:48px;
  border:1px solid transparent;
  border-radius:10px;
  padding:12px 16px;
  background:var(--accent);
  color:#fff;
  font-weight:700;
}
.btn.secondary{background:var(--card);color:var(--muted);border-color:var(--line)}
.btn.ghost{background:transparent;color:var(--accent-ink);padding-left:8px;padding-right:8px}
.btn.danger{background:#fff;color:var(--danger);border-color:#ead4d1}
.btn.full{width:100%}
.btn.tiny{min-height:36px;padding:7px 10px;font-size:12px}
.icon-btn{
  width:44px;
  height:44px;
  padding:0;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:10px;
  background:#f6f6f3;
  color:var(--muted);
}
.icon-btn svg{width:20px;height:20px}
.subtitle{color:var(--muted);font-size:13px;line-height:1.4}
.screen{padding:20px 18px 28px}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:11px;
  padding:16px;
  box-shadow:none;
}
.empty{padding:32px 18px;text-align:center;color:var(--muted);border:1px dashed #d3d5d0;border-radius:11px}
.section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin-bottom:12px}
.section-head strong{font-family:"Archivo","Public Sans",sans-serif;font-size:16px}
.section-head span{color:var(--muted);font-size:12px}
.calendar{padding:16px 16px 24px}
.weekCard{margin-bottom:17px}
.weekHead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:9px}
.weekHead strong{font-family:"Archivo","Public Sans",sans-serif;font-size:14px}
.weekHead span{color:var(--muted);font-size:11.5px;font-weight:600}
.weekHead span.complete{color:var(--accent-ink);font-weight:700}
.days{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px}
.dayBtn{
  min-width:0;
  height:128px;
  padding:10px 9px;
  border:1px solid var(--line);
  border-radius:11px;
  background:var(--card);
  color:var(--ink);
  display:flex;
  flex-direction:column;
  text-align:left;
}
.dayBtn .tile-status{min-height:22px;font-size:9px;line-height:1.1;text-transform:uppercase;font-weight:700;color:var(--faint)}
.dayBtn .name{font-family:"Archivo","Public Sans",sans-serif;font-size:21px;line-height:1;color:#cdcdc5}
.dayBtn .date{margin-top:4px;font-size:10.5px;line-height:1.15;color:var(--faint)}
.dayBtn .tile-bottom{display:block;width:100%;margin-top:auto}
.dayBtn .bar{display:block;width:100%;height:4px;overflow:hidden;border-radius:3px;background:var(--bar-track)}
.dayBtn .bar>span{height:100%;border-radius:3px;background:var(--accent)}
.dayBtn .percent{display:block;margin-top:5px;color:var(--faint);font-size:10px;line-height:1}
.dayBtn.status-done{background:var(--accent);border-color:var(--accent);color:#fff}
.dayBtn.status-done .tile-status,.dayBtn.status-done .date{color:var(--on-accent-soft)}
.dayBtn.status-done .name{color:#fff}
.dayBtn.status-done .bar{background:rgba(255,255,255,.28)}
.dayBtn.status-done .bar>span{background:rgba(255,255,255,.92)}
.dayBtn.status-done .percent{color:var(--on-accent-bar)}
.dayBtn.status-due{border:2px solid var(--accent);padding:9px 8px;box-shadow:0 6px 15px rgba(60,100,80,.14)}
.dayBtn.status-due .tile-status{color:var(--accent)}
.dayBtn.status-due .name{color:var(--ink)}
.dayBtn.status-due .date{color:var(--accent);font-weight:600}
.dayBtn.status-due .percent{color:var(--accent-ink);font-weight:700}
.today-screen{padding:20px 18px 28px}
.today-hero{
  padding:20px;
  border-radius:14px;
  background:var(--accent);
  color:#fff;
}
.today-hero .eyebrow{color:var(--on-accent-soft)}
.today-hero h2{margin-top:5px;font-size:25px}
.today-hero .subtitle{color:var(--on-accent-soft);margin-top:7px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.chip{padding:7px 10px;border-radius:8px;background:#f8f8f6;color:#565c64;font-size:12px;font-weight:600}
.today-hero .chip{background:rgba(255,255,255,.18);color:#fff}
.chip.goal{background:var(--accent-soft);color:var(--accent-ink);border:1px solid #c8ddd0}
.today-hero .btn{margin-top:20px;background:#fff;color:var(--accent-ink)}
.week-segments{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 0 20px}
.week-segments span{height:6px;border-radius:3px;background:var(--bar-track)}
.week-segments span.done{background:var(--accent)}
.today-list{background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden}
.today-item{
  width:100%;
  min-height:68px;
  padding:12px;
  border:0;
  border-bottom:1px solid var(--line);
  background:#fff;
  color:var(--ink);
  display:grid;
  grid-template-columns:42px 1fr auto;
  align-items:center;
  gap:11px;
  text-align:left;
}
.today-item:last-child{border-bottom:0}
.today-item .badge{width:38px;height:38px;border-radius:9px;background:#f3f3ef;color:#a3a7ad;display:grid;place-items:center;font-family:"Archivo","Public Sans",sans-serif}
.today-item.done .badge{background:var(--accent-soft);color:var(--accent-ink)}
.today-item strong{display:block;font-size:13px}
.today-item small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.today-item .trailing{color:var(--muted);font-size:12px}
.session-shell{min-height:100dvh;background:var(--app-bg);padding-bottom:96px}
.session-head{
  position:sticky;
  top:0;
  z-index:25;
  padding:13px 16px 14px;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.session-head-row{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:10px}
.session-head-title{text-align:center;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-count{text-align:right;color:var(--accent);font-size:13px;font-weight:700}
.exerciseProgress{display:flex;gap:5px;margin-top:12px}
.dot{height:5px;flex:1;border-radius:3px;background:#dde0dc}
.dot.done,.dot.current{background:var(--accent)}
.dot.superset{box-shadow:inset 0 0 0 1px rgba(78,122,94,.28)}
.session-body{padding:26px 20px 30px}
.exercise-code{color:var(--accent);font-size:12px;font-weight:700}
.exercise-title{font-family:"Archivo","Public Sans",sans-serif;font-size:27px;line-height:1.08;margin:5px 0 12px;overflow-wrap:anywhere}
.technique-btn{display:inline-flex;align-items:center;gap:8px;min-height:44px;margin-top:8px;border:0;background:transparent;color:#356b85;font-size:13px;font-weight:700;padding:0}
.technique-btn .play{width:27px;height:27px;border:1px solid #c8dce6;border-radius:50%;display:grid;place-items:center}
.progression-note{margin:12px 0 20px;padding:13px;border:1px solid #c9ddd0;border-radius:10px;background:var(--accent-soft);color:var(--accent-ink);font-size:12px;line-height:1.45}
.sets-table{margin-top:18px}
.sets-head,.set-row{display:grid;grid-template-columns:34px minmax(0,1fr) minmax(0,1fr) 72px 48px;gap:7px;align-items:center}
.sets-head{padding:0 7px 7px;color:#a3a7ae;font-size:9px;font-weight:700;text-transform:uppercase}
.set-row{min-height:58px;margin-bottom:8px;padding:5px 5px 5px 9px;border:1px solid transparent;border-radius:10px;background:rgba(255,255,255,.72)}
.set-row.done{border-color:var(--accent);background:#fff}
.set-row.locked{opacity:.48}
.set-row.locked input,.set-row.locked select,.set-row.locked button{pointer-events:none}
.previous-set-hint{color:var(--accent-ink);font-size:10px;line-height:1.35}
.set-row .previous-set-hint{grid-column:2/5;margin-top:-2px}
.superset-step .previous-set-hint{margin:7px 0 0 38px}
.time-card .previous-set-hint{margin:9px 0 2px}
.set-number{color:var(--accent);font-size:12px;font-weight:700}
.set-row input,.set-row select{
  width:100%;
  height:46px;
  min-width:0;
  border:1px solid #e2e3df;
  border-radius:9px;
  background:#fff;
  color:var(--ink);
  text-align:center;
  font-size:16px;
  font-weight:700;
  outline:0;
}
.set-row.done input,.set-row.done select{border-color:#c8ddd0}
.check-btn{
  width:46px;
  height:46px;
  border:2px solid #d8dad5;
  border-radius:50%;
  background:#fff;
  color:#c0c3bd;
  display:grid;
  place-items:center;
}
.check-btn.done{border-color:var(--accent);background:var(--accent);color:#fff}
.check-btn svg{width:22px;height:22px}
.add-set{width:100%;min-height:44px;border:1px dashed #cfd3cd;border-radius:9px;background:transparent;color:var(--muted);font-weight:600}
.superset-body{padding-top:22px}
.superset-kicker{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--accent);font-size:11px;font-weight:700;text-transform:uppercase}
.superset-title{margin:5px 0 6px;font-family:"Archivo","Public Sans",sans-serif;font-size:25px;line-height:1.12}
.superset-subtitle{color:var(--muted);font-size:12px;line-height:1.45}
.superset-rounds{display:grid;gap:14px;margin-top:20px}
.superset-round{padding:12px;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.48)}
.superset-round.current{border-color:var(--accent-line,#c9ddd0);background:var(--accent-soft)}
.superset-round-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase}
.superset-round.current .superset-round-head{color:var(--accent-ink)}
.superset-step{padding:10px;border:1px solid transparent;border-radius:10px;background:#fff}
.superset-step+.superset-step{margin-top:8px}
.superset-step.done{border-color:var(--accent)}
.superset-step.locked{opacity:.46}
.superset-step.locked input,.superset-step.locked select,.superset-step.locked button{pointer-events:none}
.superset-step-head{display:grid;grid-template-columns:30px minmax(0,1fr) auto;gap:8px;align-items:center;margin-bottom:8px}
.superset-member{width:28px;height:28px;display:grid;place-items:center;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);font-size:12px;font-weight:700}
.superset-step-title{min-width:0}
.superset-step-title strong{display:block;font-size:12.5px;overflow-wrap:anywhere}
.superset-step-title small{display:block;margin-top:1px;color:var(--muted);font-size:10px}
.superset-step .technique-btn{min-height:30px;margin:0;padding:0 4px;font-size:0}
.superset-step .technique-btn .play{width:27px;height:27px}
.superset-inputs{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) 68px 44px;gap:7px;align-items:center}
.superset-inputs input,.superset-inputs select{width:100%;height:44px;min-width:0;border:1px solid #e2e3df;border-radius:9px;background:#fff;color:var(--ink);text-align:center;font-size:15px;font-weight:700;outline:0}
.superset-inputs .check-btn{width:42px;height:42px}
.superset-coach-note{margin:8px 0 0;padding:8px 10px;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);font-size:10.5px;line-height:1.4}
.superset-tools{display:grid;gap:9px;margin-top:15px}
.superset-tool{padding:11px;border:1px solid var(--line);border-radius:10px;background:#fff}
.superset-tool-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.superset-tool-head strong{font-size:12px}
.superset-tool-actions{display:flex;gap:6px;flex-wrap:wrap}
.superset-tool textarea{width:100%;min-height:50px;padding:8px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);resize:vertical}
.finish-group-label{padding:9px 13px;background:var(--accent-soft);color:var(--accent-ink);font-size:10px;font-weight:700;text-transform:uppercase}
.exercise-note-row{margin-top:14px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
.exercise-note-row textarea{min-height:50px;border:0;padding:2px;background:transparent}
.time-card,.done-card{margin-top:18px}
.time-card{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.time-card .field:nth-child(3){grid-column:1/-1}
.time-card .btn{grid-column:1/-1}
.time-card select{width:100%;height:48px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);text-align:center;font-weight:700}
.done-card textarea{width:100%;min-height:90px;padding:12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);resize:vertical}
.exercise-tools{display:flex;justify-content:space-between;gap:8px;margin-top:10px}
.mode-switch{display:flex;gap:5px;margin:10px 0}
.mode-switch button{min-height:36px;flex:1;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--muted);font-size:11px;font-weight:600}
.mode-switch button.active{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
.session-footer{
  position:fixed;
  z-index:30;
  left:50%;
  bottom:0;
  width:min(480px,100%);
  transform:translateX(-50%);
  display:grid;
  grid-template-columns:54px 1fr;
  gap:10px;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  background:#fff;
  border-top:1px solid var(--line);
}
.session-footer .btn{min-height:54px}
.finishScreen{min-height:100dvh;background:var(--app-bg);padding-bottom:92px}
.finishHero{padding:36px 20px 30px;text-align:center;background:var(--accent);color:#fff}
.finish-check{width:66px;height:66px;margin:0 auto 16px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center}
.finish-check svg{width:38px;height:38px}
.finishHero h2{font-size:27px}
.finishHero .subtitle{margin-top:5px;color:var(--on-accent-soft)}
.finish-stats{display:flex;justify-content:center;gap:32px;margin-top:20px}
.finish-stats strong{display:block;font-family:"Archivo","Public Sans",sans-serif;font-size:22px}
.finish-stats span{font-size:10px;color:var(--on-accent-soft)}
.finish-body{padding:20px}
.rpe-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:12px 0 20px}
.rpe-choice{height:50px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--muted);font-size:18px;font-weight:700}
.rpe-choice.active{background:var(--accent);border-color:var(--accent);color:#fff}
.finish-body textarea{width:100%;min-height:92px;padding:12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);resize:vertical}
.finish-list{margin-top:16px;border:1px solid var(--line);border-radius:10px;background:#fff;overflow:hidden}
.finish-list-row{padding:13px;border-bottom:1px solid var(--line);font-size:12px}
.finish-list-row:last-child{border-bottom:0}
.finish-exercise-head{display:flex;justify-content:space-between;gap:12px;align-items:start}
.finish-set-list{display:grid;gap:6px;margin-top:10px}
.finish-set-row{display:grid;grid-template-columns:48px minmax(0,1fr);gap:8px;padding:8px 9px;border-radius:8px;background:#f7f8f5;line-height:1.35}
.finish-set-row .set-label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase}
.finish-set-row .set-value{font-weight:600;overflow-wrap:anywhere}
.finish-set-row .set-note{grid-column:2;color:var(--muted);font-size:10px}
.history-detail-note{margin:16px 0 0;padding:12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:12px;line-height:1.5}
.history-detail-note strong{display:block;margin-bottom:4px}
.history-screen,.measure-screen{padding:20px 18px 28px}
.month-label{margin:0 0 10px;color:#a3a7ae;font-size:11px;font-weight:700;text-transform:uppercase}
.history-list{display:grid;gap:10px}
.history-item{
  width:100%;
  min-height:74px;
  padding:13px;
  border:1px solid var(--line);
  border-radius:11px;
  background:#fff;
  color:var(--ink);
  display:grid;
  grid-template-columns:52px 1fr auto;
  align-items:center;
  gap:12px;
  text-align:left;
}
.history-date{padding-right:11px;border-right:1px solid var(--line);text-align:center}
.history-date strong{display:block;font-family:"Archivo","Public Sans",sans-serif;font-size:18px}
.history-date span{color:#a3a7ae;font-size:10px;text-transform:uppercase}
.history-main strong{display:block;font-size:13px}
.history-main span{display:block;margin-top:3px;color:var(--muted);font-size:11px}
.status-pill{padding:5px 8px;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);font-size:10px;font-weight:700}
.status-pill.partial{background:var(--warn-soft);color:var(--warn)}
.measure-latest{display:flex;align-items:end;justify-content:space-between;gap:14px;margin-bottom:20px}
.measure-latest .label{color:#a3a7ae;font-size:10px;font-weight:700;text-transform:uppercase}
.measure-latest .weight{font-family:"Archivo","Public Sans",sans-serif;font-size:40px;line-height:1;margin-top:7px}
.measure-latest .weight span{font-family:"Public Sans",sans-serif;font-size:15px;color:var(--muted)}
.delta-pill{padding:7px 9px;border-radius:9px;background:var(--accent-soft);color:var(--accent-ink);font-size:11px;font-weight:700}
.measure-form{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.field label{display:block;margin-bottom:5px;color:#a3a7ae;font-size:10px;font-weight:700;text-transform:uppercase}
.field input{
  width:100%;
  height:48px;
  padding:9px 10px;
  border:1px solid var(--line);
  border-radius:9px;
  background:#fff;
  color:var(--ink);
  font-size:16px;
  outline:0;
}
.field input:focus{border-color:var(--accent)}
.measure-history{margin-top:20px;border:1px solid var(--line);border-radius:10px;background:#fff;overflow:hidden}
.measure-history-row{display:flex;justify-content:space-between;gap:12px;padding:13px;border-bottom:1px solid var(--line);font-size:13px}
.measure-history-row:last-child{border-bottom:0}
.toast{position:fixed;z-index:80;left:50%;bottom:94px;width:min(440px,calc(100% - 28px));transform:translateX(-50%);padding:13px 15px;border-radius:10px;background:var(--ink);color:#fff;text-align:center;font-size:13px;font-weight:700;box-shadow:var(--shadow)}
.celebrationOverlay{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(35,38,41,.48);transition:opacity .25s ease}
.celebrationCard{width:min(330px,100%);padding:26px;border-radius:12px;background:#fff;text-align:center;box-shadow:0 24px 70px rgba(35,38,41,.25)}
.celebrationIcon{width:62px;height:62px;margin:0 auto 13px;border-radius:50%;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent)}
.celebrationIcon svg{width:34px;height:34px}
.celebrationTitle{font-family:"Archivo","Public Sans",sans-serif;font-size:22px}
.modal{position:fixed;inset:0;z-index:70;display:flex;align-items:flex-end;padding:12px;background:rgba(35,38,41,.48)}
.modal .panel{width:min(480px,100%);max-height:86dvh;overflow:auto;margin:0 auto;padding:18px;border-radius:12px;background:#fff}
.modal table{width:100%;border-collapse:collapse;font-size:12px}
.modal th,.modal td{padding:9px;border-bottom:1px solid var(--line);text-align:left}
.embed{position:relative;width:100%;aspect-ratio:16/9;margin:10px 0;border-radius:10px;overflow:hidden;background:#111}
.embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.hidden{display:none!important}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.selector{width:min(420px,100%);padding:24px;border:1px solid var(--line);border-radius:12px;background:#fff}
.selector h1{margin:5px 0 8px}
.selector p{margin:0 0 20px;color:var(--muted);line-height:1.5}
.clientBtn{width:100%;min-height:62px;margin-bottom:9px;padding:13px;border:1px solid var(--line);border-radius:10px;background:#f8f8f6;color:var(--ink);text-align:left;font-weight:700}
.clientBtn small{display:block;margin-top:3px;color:var(--muted);font-size:11px;font-weight:500}
@media (min-width:700px){
  body{padding:24px 0}
  .app{min-height:calc(100dvh - 48px);border-radius:18px;overflow:clip}
  .tabs,.session-footer{bottom:24px}
}

<body>
<div class="app" id="app">
<header class="top" id="appHeader">
  <div class="eyebrow" id="headerEyebrow">MonkeyPanel</div>
  <div class="header-title-row"><h1 id="headerTitle">Ładowanie</h1><div class="avatar" id="headerAvatar"></div></div>
  <div class="header-meta" id="headerMeta"><strong id="headerMetaLeft"></strong><span id="headerMetaRight"></span></div>
  <div id="apiStatus" class="api loading">Ładowanie planu…</div>

</header>
<main id="view"></main>
<nav class="tabs" id="bottomNav">

  <button class="tab" data-view="plan" onclick="setView('plan')"><i data-lucide="list"></i><span>Plan</span></button>
  <button class="tab" data-view="history" onclick="setView('history')"><i data-lucide="clock-3"></i><span>Historia</span></button>
  <button class="tab" data-view="measure" onclick="setView('measure')"><i data-lucide="chart-no-axes-column"></i><span>Pomiary</span></button>
</nav>
</div><div id="modalRoot"></div>
<script>
const FRONTEND_VERSION="v0.4.2-history-exercise-match";
const SUPABASE_URL="https://matuflemwleglsrzrlkp.supabase.co";
const SUPABASE_KEY="sb_publishable_D1z2s-S-GrnWH9u9D8P1nA_H3T9W7hF";
function bootError(message){
  document.body.innerHTML=`<div class="app"><section class="card"><div class="empty">${message}</div></section></div>`;
}
if(!window.supabase||!window.supabase.createClient){
  bootError("Nie udało się załadować biblioteki Supabase. Sprawdź, czy index.html jest plikiem źródłowym, a nie stroną zapisaną z przeglądarki.");
  throw new Error("Supabase library not loaded");
}
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const URL_PARAMS=new URLSearchParams(location.search);
const CLIENT_ID=(URL_PARAMS.get("client")||URL_PARAMS.get("clientId")||"").trim().toLowerCase();
let ATHLETE=null;
let PLAN_LINKS=[];
let DB_PLAN=null;
let DB_TRAININGS=[];
let DB_TRAINING_EXERCISES=[];
let DB_PROGRESSION_BLOCKS=[];
let DB_PROGRESSION_EXERCISES=[];
let DB_PROGRESSION_SETS=[];
let DB_WORKOUT_SESSIONS=[];

if(!CLIENT_ID){
  renderClientSelector();
  throw new Error("CLIENT_SELECTOR");
}

async function renderClientSelector(){
  document.body.innerHTML = `
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:#eeeeea}
  </style>

  <div class="selector">
    <div class="eyebrow">MonkeyPanel</div>
    <h1>Wybierz podopiecznego</h1>
    <p>Wybierz profil, aby otworzyć zeszyt treningowy.</p>

    <div id="clientList">
      Ładowanie klientów...
    </div>
  </div>
  `;

  try{
      const {data,error}=await sb.from("athletes").select("client_key,name,status").order("name");
      if(error)throw error;
      const clients = (data || []).filter(c=>c.status!=="archived");

      document.getElementById('clientList').innerHTML =
        clients.map(c => `
          <button class="clientBtn"
            onclick="location.href='?client=${encodeURIComponent(c.client_key)}'">

            ${esc(c.name || c.client_key)}

            <small>
              ${esc(c.status || 'active')}
            </small>

          </button>
        `).join('') || '<div class="empty">Brak aktywnych podopiecznych.</div>';
  }catch(err){

      document.getElementById('clientList').innerHTML =
        '<div style="color:#a34b45">Błąd ładowania klientów<br><br>' +
        esc(err.message || err) +
        '</div>';
  }
}

const STATE_KEY=`monkeypanel.alpha.v04.${CLIENT_ID}`;
let START_DATE="2026-05-12";let TOTAL_WEEKS=11;let DAYS=[{dow:"wt.",workoutId:1,offset:0},{dow:"czw.",workoutId:2,offset:2},{dow:"sob.",workoutId:3,offset:4},{dow:"ndz.",workoutId:4,offset:5}];
const MEASUREMENTS=["Udo","Dupa","Brzuch","Klatka","Biceps","Szyja","Waga"];
let PLAN=[{id:1,name:"1 TRENING",focus:"",exercises:[]},{id:2,name:"2 TRENING",focus:"",exercises:[]},{id:3,name:"3 TRENING",focus:"",exercises:[]},{id:4,name:"4 TRENING",focus:"",exercises:[]}];let VIDEOS={};let RPE=[["10","Maksimum. Więcej nie dasz rady.","0"],["9","Bardzo ciężko, ale jedno powtórzenie jeszcze da się zrobić.","1"],["8","Mocno, ale kontrolujesz. 2 powtórzenia w zapasie.","2"],["7","Średnio ciężko. 3 powtórzenia w zapasie.","3"],["6","Lekko.","4+"]];
let CURRENT_PLAN={planId:"loading",planName:"Ładowanie planu",planStatus:"active"};
let state=load(STATE_KEY,{view:"today",mode:"calendar",activeSessionId:null,workoutId:1,week:1,exerciseIndex:0,logs:{},skips:{},serverStatus:{},measurements:{},notes:{},sessionNotes:{},sessionRpe:{},videoOpen:{},modeOverrides:{},planArchive:{},selectedPlanId:null});
if(state.view==="train"||state.view==="plans")state.view=state.view==="plans"?"plan":"today";
state.modeOverrides=state.modeOverrides||{};
state.sessionRpe=state.sessionRpe||{};
state.planArchive=state.planArchive||{};
state.logs=state.logs||{};
state.skips=state.skips||{};
state.serverStatus=state.serverStatus||{};
state.measurements=state.measurements||{};
state.notes=state.notes||{};
state.sessionNotes=state.sessionNotes||{};
state.videoOpen=state.videoOpen||{};
let apiStatus="Ładowanie planu…",apiStatusKind="loading";
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}}function save(){localStorage.setItem(STATE_KEY,JSON.stringify(state))}function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function refreshIcons(){if(window.lucide)requestAnimationFrame(()=>window.lucide.createIcons({attrs:{"stroke-width":2}}))}
function scrollToExerciseTop(){requestAnimationFrame(()=>{window.scrollTo({top:0,behavior:"smooth"})})}
window.addEventListener("beforeunload",e=>{if(hasActiveDraft()){e.preventDefault();e.returnValue=""}});
function hasActiveDraft(){if(state.mode!=="session")return false;const sess=currentSession();if(sessionDone(sess))return false;const prefix=sessionKey(sess)+"__E";return Object.keys(state.logs||{}).some(k=>k.startsWith(prefix)&&Array.isArray(state.logs[k])&&state.logs[k].some(s=>s.kg||s.reps||s.rpe||s.done||s.freeNote)) || Object.keys(state.skips||{}).some(k=>k.startsWith(prefix)) || !!state.sessionNotes?.[sessionKey(sess)]}
function dateObj(iso){const[y,m,d]=String(iso||"").slice(0,10).split("-").map(Number);return new Date(y,m-1,d)}
function isoDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function addDays(iso,days){const d=dateObj(iso);d.setDate(d.getDate()+days);return isoDate(d)}
function todayKey(){const d=new Date();return isoDate(d)}
function dateLabel(iso){if(!iso)return"-";return dateObj(iso).toLocaleDateString("pl-PL",{day:"2-digit",month:"2-digit"})}
function dateShort(iso){if(!iso)return"-";return dateObj(iso).toLocaleDateString("pl-PL",{day:"numeric",month:"short"}).replace(".","")}
function fullDateLabel(iso=todayKey()){return dateObj(iso).toLocaleDateString("pl-PL",{weekday:"long",day:"numeric",month:"long"}).replace(",", " ·").toUpperCase()}
function initials(name){return String(name||CLIENT_ID||"MP").split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join("").toUpperCase()}
function planId(){return CURRENT_PLAN.planId||"unknown_plan"}
function sourcePlanKey(){return CURRENT_PLAN.sourcePlanKey||CURRENT_PLAN.planId||"unknown_plan"}
function planKey(k){return `${planId()}__${k}`}
function nominalDateFor(week,workoutId){const d=DAYS.find(x=>Number(x.workoutId)===Number(workoutId))||DAYS[0];return addDays(START_DATE,(week-1)*7+(d?d.offset:0))}
function dbSlotKey(s){const week=Number(s.week_number||s.week)||1,workoutId=Number(s.workout_id||s.workoutId)||1;return `${week}__${workoutId}`}
function dbSessionStamp(s){return String(s.recorded_at||s.updated_at||s.created_at||s.performed_date||s.workout_date||"")}
function dbSessionToSchedule(s){return{id:s.session_id,week:Number(s.week_number)||1,nominalDate:s.workout_date||nominalDateFor(Number(s.week_number)||1,s.workout_id||1),date:s.workout_date||s.performed_date||nominalDateFor(Number(s.week_number)||1,s.workout_id||1),workoutId:Number(s.workout_id)||1,db:s}}
function schedule(){
  const dbBySlot=new Map();
  DB_WORKOUT_SESSIONS.forEach(s=>{
    const key=dbSlotKey(s),prev=dbBySlot.get(key);
    if(!prev||dbSessionStamp(s).localeCompare(dbSessionStamp(prev))>=0)dbBySlot.set(key,s);
  });
  const out=[],usedDbSessions=new Set();
  for(let week=1;week<=TOTAL_WEEKS;week++){
    for(const d of DAYS){
      const db=dbBySlot.get(`${week}__${Number(d.workoutId)}`);
      if(db){out.push(dbSessionToSchedule(db));usedDbSessions.add(db.session_id)}
      else out.push({id:`W${week}T${d.workoutId}`,week,nominalDate:nominalDateFor(week,d.workoutId),date:nominalDateFor(week,d.workoutId),workoutId:d.workoutId});
    }
  }
  DB_WORKOUT_SESSIONS.forEach(s=>{if(!usedDbSessions.has(s.session_id))out.push(dbSessionToSchedule(s))});
  return out.sort((a,b)=>(a.week-b.week)||Number(a.workoutId)-Number(b.workoutId)||String(a.date).localeCompare(String(b.date)))
}
function workout(id=state.workoutId){return PLAN.find(w=>Number(w.id)===Number(id))||PLAN[0]}
function currentSession(){return schedule().find(s=>s.id===state.activeSessionId)||nextPendingSession()||schedule()[0]}
function exercise(){const w=workout();return w.exercises[Math.min(state.exerciseIndex,w.exercises.length-1)]||{no:"",name:"Brak ćwiczeń",sets:1,reps:"-",rest:"-",notes:"",type:""}}
function exerciseById(id,w=workout()){return w.exercises.find(ex=>String(ex.id)===String(id))||null}
function exerciseKey(ex=exercise(),sess=currentSession()){return planKey(`${sess.id}__E${ex.no}`)}
function serverSessionKey(sess=currentSession()){return planKey(`${sess.id}`)}
function serverStatusFor(sess=currentSession()){state.serverStatus=state.serverStatus||{};return state.serverStatus[serverSessionKey(sess)]||null}
function statusSaysDone(sess=currentSession()){const st=serverStatusFor(sess),status=String(st?.status||"").toLowerCase();return !!st&&(status==="done"||status==="done_with_skips"||status==="completed"||status==="wykonany"||(Number(st.completed||0)>0&&Number(st.total||0)>0&&Number(st.completed)>=Number(st.total)))}
function sessionKey(sess=currentSession()){return planKey(`${sess.id}`)}
function sessionPerformedDate(sess=currentSession()){const st=serverStatusFor(sess);return st&&(st.performedDate||st.workoutDate||String(st.timestamp||"").slice(0,10))||""}
function activePlanWeek(){
  const maxWeek=Math.max(0,...DB_WORKOUT_SESSIONS.map(s=>Number(s.week_number)||0));
  if(!maxWeek)return 1;
  const items=schedule().filter(s=>s.week===maxWeek);
  return items.length&&items.every(sessionDone)?Math.min(TOTAL_WEEKS,maxWeek+1):Math.min(TOTAL_WEEKS,maxWeek);
}
function nextPendingSession(){
  const active=activePlanWeek(),sessions=schedule();
  return sessions.find(x=>x.week>=active&&!sessionDone(x))||sessions.find(x=>!sessionDone(x))||null;
}
function sessionLetter(workoutId){return Number(workoutId)%2===0?"B":"A"}
function trainingDisplayName(w){const raw=String(w?.name||"").trim();if(raw&&!/^\d+\s*TRENING$/i.test(raw))return raw;return `Trening ${sessionLetter(w?.id||1)}${w?.focus?` — ${w.focus}`:""}`}
function exerciseCode(exIndex=state.exerciseIndex,sess=currentSession()){return `${sessionLetter(sess.workoutId)}${exIndex+1}`}
function normalizedSupersetKey(ex){return String(ex?.supersetKey||"").trim().toLowerCase()}
function supersetGroupForExercise(ex=exercise(),w=workout(),sess=currentSession()){
  const key=normalizedSupersetKey(ex);
  if(!key)return null;
  const members=w.exercises.filter(item=>normalizedSupersetKey(item)===key);
  if(members.length<2||members.some(item=>exerciseMode(item,sess)!=="sets"))return null;
  const indexes=members.map(item=>w.exercises.indexOf(item)).filter(index=>index>=0);
  return {key,label:members.find(item=>item.groupLabel)?.groupLabel||"Superseria",members,indexes,startIndex:Math.min(...indexes),endIndex:Math.max(...indexes)};
}
function currentSuperset(){return supersetGroupForExercise(exercise())}
function supersetMemberLabel(ex,group){const index=group.members.findIndex(item=>item.id===ex.id);return String.fromCharCode(65+Math.max(0,index))}
function supersetSequence(group,sess=currentSession()){
  const active=group.members.filter(ex=>!exerciseSkipped(ex,sess));
  const rounds=Math.max(0,...active.map(ex=>setsFor(ex,sess).length));
  const sequence=[];
  for(let round=0;round<rounds;round++)active.forEach(ex=>{const set=setsFor(ex,sess)[round];if(set)sequence.push({ex,set,round,setIndex:round})});
  return {rounds,sequence};
}
function supersetDone(group,sess=currentSession()){return group.members.every(ex=>exerciseDone(ex,sess))}
function seriesWord(value){const n=Math.abs(Math.trunc(Number(value)));if(n===1)return"seria";if(n%10>=2&&n%10<=4&&!(n%100>=12&&n%100<=14))return"serie";return"serii"}
function seriesText(value){return `${value} ${seriesWord(value)}`}
function plannedSetCount(ex,sess=currentSession()){const prescribed=prescriptionForCurrentWeek(ex,sess);if(Array.isArray(prescribed)&&prescribed.length)return prescribed.length;return countSets(ex)}
function workoutPlannedSets(w,sess){return w.exercises.reduce((sum,ex)=>sum+plannedSetCount(ex,sess),0)}
function exerciseModeKey(ex=exercise()){return planKey(`mode__${normText(ex.name||"")}`)}
function prescriptionForCurrentWeek(ex,sess=currentSession()){const p=ex.prescriptions||{};return p[String(sess.week)]||p[sess.week]||[]}
function exerciseMode(ex=exercise(),sess=currentSession()){
  const override=state.modeOverrides?.[exerciseModeKey(ex)];
  if(override)return override;
  if(prescriptionForCurrentWeek(ex,sess).length)return "sets";
  const raw=normText([ex.name,ex.notes,ex.rest,ex.reps,ex.type].join(" "));
  if((ex.type||"")==="time"||/orbitrek|rower|bieznia|biezni|marsz|cardio|airbike|ergometr|interwal/.test(raw))return "time";
  if((ex.type||"")==="mobility"||(ex.type||"")==="warmup"||/rolowanie|rozciaganie|stretch|mobility|mobilizacja|aktywacja|cooldown|rozgrzewka|warm.?up/.test(raw))return "done";
  return "sets";
}
function modeLabel(mode){return mode==="time"?"Czas":mode==="done"?"Wykonane":"Serie"}
function setExerciseMode(mode){
  const ex=exercise(),key=exerciseKey(ex),current=exerciseMode(ex);
  if(current===mode)return;
  const existing=state.logs[key]||[];
  const dirty=existing.some(s=>s.kg||s.reps||s.rpe||s.done||s.freeNote);
  if(dirty&&!confirm("Zmiana trybu wyczyści wpisane dane dla tego ćwiczenia. Kontynuować?"))return;
  state.modeOverrides=state.modeOverrides||{};
  state.modeOverrides[exerciseModeKey(ex)]=mode;
  delete state.logs[key];
  save();render();
}
function countSets(ex){const mode=exerciseMode(ex);if(mode==="time"||mode==="done")return 1;const n=parseInt(String(ex.sets||"").match(/\d+/)?.[0]||"0",10);if(n>0)return n;if((ex.type||"")==="core")return 3;return 5}
function defaultSets(ex,sess=currentSession()){const mode=exerciseMode(ex,sess);const prescribed=prescriptionForCurrentWeek(ex,sess);if(mode==="sets"&&Array.isArray(prescribed)&&prescribed.length){return prescribed.map((p,i)=>({id:uid(),note:p.note||`Seria ${i+1}`,kg:String(p.kg||""),reps:String(p.reps||""),rpe:"",done:false,freeNote:""}))}if(mode==="time")return[{id:uid(),note:"Czas",kg:"",reps:"",rpe:"",done:false,freeNote:""}];if(mode==="done")return[{id:uid(),note:"Wykonane",kg:"",reps:"",rpe:"",done:false,freeNote:""}];return Array.from({length:countSets(ex)},(_,i)=>({id:uid(),note:`Seria ${i+1}`,kg:"",reps:"",rpe:"",done:false,freeNote:""}))}
function setsFor(ex=exercise(),sess=currentSession()){const key=exerciseKey(ex,sess);if(!state.logs[key])state.logs[key]=defaultSets(ex,sess);return state.logs[key]}
function existingSetsFor(ex=exercise(),sess=currentSession()){const s=state.logs?.[exerciseKey(ex,sess)];return Array.isArray(s)?s:[]}
function skipFor(ex=exercise(),sess=currentSession()){return state.skips?.[exerciseKey(ex,sess)]||null}
function exerciseSkipped(ex,sess=currentSession()){return !!skipFor(ex,sess)}
function exerciseDone(ex,sess=currentSession()){if(exerciseSkipped(ex,sess))return true;const s=existingSetsFor(ex,sess);return s.length&&s.every(x=>x.done)}
function sessionDone(sess=currentSession()){if(statusSaysDone(sess))return true;const w=workout(sess.workoutId);return w.exercises.length&&w.exercises.every(ex=>exerciseDone(ex,sess))}
function sessionProgress(sess=currentSession()){const st=serverStatusFor(sess);if(st&&Number(st.total)>0)return Math.min(100,Math.round(Number(st.completed||0)/Number(st.total)*100));const w=workout(sess.workoutId);if(!w.exercises.length)return 0;if(sessionDone(sess))return 100;return Math.round(w.exercises.filter(ex=>exerciseDone(ex,sess)).length/w.exercises.length*100)}
function sessionStatus(sess){if(sessionDone(sess))return"done";const next=nextPendingSession();return next&&next.id===sess.id?"due":"future"}
function statusLabel(s,sess){if(s==="done"){const d=sessionPerformedDate(sess);return d?`wykonany ${dateLabel(d)}`:"wykonany"}return s==="due"?"następny":"przyszły"}
function setView(v){state.view=v;state.mode="calendar";state.week=activePlanWeek();save();render();scrollToExerciseTop()}
function setSession(sess){state.returnView=state.view||"plan";state.activeSessionId=sess.id;state.workoutId=sess.workoutId;state.week=sess.week;state.exerciseIndex=0;state.mode="session";save();render();scrollToExerciseTop()}
function openHistorySession(sess){state.returnView="history";state.activeSessionId=sess.id;state.workoutId=sess.workoutId;state.week=sess.week;state.exerciseIndex=0;state.mode="history-detail";save();render();scrollToExerciseTop()}
function exitSession(){state.mode="calendar";state.view=state.returnView||"plan";save();render();scrollToExerciseTop()}
function overallProgress(){const s=schedule();return s.length?Math.round(s.filter(x=>sessionDone(x)).length/s.length*100):0}
function currentPlanStats(){const s=schedule();const done=s.filter(x=>sessionDone(x)).length;const next=nextPendingSession();return{done,missed:0,total:s.length,progress:s.length?Math.round(done/s.length*100):0,nextWeek:next?next.week:"-",nextWorkout:next?next.workoutId:"-"}}
function rememberPlan(){const st=currentPlanStats();state.planArchive[planId()]={planId:planId(),planName:CURRENT_PLAN.planName||planId(),planStatus:CURRENT_PLAN.planStatus||"active",lastSeen:todayKey(),done:st.done,total:st.total,progress:st.progress,startDate:START_DATE};save()}
function render(){
  rememberPlan();save();
  const inSession=state.mode==="session"||state.mode==="history-detail";
  document.getElementById("app").classList.toggle("session-active",inSession);
  document.getElementById("appHeader").classList.toggle("hidden",inSession);
  document.getElementById("bottomNav").classList.toggle("hidden",inSession);
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===state.view));
  const api=document.getElementById("apiStatus");api.textContent=apiStatus;api.className=`api ${apiStatusKind}`;
  if(inSession)renderSession();
  else{
    configureHeader();
    if(state.view==="today")renderToday();
    else if(state.view==="plan")renderCalendar();
    else if(state.view==="measure")renderMeasurements();
    else if(state.view==="history")renderHistory();
    else{state.view="today";renderToday()}
  }
  refreshIcons();
}
function configureHeader(){
  const title=document.getElementById("headerTitle"),eyebrow=document.getElementById("headerEyebrow"),avatar=document.getElementById("headerAvatar"),meta=document.getElementById("headerMeta"),progress=document.getElementById("globalProgress");
  avatar.classList.remove("show");meta.classList.remove("show");progress.classList.remove("show");
  document.getElementById("progressBar").style.width=`${overallProgress()}%`;
  if(state.view==="today"){
    eyebrow.textContent=fullDateLabel();
    title.textContent=`Cześć, ${CURRENT_PLAN.clientName||ATHLETE?.name||CLIENT_ID}`;
    avatar.textContent=initials(CURRENT_PLAN.clientName||ATHLETE?.name);avatar.classList.add("show");
  }else if(state.view==="plan"){
    const st=currentPlanStats();
    eyebrow.textContent=`${CURRENT_PLAN.planName||"Plan"} · ${TOTAL_WEEKS} tygodni`;
    title.textContent="Postęp planu";
    document.getElementById("headerMetaLeft").textContent=`${st.done} z ${st.total} ukończone`;
    document.getElementById("headerMetaRight").textContent=`tydzień ${activePlanWeek()} z ${TOTAL_WEEKS}`;
    meta.classList.add("show");progress.classList.add("show");
  }else if(state.view==="history"){
    const sessions=DB_WORKOUT_SESSIONS.length,sets=allLoggedSetsCount();
    eyebrow.textContent=`${sessions} sesji · ${seriesText(sets)}`;
    title.textContent="Historia";
  }else{
    const entries=measurementEntries(),latest=entries[0];
    eyebrow.textContent=latest?`Ostatni pomiar · ${dateShort(latest.date)}`:"Nowy pomiar";
    title.textContent="Pomiary";
  }
}
function renderToday(){
  const next=nextPendingSession(),activeWeek=activePlanWeek(),items=schedule().filter(s=>s.week===activeWeek),completed=items.filter(sessionDone),lastDone=completed.slice().sort((a,b)=>String(sessionPerformedDate(b)).localeCompare(String(sessionPerformedDate(a))))[0];
  const featured=[];if(lastDone)featured.push(lastDone);if(next&&!featured.some(x=>x.id===next.id))featured.push(next);for(const item of items){if(featured.length>=2)break;if(!featured.some(x=>x.id===item.id))featured.push(item)}
  const w=next?workout(next.workoutId):null;
  const hero=next?`<section class="today-hero"><div class="eyebrow">Dziś · tydzień ${next.week} z ${TOTAL_WEEKS}</div><h2>${esc(trainingDisplayName(w))}</h2><div class="subtitle">${esc(CURRENT_PLAN.planName||"Aktywny plan")}</div><div class="chips"><span class="chip">${w.exercises.length} ćwiczeń</span><span class="chip">${seriesText(workoutPlannedSets(w,next))}</span>${w.focus?`<span class="chip">${esc(w.focus)}</span>`:""}</div><button class="btn full" onclick='setSession(${JSON.stringify(next)})'>${sessionProgress(next)>0?"Kontynuuj trening":"Zacznij trening"} <span aria-hidden="true">→</span></button></section>`:`<section class="today-hero"><div class="eyebrow">Plan ukończony</div><h2>Dobra robota</h2><div class="subtitle">Wszystkie zaplanowane treningi są zapisane.</div></section>`;
  const list=featured.map(item=>{const done=sessionDone(item),wo=workout(item.workoutId),date=sessionPerformedDate(item),rpe=averageRpeForSession(item);return `<button class="today-item ${done?"done":""}" onclick='setSession(${JSON.stringify(item)})'><span class="badge">${done?`<i data-lucide="check"></i>`:sessionLetter(item.workoutId)}</span><span><strong>${esc(trainingDisplayName(wo))}</strong><small>${done?`${dateShort(date)} · ukończony`:`${dateShort(item.nominalDate)} · zaplanowany`}</small></span><span class="trailing">${done&&rpe?`RPE ${rpe}`:done?"":`<i data-lucide="chevron-right"></i>`}</span></button>`}).join("");
  document.getElementById("view").innerHTML=`<div class="today-screen">${hero}<div class="section-head" style="margin-top:22px"><strong>Ten tydzień</strong><span>${completed.length} z ${items.length} ukończone</span></div><div class="week-segments">${items.map(x=>`<span class="${sessionDone(x)?"done":""}"></span>`).join("")}</div><div class="today-list">${list||`<div class="empty">Brak sesji w tym tygodniu.</div>`}</div></div>`;
}
function renderCalendar(){
  const sessions=schedule();
  let html=`<div class="calendar">`;
  for(let week=1;week<=TOTAL_WEEKS;week++){
    const items=sessions.filter(x=>x.week===week),doneCount=items.filter(sessionDone).length;
    html+=`<section class="weekCard"><div class="weekHead"><strong>Tydzień ${week}</strong><span class="${doneCount===items.length&&items.length?"complete":""}">${doneCount}/${items.length} wykonane</span></div><div class="days">`;
    for(const it of items){
      const status=sessionStatus(it),progress=sessionProgress(it),performed=sessionPerformedDate(it);
      const statusText=status==="done"?"wykonany":status==="due"?"dziś":"do zrobienia";
      const dateText=status==="done"?dateLabel(performed):status==="due"?(progress?"w toku":"zacznij"):progress?`${progress}% zapisane`:"przyszły";
      html+=`<button class="dayBtn status-${status}" aria-label="Tydzień ${week}, trening ${sessionLetter(it.workoutId)}, ${statusText}" onclick='setSession(${JSON.stringify(it)})'><span class="tile-status">${statusText}</span><span class="name">${sessionLetter(it.workoutId)}</span><span class="date">${dateText}</span><span class="tile-bottom"><span class="bar"><span style="display:block;width:${progress}%"></span></span><span class="percent">${progress}%</span></span></button>`;
    }
    html+=`</div></section>`;
  }
  document.getElementById("view").innerHTML=html+`</div>`;
}
function renderSession(){
  const sess=currentSession(),w=workout(sess.workoutId);
  if(state.mode==="history-detail"){document.getElementById("view").innerHTML=historyDetailHTML(sess);return}
  if(sessionDone(sess)){document.getElementById("view").innerHTML=finishHTML(sess);return}
  const group=currentSuperset();
  if(group){renderSupersetSession(sess,w,group);return}
  const ex=exercise(),mode=exerciseMode(ex,sess),sets=setsFor(ex),skipped=skipFor(ex,sess),video=videoForExercise(ex.name);
  const rawSets=String(ex.sets||"").trim(),rawReps=String(ex.reps||"").trim();
  const setLabel=mode==="sets"&&rawSets&&!/^[-—]$/.test(rawSets)?esc(seriesText(rawSets)):"";
  const repLabel=rawReps&&!/^[-—]$/.test(rawReps)?(mode==="time"?esc(rawReps):`${esc(rawReps)} powt.`):"";
  const chips=[setLabel,repLabel,sets[0]?.kg?`cel ${esc(sets[0].kg)} kg`:""].filter(Boolean);
  const content=skipped?`<div class="progression-note"><strong>Ćwiczenie pominięte.</strong><br>${esc(skipped.reason)}</div>`:mode==="time"?timeHTML(sets[0]):mode==="done"?doneHTML(sets[0]):`<div class="sets-table"><div class="sets-head"><span>Nr</span><span>kg</span><span>powt.</span><span>RPE</span><span></span></div>${sets.map((s,i)=>setHTML(s,i,sets)).join("")}<button class="add-set" onclick="addSet()">+ Dodaj serię</button></div>`;
  document.getElementById("view").innerHTML=`<div class="session-shell"><header class="session-head"><div class="session-head-row"><button class="icon-btn" onclick="exitSession()" aria-label="Zamknij trening"><i data-lucide="x"></i></button><div class="session-head-title">${esc(trainingDisplayName(w))}</div><div class="session-count">${state.exerciseIndex+1} / ${w.exercises.length}</div></div><div class="exerciseProgress">${sessionProgressHTML(w,sess)}</div></header><main class="session-body"><div class="exercise-code">${exerciseCode()}</div><div class="exercise-title">${esc(ex.name)}</div><div class="chips">${chips.map((x,i)=>`<span class="chip ${i===2?"goal":""}">${x}</span>`).join("")}</div>${video?`<button class="technique-btn" onclick="toggleVideo('${esc(ex.name)}')"><span class="play"><i data-lucide="${state.videoOpen[ex.name]?"pause":"play"}"></i></span>${state.videoOpen[ex.name]?"Ukryj technikę":"Zobacz technikę"}</button>${state.videoOpen[ex.name]?videoEmbed(ex.name):""}`:""}${ex.notes?`<div class="progression-note">${esc(ex.notes)}</div>`:""}${modeSwitchHTML(mode)}${content}<div class="exercise-note-row"><textarea placeholder="Notatka do ćwiczenia" oninput="state.notes[exerciseKey()]=this.value;save()">${esc(state.notes[exerciseKey()]||"")}</textarea></div><div class="exercise-tools"><button class="btn ghost tiny" onclick="${skipped?"unskipExercise()":"skipExercise()"}">${skipped?"Cofnij pominięcie":"Pomiń ćwiczenie"}</button>${mode==="sets"?`<button class="btn ghost tiny" onclick="removeSet()">Usuń serię</button>`:""}</div></main><footer class="session-footer"><button class="icon-btn" onclick="prevExercise()" ${state.exerciseIndex===0?"disabled":""} aria-label="Poprzednie ćwiczenie"><i data-lucide="chevron-left"></i></button><button class="btn" onclick="nextExercise()" ${state.exerciseIndex>=w.exercises.length-1?"disabled":""}>Następne ćwiczenie <span aria-hidden="true">→</span></button></footer></div>`;
}
function sessionProgressHTML(w,sess,activeGroup=null){return w.exercises.map((ex,index)=>{const group=supersetGroupForExercise(ex,w,sess),active=activeGroup?group?.key===activeGroup.key:index===state.exerciseIndex;return `<span class="dot ${exerciseDone(ex,sess)?"done":active?"current":""} ${group?"superset":""}"></span>`}).join("")}
function renderSupersetSession(sess,w,group){
  if(state.exerciseIndex!==group.startIndex){state.exerciseIndex=group.startIndex;save()}
  const {rounds,sequence}=supersetSequence(group,sess),firstPending=sequence.findIndex(item=>!item.set.done);
  const currentRound=firstPending>=0?sequence[firstPending].round:Math.max(0,rounds-1);
  const indexed=sequence.map((item,index)=>({...item,index}));
  const roundsHTML=Array.from({length:rounds},(_,round)=>{
    const items=indexed.filter(item=>item.round===round);
    const done=items.length&&items.every(item=>item.set.done);
    return `<section class="superset-round ${round===currentRound&&!done?"current":""}"><div class="superset-round-head"><span>Runda ${round+1} z ${rounds}</span><span>${done?"ukończona":round===currentRound?"teraz":""}</span></div>${items.map(item=>supersetSetHTML(item,group,sess,firstPending)).join("")}</section>`;
  }).join("");
  const tools=group.members.map(ex=>supersetExerciseToolsHTML(ex,group,sess)).join("");
  document.getElementById("view").innerHTML=`<div class="session-shell"><header class="session-head"><div class="session-head-row"><button class="icon-btn" onclick="exitSession()" aria-label="Zamknij trening"><i data-lucide="x"></i></button><div class="session-head-title">${esc(trainingDisplayName(w))}</div><div class="session-count">${group.startIndex+1}–${group.endIndex+1} / ${w.exercises.length}</div></div><div class="exerciseProgress">${sessionProgressHTML(w,sess,group)}</div></header><main class="session-body superset-body"><div class="superset-kicker"><span>${esc(group.label||"Superseria")}</span><span>${group.members.length} ćw.</span></div><div class="superset-title">${group.members.map(ex=>esc(ex.name)).join(" + ")}</div><div class="superset-subtitle">Serie wykonuj naprzemiennie. Odpoczynek dopiero po całej rundzie.</div><div class="superset-rounds">${roundsHTML||`<div class="empty">Brak serii w superserii.</div>`}</div><div class="superset-tools">${tools}</div></main><footer class="session-footer"><button class="icon-btn" onclick="prevExercise()" ${group.startIndex===0?"disabled":""} aria-label="Poprzednie ćwiczenie"><i data-lucide="chevron-left"></i></button><button class="btn" onclick="nextExercise()" ${group.endIndex>=w.exercises.length-1?"disabled":""}>Następne ćwiczenie <span aria-hidden="true">→</span></button></footer></div>`;
}
function supersetSetHTML(item,group,sess,firstPending){
  const {ex,set,setIndex,index,round}=item,locked=firstPending>=0&&index>firstPending&&!set.done,video=videoForExercise(ex.name),showDetails=round===0;
  const previous=previousSetHint(setIndex,ex,sess);
  return `<article class="superset-step ${set.done?"done":""} ${locked?"locked":""}" data-ss-step="${index}"><div class="superset-step-head"><span class="superset-member">${supersetMemberLabel(ex,group)}</span><span class="superset-step-title"><strong>${esc(ex.name)}</strong><small>seria ${setIndex+1}</small></span>${video&&showDetails?`<button class="technique-btn" onclick="toggleVideo('${esc(ex.name)}')" aria-label="${state.videoOpen[ex.name]?"Ukryj":"Pokaż"} technikę ${esc(ex.name)}"><span class="play"><i data-lucide="${state.videoOpen[ex.name]?"pause":"play"}"></i></span></button>`:""}</div><div class="superset-inputs"><input inputmode="decimal" aria-label="${esc(ex.name)}, kilogramy, seria ${setIndex+1}" placeholder="kg" value="${esc(set.kg)}" oninput="updateExerciseSet('${ex.id}','${set.id}','kg',this.value)"><input inputmode="numeric" aria-label="${esc(ex.name)}, powtórzenia, seria ${setIndex+1}" placeholder="powt." value="${esc(set.reps)}" oninput="updateExerciseSet('${ex.id}','${set.id}','reps',this.value)">${supersetRpeSelectHTML(ex,set,setIndex)}<button class="check-btn ${set.done?"done":""}" onclick="toggleSupersetSet('${ex.id}','${set.id}')" aria-label="${set.done?"Cofnij":"Zalicz"} ${esc(ex.name)}, seria ${setIndex+1}"><i data-lucide="check"></i></button></div>${previous?`<div class="previous-set-hint">${esc(previous)}</div>`:""}${showDetails&&ex.notes?`<div class="superset-coach-note">${esc(ex.notes)}</div>`:""}${showDetails&&state.videoOpen[ex.name]?videoEmbed(ex.name):""}</article>`;
}
function supersetRpeSelectHTML(ex,set,setIndex){return `<select aria-label="${esc(ex.name)}, RPE, seria ${setIndex+1}" onchange="updateExerciseSet('${ex.id}','${set.id}','rpe',this.value)"><option value="">—</option>${[6,7,8,9,10].map(value=>`<option value="${value}" ${String(set.rpe)===String(value)?"selected":""}>${value}</option>`).join("")}</select>`}
function supersetExerciseToolsHTML(ex,group,sess){
  const skipped=skipFor(ex,sess);
  return `<section class="superset-tool"><div class="superset-tool-head"><strong><span class="superset-member" style="display:inline-grid;margin-right:6px">${supersetMemberLabel(ex,group)}</span>${esc(ex.name)}</strong><span class="subtitle">${skipped?"pominięte":seriesText(setsFor(ex,sess).length)}</span></div>${skipped?`<div class="progression-note"><strong>Pominięte:</strong> ${esc(skipped.reason)}</div>`:`<textarea placeholder="Notatka do ${esc(ex.name)}" oninput="updateExerciseNote('${ex.id}',this.value)">${esc(state.notes[exerciseKey(ex)]||"")}</textarea>`}<div class="superset-tool-actions"><button class="btn ghost tiny" onclick="${skipped?`unskipExerciseById('${ex.id}')`:`skipExerciseById('${ex.id}')`}">${skipped?"Cofnij pominięcie":"Pomiń"}</button>${!skipped?`<button class="btn ghost tiny" onclick="addSetForExercise('${ex.id}')">+ Seria</button><button class="btn ghost tiny" onclick="removeSetForExercise('${ex.id}')">Usuń serię</button>`:""}</div></section>`;
}
function modeSwitchHTML(mode){return `<div class="mode-switch" role="group" aria-label="Tryb ćwiczenia"><button class="${mode==="sets"?"active":""}" onclick="setExerciseMode('sets')">Serie</button><button class="${mode==="time"?"active":""}" onclick="setExerciseMode('time')">Czas</button><button class="${mode==="done"?"active":""}" onclick="setExerciseMode('done')">Wykonane</button></div>`}
function rpeSelectHTML(s){return `<select aria-label="RPE" onchange="updateSet('${s.id}','rpe',this.value)"><option value="">—</option>${[6,7,8,9,10].map(v=>`<option value="${v}" ${String(s.rpe)===String(v)?"selected":""}>${v}</option>`).join("")}</select>`}
function timeHTML(s){s=s||setsFor()[0];const previous=previousSetHint(0);return `<div class="card time-card ${s.done?"done":""}"><div class="field"><label>Czas / dystans</label><input inputmode="text" placeholder="np. 12 min" value="${esc(s.reps||"")}" oninput="updateSet('${s.id}','reps',this.value)"></div><div class="field"><label>Poziom / opór</label><input inputmode="text" placeholder="opcjonalnie" value="${esc(s.kg||"")}" oninput="updateSet('${s.id}','kg',this.value)"></div><div class="field"><label>RPE</label>${rpeSelectHTML(s)}</div>${previous?`<div class="previous-set-hint">${esc(previous)}</div>`:""}<button class="btn full" style="margin-top:12px" onclick="toggleSet('${s.id}')">${s.done?"Cofnij":"Zrobione"}</button></div>`}
function doneHTML(s){s=s||setsFor()[0];return `<div class="card done-card ${s.done?"done":""}"><textarea placeholder="Notatka opcjonalnie" oninput="updateSet('${s.id}','freeNote',this.value)">${esc(s.freeNote||"")}</textarea><button class="btn full" style="margin-top:12px" onclick="toggleSet('${s.id}')">${s.done?"Cofnij":"Zrobione"}</button></div>`}
function setHTML(s,i,sets){const first=sets.findIndex(x=>!x.done),locked=i>first&&first>=0,previous=previousSetHint(i);return `<div class="set-row ${s.done?"done":""} ${locked?"locked":""}"><span class="set-number">${i+1}</span><input inputmode="decimal" aria-label="Kilogramy, seria ${i+1}" placeholder="kg" value="${esc(s.kg)}" oninput="updateSet('${s.id}','kg',this.value)"><input inputmode="numeric" aria-label="Powtórzenia, seria ${i+1}" placeholder="powt." value="${esc(s.reps)}" oninput="updateSet('${s.id}','reps',this.value)">${rpeSelectHTML(s)}<button class="check-btn ${s.done?"done":""}" onclick="toggleSet('${s.id}')" aria-label="${s.done?"Cofnij serię":"Zalicz serię"} ${i+1}"><i data-lucide="check"></i></button>${previous?`<span class="previous-set-hint">${esc(previous)}</span>`:""}</div>`}
function updateSet(id,field,value){const s=setsFor().find(x=>x.id===id);if(s)s[field]=value;save()}
function updateExerciseSet(exerciseId,setId,field,value){const ex=exerciseById(exerciseId);if(!ex)return;const set=setsFor(ex).find(item=>item.id===setId);if(set)set[field]=value;save()}
function updateExerciseNote(exerciseId,value){const ex=exerciseById(exerciseId);if(!ex)return;state.notes[exerciseKey(ex)]=value;save()}
function previousExercisePerformance(ex=exercise(),sess=currentSession()){
  const past=schedule().filter(item=>String(item.id)!==String(sess.id)&&Number(item.workoutId)===Number(sess.workoutId)&&Number(item.week)<Number(sess.week)).sort((a,b)=>(Number(b.week)-Number(a.week))||String(b.date||"").localeCompare(String(a.date||"")));
  for(const previousSession of past){
    const sets=existingSetsFor(ex,previousSession);
    if(sets.some(set=>set.done&&(set.kg||set.reps||set.rpe||set.freeNote)))return{session:previousSession,sets};
  }
  return null;
}
function previousSetHint(setIndex,ex=exercise(),sess=currentSession()){
  const previous=previousExercisePerformance(ex,sess),set=previous?.sets?.[setIndex];
  if(!set||!set.done||!(set.kg||set.reps||set.rpe))return"";
  const value=formatSetSummary(set,exerciseMode(ex,previous.session));
  return value?`Poprzednio (${dateShort(sessionPerformedDate(previous.session)||previous.session.date)}): ${value}`:"";
}
function skipExercise(){skipExerciseById(exercise().id)}
function skipExerciseById(exerciseId){const ex=exerciseById(exerciseId);if(!ex)return;const reason=prompt(`Dlaczego pomijasz ${ex.name}? Wpisz krótką notatkę dla trenera.`);if(!reason||!reason.trim()){showToast("Notatka jest wymagana");return}state.skips=state.skips||{};state.skips[exerciseKey(ex)]={reason:reason.trim(),at:new Date().toISOString()};save();render()}
function unskipExercise(){unskipExerciseById(exercise().id)}
function unskipExerciseById(exerciseId){const ex=exerciseById(exerciseId);if(ex&&state.skips)delete state.skips[exerciseKey(ex)];save();render()}
function toggleSet(id){const sets=setsFor(),idx=sets.findIndex(x=>x.id===id),first=sets.findIndex(x=>!x.done);if(!sets[idx])return;if(!sets[idx].done&&first>=0&&idx>first)return;sets[idx].done=!sets[idx].done;render();if(sets[idx].done&&exerciseDone(exercise()))celebrateNext()}
function toggleSupersetSet(exerciseId,setId){
  const group=currentSuperset(),ex=exerciseById(exerciseId);
  if(!group||!ex)return;
  const {sequence}=supersetSequence(group),targetIndex=sequence.findIndex(item=>item.ex.id===ex.id&&item.set.id===setId),firstPending=sequence.findIndex(item=>!item.set.done);
  if(targetIndex<0)return;
  const set=sequence[targetIndex].set;
  if(!set.done&&firstPending>=0&&targetIndex>firstPending)return;
  set.done=!set.done;
  if(set.done&&supersetDone(group)){
    render();
    celebrateSupersetNext(group);
    return;
  }
  render();
  if(set.done)requestAnimationFrame(()=>document.querySelector(`[data-ss-step="${targetIndex+1}"] input`)?.focus());
}
function addSet(){addSetForExercise(exercise().id)}
function addSetForExercise(exerciseId){const ex=exerciseById(exerciseId);if(!ex)return;const sets=setsFor(ex);sets.push({id:uid(),note:`Seria ${sets.length+1}`,kg:"",reps:"",rpe:"",done:false,freeNote:""});render()}
function removeSet(){removeSetForExercise(exercise().id)}
function removeSetForExercise(exerciseId){const ex=exerciseById(exerciseId);if(!ex)return;const sets=setsFor(ex);if(sets.length>1)sets.pop();render()}
function nextExercise(){const w=workout(),group=currentSuperset(),nextIndex=group?group.endIndex+1:state.exerciseIndex+1;state.exerciseIndex=Math.min(w.exercises.length-1,nextIndex);render();scrollToExerciseTop()}

function localSessionCompleteFromBase(base){const parts=String(base||"").split("__");if(parts.length<2)return false;const sid=parts[1];const sess=schedule().find(x=>x.id===sid);if(!sess)return false;const w=workout(sess.workoutId);if(!w.exercises.length)return false;return w.exercises.every(ex=>{const key=`${base}__E${ex.no}`;const sets=state.logs[key];return sets&&sets.length>0&&sets.every(s=>s.done);});}
function migrateLegacyLocalKeys(){
  const migrateMap=(obj)=>{if(!obj)return;Object.keys(obj).forEach(key=>{const parts=key.split("__");if(parts.length>=4&&/^\d{4}-\d{2}-\d{2}$/.test(parts[1])){const nk=[parts[0],parts[2],...parts.slice(3)].join("__");if(!obj[nk])obj[nk]=obj[key];delete obj[key];}})};
  migrateMap(state.logs);migrateMap(state.skips);migrateMap(state.notes);
  if(state.sessionNotes){Object.keys(state.sessionNotes).forEach(key=>{const parts=key.split("__");if(parts.length===3&&/^\d{4}-\d{2}-\d{2}$/.test(parts[1])){const nk=`${parts[0]}__${parts[2]}`;if(!state.sessionNotes[nk])state.sessionNotes[nk]=state.sessionNotes[key];delete state.sessionNotes[key];}})}
  if(state.serverStatus){Object.keys(state.serverStatus).forEach(key=>{const parts=key.split("__");if(parts.length===3&&/^\d{4}-\d{2}-\d{2}$/.test(parts[1])){const nk=`${parts[0]}__${parts[2]}`;if(!state.serverStatus[nk])state.serverStatus[nk]=state.serverStatus[key];delete state.serverStatus[key];}})}
  save();
}
function pruneLocalCacheBeforeServerHydrate(serverLogs,serverStatuses){
  const serverBases=new Set();
  (serverLogs||[]).forEach(r=>{const b=serverSessionBaseFromRow(r);if(b)serverBases.add(b)});
  (serverStatuses||[]).forEach(r=>{const b=serverSessionBaseFromRow(r);if(b)serverBases.add(b)});
  state.serverStatus=state.serverStatus||{};
  Object.keys(state.serverStatus).forEach(key=>{if(key.startsWith(planId()+"__"))delete state.serverStatus[key];});
  Object.keys(state.logs||{}).forEach(key=>{if(!key.startsWith(planId()+"__"))return;const base=sessionBaseFromLogKey(key);if(!base)return;if(serverBases.has(base)){delete state.logs[key];return;}if(localSessionCompleteFromBase(base)){delete state.logs[key];}});
  save();
}
function pruneCompletedLocalSessionsBeforeBackend(){
  const bases=new Set();
  Object.keys(state.logs||{}).forEach(key=>{if(!key.startsWith(planId()+"__"))return;const base=sessionBaseFromLogKey(key);if(base)bases.add(base);});
  bases.forEach(base=>{if(localSessionCompleteFromBase(base)){Object.keys(state.logs||{}).forEach(key=>{if(key.startsWith(base+"__E"))delete state.logs[key];});}});
  save();
}

function byOrder(a,b){return Number(a.order_index||a.block_index||0)-Number(b.order_index||b.block_index||0)}
function formatKg(v){if(v===null||v===undefined||v==="")return"";return String(Number(v)).replace(/\.0+$/,"")}
function buildDays(count){const labels=["wt.","czw.","sob.","ndz.","wt.","czw."],offsets=[0,2,4,5,7,9];return Array.from({length:Math.max(1,count||4)},(_,i)=>({dow:labels[i]||"",workoutId:i+1,offset:offsets[i]??i*2}))}
function trainingExerciseName(te){return te.exercises?.name||te.source_name||te.source_no_text||"Ćwiczenie"}
function progressionMatches(te,week){
  const blocks=DB_PROGRESSION_BLOCKS.filter(b=>Number(b.start_week)<=Number(week)&&Number(b.end_week)>=Number(week));
  const candidates=DB_PROGRESSION_EXERCISES.filter(x=>blocks.some(b=>b.id===x.block_id));
  const exact=candidates.filter(x=>x.training_exercise_id===te.id);
  if(exact.length)return exact;
  const byExercise=candidates.filter(x=>!x.training_exercise_id&&te.exercise_id&&x.exercise_id===te.exercise_id);
  if(byExercise.length)return byExercise;
  const name=normText(trainingExerciseName(te));
  return candidates.filter(x=>!x.training_exercise_id&&normText(x.source_name||x.exercises?.name)===name);
}
function progressionRowsFor(te,week){
  const matches=progressionMatches(te,week);
  if(!matches.length)return[];
  const order=new Map(matches.map((x,i)=>[x.id,Number(x.order_index||i)]));
  const ids=new Set(matches.map(x=>x.id));
  const rows=DB_PROGRESSION_SETS
    .filter(s=>ids.has(s.progression_exercise_id)&&Number(s.week_number)===Number(week))
    .sort((a,b)=>(order.get(a.progression_exercise_id)-order.get(b.progression_exercise_id))||Number(a.set_no||0)-Number(b.set_no||0));
  const out=[];
  for(const row of rows){
    const repeat=Math.max(1,Number(row.set_count)||1);
    for(let i=0;i<repeat;i++)out.push({...row,_expandedIndex:i});
  }
  return out;
}
function prescriptionFromRow(row,i){
  const kg=formatKg(row.kg),load=String(row.load_text||"").trim(),reps=String(row.reps_text||"").trim(),rest=String(row.rest_text||"").trim(),raw=String(row.raw_text||"").trim();
  const note=raw||[load||kg,reps,rest].filter(Boolean).join(" · ")||row.label||`Seria ${Number(row.set_no||i+1)}`;
  return {note,kg:kg||load,reps};
}
function prescriptionsFor(te){
  const out={};
  for(let week=1;week<=TOTAL_WEEKS;week++){
    const rows=progressionRowsFor(te,week);
    if(rows.length)out[String(week)]=rows.map(prescriptionFromRow);
  }
  return out;
}
function mapTrainingExercise(te,i){
  const name=trainingExerciseName(te),type=te.mode||te.exercises?.default_mode||te.exercises?.default_category||"";
  return {id:te.id,no:te.exercise_no||String(i+1),name,sets:te.sets_text||"",reps:te.reps_text||"",rest:te.rest_text||"",notes:te.notes||te.exercises?.notes||"",type,supersetKey:te.superset_key||"",groupLabel:te.group_label||"",orderIndex:te.order_index,dbExerciseId:te.exercise_id,prescriptions:prescriptionsFor(te)};
}
function mapPlanWorkouts(){
  return DB_TRAININGS.slice().sort(byOrder).map((t,i)=>({id:i+1,dbId:t.id,name:t.name||`${i+1} TRENING`,focus:t.focus||"",exercises:DB_TRAINING_EXERCISES.filter(te=>te.training_id===t.id).sort(byOrder).map(mapTrainingExercise)}));
}
function mapDbSessionRow(r){return{plan_id:planId(),planId:planId(),source_plan_key:r.source_plan_key||"",session_id:r.session_id,sessionId:r.session_id,status:r.status,completed_exercises:r.completed_exercises,completedExercises:r.completed_exercises,total_exercises:r.total_exercises,totalExercises:r.total_exercises,timestamp:r.recorded_at||r.updated_at||r.created_at||"",workout_date:r.workout_date,workoutDate:r.workout_date,performed_date:r.performed_date,performedDate:r.performed_date,session_note:r.session_note,sessionNote:r.session_note}}
function mapDbLogRow(r){return{plan_id:planId(),planId:planId(),source_plan_key:r.source_plan_key||"",session_id:r.session_id,sessionId:r.session_id,exercise_no:r.exercise_no,exerciseNo:r.exercise_no,exercise_name:r.exercise_name,exerciseName:r.exercise_name,set_no:r.set_no,setNo:r.set_no,planned_label:r.planned_label,plannedLabel:r.planned_label,kg:r.kg,reps:r.reps_text,reps_text:r.reps_text,rpe:r.rpe,done:r.done,note:r.note,timestamp:r.recorded_at||r.updated_at||r.created_at||""}}
function mapDbMeasurement(r){return{plan_id:planId(),source_plan_key:r.source_plan_key||"",measurement_date:r.measurement_date,date:r.measurement_date,week:r.week_number,Udo:r.udo,Dupa:r.dupa,Brzuch:r.brzuch,Klatka:r.klatka,Biceps:r.biceps,Szyja:r.szyja,Waga:r.waga}}
async function must(res){if(res.error)throw res.error;return res.data||[]}
async function apiGetWorkoutLog(){
  try{
    if(!ATHLETE||!DB_PLAN)return;
    const sessions=await must(await sb.from("workout_sessions").select("id,athlete_id,plan_id,source_plan_key,client_key,session_id,workout_date,performed_date,week_number,workout_id,workout_name,status,completed_exercises,total_exercises,session_note,recorded_at,created_at,updated_at").eq("athlete_id",ATHLETE.id).eq("plan_id",DB_PLAN.id).order("workout_date",{ascending:false}));
    DB_WORKOUT_SESSIONS=sessions;
    const existingSource=sessions.find(s=>s.source_plan_key)?.source_plan_key;
    if(existingSource)CURRENT_PLAN.sourcePlanKey=existingSource;
    let logs=[];
    const sessionIds=sessions.map(s=>s.id);
    if(sessionIds.length)logs=await must(await sb.from("workout_set_logs").select("id,workout_session_id,athlete_id,plan_id,source_plan_key,client_key,session_id,exercise_no,exercise_name,set_no,planned_label,kg,reps_text,rpe,done,note,recorded_at,created_at,updated_at").in("workout_session_id",sessionIds).order("session_id").order("set_no"));
    const mappedLogs=logs.map(mapDbLogRow),mappedStatuses=sessions.map(mapDbSessionRow);
    pruneLocalCacheBeforeServerHydrate(mappedLogs,mappedStatuses);
    hydrateLogsFromServer(mappedLogs);
    hydrateStatusesFromServer(mappedStatuses);
    render();
  }catch(e){console.warn(e)}
}

async function apiGetPlan(){
  try{
    apiStatus="Łączenie z Supabase…";apiStatusKind="loading";render();
    const athletes=await must(await sb.from("athletes").select("id,client_key,name,status,notes").eq("client_key",CLIENT_ID).limit(1));
    ATHLETE=athletes[0];
    if(!ATHLETE||ATHLETE.status==="archived")throw new Error("Nie znaleziono aktywnego podopiecznego");
    PLAN_LINKS=await must(await sb.from("plan_athletes").select("plan_id,assigned_at,plans(id,slug,name,start_date,weeks,status,notes,created_at,published_at)").eq("athlete_id",ATHLETE.id).order("assigned_at",{ascending:false}));
    const active=PLAN_LINKS.find(l=>l.plans?.status==="active")||PLAN_LINKS[0];
    if(!active?.plans)throw new Error("Podopieczny nie ma przypisanego planu");
    DB_PLAN=active.plans;
    CURRENT_PLAN={planId:DB_PLAN.slug||DB_PLAN.id,planName:DB_PLAN.name||DB_PLAN.slug||"Plan",planStatus:DB_PLAN.status||"active",clientId:CLIENT_ID,clientName:ATHLETE.name||CLIENT_ID,dbPlanId:DB_PLAN.id};
    if(DB_PLAN.start_date)START_DATE=String(DB_PLAN.start_date).slice(0,10);
    TOTAL_WEEKS=Number(DB_PLAN.weeks)||TOTAL_WEEKS;
    const [trainings,blocks,rpeRows]=await Promise.all([
      must(await sb.from("trainings").select("id,plan_id,name,focus,order_index").eq("plan_id",DB_PLAN.id).order("order_index")),
      must(await sb.from("progression_blocks").select("id,plan_id,name,block_index,start_week,end_week,notes").eq("plan_id",DB_PLAN.id).order("block_index")),
      must(await sb.from("rpe_scale").select("rpe,description,reserve").order("rpe",{ascending:false}))
    ]);
    DB_TRAININGS=trainings;DB_PROGRESSION_BLOCKS=blocks;DAYS=buildDays(DB_TRAININGS.length);
    const trainingIds=DB_TRAININGS.map(t=>t.id);
    DB_TRAINING_EXERCISES=trainingIds.length?await must(await sb.from("training_exercises").select("id,training_id,exercise_id,exercise_no,order_index,sets_text,reps_text,rest_text,weight,load_text,tempo_text,use_wg,progression_mode,superset_key,group_label,mode,notes,source_name,source_no_text,video_hint,exercises(id,name,youtube_url,notes,default_mode,default_category)").in("training_id",trainingIds).order("order_index")):[];
    const blockIds=DB_PROGRESSION_BLOCKS.map(b=>b.id);
    DB_PROGRESSION_EXERCISES=blockIds.length?await must(await sb.from("progression_exercises").select("id,block_id,exercise_id,training_exercise_id,order_index,source_name,exercises(id,name)").in("block_id",blockIds).order("order_index")):[];
    const peIds=DB_PROGRESSION_EXERCISES.map(x=>x.id);
    DB_PROGRESSION_SETS=peIds.length?await must(await sb.from("progression_sets").select("id,progression_exercise_id,week_number,set_no,label,reps_text,kg,raw_text,load_text,set_count,is_skip,is_deload,rest_text,notes").in("progression_exercise_id",peIds).order("week_number")):[];
    PLAN=mapPlanWorkouts();
    VIDEOS={};
    DB_TRAINING_EXERCISES.forEach(te=>{const url=te.exercises?.youtube_url||te.video_hint;if(url)VIDEOS[trainingExerciseName(te)]=url});
    if(rpeRows.length)RPE=rpeRows.map(x=>[String(x.rpe),x.description,x.reserve||""]);
    apiStatus=`Połączono · ${CURRENT_PLAN.clientName||CLIENT_ID} · ${CURRENT_PLAN.planId} · start ${START_DATE}`;
    apiStatusKind="ok";
  }catch(e){console.error(e);apiStatus="Nie udało się pobrać danych z Supabase";apiStatusKind="err"}finally{render()}
}
async function apiGetMeasurements(){
  try{
    if(!ATHLETE||!DB_PLAN)return;
    const rows=await must(await sb.from("athlete_measurements").select("id,athlete_id,plan_id,source_plan_key,client_key,measurement_date,week_number,waga,udo,dupa,brzuch,klatka,biceps,szyja,recorded_at").eq("athlete_id",ATHLETE.id).eq("plan_id",DB_PLAN.id).order("measurement_date",{ascending:false}));
    Object.keys(state.measurements||{}).forEach(k=>{if(k.startsWith(planId()+"__"))delete state.measurements[k]});
    rows.map(mapDbMeasurement).forEach(r=>{const pid=r.plan_id||planId();if(pid!==planId())return;const key=`${pid}__${r.measurement_date||r.date||todayKey()}__W${r.week||""}`;state.measurements[key]={};MEASUREMENTS.forEach(m=>{if(r[m]!==null&&r[m]!==undefined&&r[m]!=="")state.measurements[key][m]=r[m]})});
    save();
    render();
  }catch(e){console.warn(e)}
}
apiGetPlan().then(()=>{migrateLegacyLocalKeys();pruneCompletedLocalSessionsBeforeBackend();render();return apiGetWorkoutLog()}).then(()=>apiGetMeasurements());
</script>
