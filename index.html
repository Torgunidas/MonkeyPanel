<style>
:root{--bg:#080808;--card:#141414;--card2:#202020;--line:#303030;--text:#f4f4f5;--muted:#a1a1aa;--green:#14532d;--green2:#22c55e;--gold:#422006;--red:#450a0a;--blue:#111827;--accent:#f4f4f5;--accentText:#09090b}*{box-sizing:border-box}html{overflow-y:scroll;scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}.app{width:min(560px,100%);margin:0 auto;min-height:100dvh;padding:12px 12px 90px}.top{position:sticky;top:0;z-index:20;margin:-12px -12px 12px;padding:14px 12px 10px;background:rgba(8,8,8,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:900}h1{font-size:28px;line-height:1.05;margin:3px 0 2px}h2{font-size:22px;margin:0 0 8px}.subtitle{color:var(--muted);font-size:15px}.api{font-size:13px;margin-top:5px}.api.ok{color:#86efac}.api.err{color:#fca5a5}.api.loading{color:#fde68a}.progress{height:9px;background:#262626;border-radius:99px;margin-top:14px;overflow:hidden}.progress div{height:100%;background:#f4f4f5;width:0%;transition:.25s}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:10px 0 12px}.tab{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:18px;padding:9px 4px;font-size:11px}.tab.active{background:var(--accent);color:var(--accentText);border-color:var(--accent)}.card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.25)}.btn{border:0;border-radius:18px;padding:14px;font-weight:900;background:var(--accent);color:var(--accentText)}.btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--line)}.btn.good{background:var(--green);color:white}.btn.full{width:100%}.btn.tiny{padding:5px 10px;border-radius:999px;font-size:12px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.kpi{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:12px;text-align:center}.kpi strong{display:block;font-size:24px}.legend{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 14px}.legend span{font-size:12px;color:#ddd;border:1px solid var(--line);border-radius:999px;padding:5px 8px}.calendar{display:grid;gap:12px}.weekCard{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:12px}.weekHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.days{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.dayBtn{min-height:112px;text-align:left;border-radius:20px;border:1px solid var(--line);padding:10px;color:var(--text);background:#111}.dayBtn .date{font-size:14px;color:#ddd;line-height:1.15}.dayBtn .name{font-size:21px;font-weight:950;line-height:1.05;margin-top:5px}.dayBtn .bar{height:8px;border-radius:999px;background:rgba(255,255,255,.18);margin-top:8px;overflow:hidden}.dayBtn .bar div{height:100%;border-radius:999px;background:white;width:0%}.status-done{background:#052e16;border-color:#166534}.status-due{background:var(--gold);border-color:#92400e}.status-missed{background:var(--red);border-color:#991b1b}.status-future{background:var(--blue);border-color:#374151}.exercise-title{font-size:32px;line-height:1.04;margin:6px 0 12px;font-weight:950}.exerciseTop{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}.pill{display:inline-flex;align-items:center;border-radius:999px;background:var(--card2);padding:5px 10px;color:var(--muted);font-size:12px}.exerciseProgress{display:flex;gap:5px;margin:12px 0 14px;overflow:hidden}.dot{height:8px;flex:1;border-radius:99px;background:#303030}.dot.done{background:var(--green2)}.dot.current{background:#f4f4f5}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.stat{background:#090909;border-radius:18px;padding:10px;text-align:center}.stat small{display:block;color:var(--muted);font-size:11px;margin-bottom:3px}.note{background:var(--card2);border-radius:18px;padding:12px;color:#e5e5e5;font-size:14px;line-height:1.35;margin:12px 0}.embed{position:relative;width:100%;aspect-ratio:16/9;background:#000;border:1px solid var(--line);border-radius:20px;overflow:hidden;margin:10px 0 12px}.embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}.set{border:1px solid var(--line);background:#090909;border-radius:24px;padding:12px;margin:10px 0}.set.done{border-color:#166534;background:rgba(20,83,45,.28)}.set.locked{opacity:.45}.set.locked input,.set.locked textarea,.set.locked button{pointer-events:none}.doneCompact{display:none;align-items:center;justify-content:space-between;gap:8px}.set.done .doneCompact{display:flex}.set.done .openSet{display:none}.set-head{display:flex;justify-content:space-between;gap:8px;font-weight:900;margin-bottom:8px}.inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}label.small{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}input,textarea{width:100%;background:var(--card2);color:var(--text);border:1px solid #3a3a3a;border-radius:16px;outline:none}input{font-size:19px;font-weight:850;text-align:center;padding:10px 6px}textarea{min-height:68px;padding:12px;resize:vertical}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.measure-row{display:flex;align-items:center;gap:12px;background:#090909;border:1px solid var(--line);border-radius:24px;padding:12px;margin-bottom:10px}.measure-row span{width:86px;font-weight:900}.measure-row input{text-align:right;font-size:24px;padding-right:14px}.historyTable{width:100%;overflow:auto}.historyTable table{min-width:620px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid #333;padding:9px;text-align:left;vertical-align:top}.list{display:grid;gap:10px}.item,.doneItem,.summaryBlock{background:#090909;border:1px solid var(--line);border-radius:22px;padding:12px}.item.activePlan{border-color:#166534;background:#07130b}.planButton{width:100%;text-align:left;color:var(--text)}.summaryLine{display:flex;justify-content:space-between;gap:8px;border-top:1px solid #272727;padding-top:6px;margin-top:6px}.empty{border:1px dashed #444;border-radius:24px;padding:32px;text-align:center;color:var(--muted)}.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:60;max-width:540px;margin:auto;background:#f4f4f5;color:#09090b;border-radius:22px;padding:16px;font-weight:900;text-align:center;box-shadow:0 18px 40px rgba(0,0,0,.45)}.celebrationOverlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;padding:24px;transition:opacity .32s ease}.celebrationCard{width:min(500px,100%);border:1px solid #166534;background:linear-gradient(180deg,#073b1b,#07130b);border-radius:34px;padding:28px;text-align:center;box-shadow:0 30px 90px rgba(0,0,0,.7)}.bananaOne{font-size:76px;line-height:1;margin-bottom:12px}.bananaBunch{font-size:92px;line-height:1;margin-bottom:8px;letter-spacing:-18px}.celebrationTitle{font-size:32px;font-weight:950}.finishScreen{background:linear-gradient(180deg,#073b1b,#0b0b0b 48%);border:1px solid #166534;border-radius:34px;padding:22px}.finishHero{text-align:center;padding:18px 6px 12px}.finishHero h2{font-size:36px;line-height:1.05;margin:0 0 8px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:50;display:flex;align-items:flex-end;padding:12px}.modal .panel{max-width:560px;width:100%;max-height:86dvh;overflow:auto;margin:0 auto;background:#111;border:1px solid var(--line);border-radius:28px;padding:16px}.hidden{display:none!important}.exerciseNav{display:grid;grid-template-columns:1fr 62px 62px;gap:8px;margin-bottom:12px}.exerciseNav .navMini{font-size:26px;line-height:1;padding:12px 0}.btn:disabled{opacity:.38;cursor:not-allowed}.back{margin-bottom:10px}.metaGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.metaBox{background:#090909;border:1px solid var(--line);border-radius:18px;padding:10px}.metaBox small{display:block;color:var(--muted);font-size:11px;margin-bottom:3px}.metaBox strong{font-size:14px;word-break:break-word}
</style>

<body>
<div class="app">
<header class="top"><div class="eyebrow">MonkeyPanel</div><h1 id="headerTitle">Kalendarz treningów</h1><div class="subtitle" id="headerSub">Ładowanie planu…</div><div id="apiStatus" class="api loading">Ładowanie planu…</div><div class="progress"><div id="progressBar"></div></div></header>
<nav class="tabs"><button class="tab active" data-view="train" onclick="setView('train')">🏋️<br>Trening</button><button class="tab" data-view="plan" onclick="setView('plan')">📋<br>Plan</button><button class="tab" data-view="plans" onclick="setView('plans')">📚<br>Plany</button><button class="tab" data-view="measure" onclick="setView('measure')">📏<br>Pomiary</button><button class="tab" data-view="history" onclick="setView('history')">✅<br>Log</button></nav>
<main id="view"></main></div><div id="modalRoot"></div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbx6AQ6v382RXmr6YdisKN5YgKSyTZ35pOE-tR0jhh827Dxvp3EfsT1fZnm31Hu98hY/exec";
const URL_PARAMS=new URLSearchParams(location.search);
const CLIENT_ID=(URL_PARAMS.get("client")||URL_PARAMS.get("clientId")||"gabriel").trim().toLowerCase();
const STATE_KEY=`monkeypanel.alpha.v04.${CLIENT_ID}`;
const START_DATE="2026-05-12";let TOTAL_WEEKS=11;const DAYS=[{dow:"wt.",workoutId:1,offset:0},{dow:"czw.",workoutId:2,offset:2},{dow:"sob.",workoutId:3,offset:4},{dow:"ndz.",workoutId:4,offset:5}];
const MEASUREMENTS=["Udo","Dupa","Brzuch","Klatka","Biceps","Szyja","Waga"];
let PLAN=[{id:1,name:"1 TRENING",focus:"",exercises:[]},{id:2,name:"2 TRENING",focus:"",exercises:[]},{id:3,name:"3 TRENING",focus:"",exercises:[]},{id:4,name:"4 TRENING",focus:"",exercises:[]}];let VIDEOS={};let RPE=[["10","Maksimum. Więcej nie dasz rady.","0"],["9","Bardzo ciężko, ale jedno powtórzenie jeszcze da się zrobić.","1"],["8","Mocno, ale kontrolujesz. 2 powtórzenia w zapasie.","2"],["7","Średnio ciężko. 3 powtórzenia w zapasie.","3"],["6","Lekko.","4+"]];
let CURRENT_PLAN={planId:"loading",planName:"Ładowanie planu",planStatus:"active"};
let state=load(STATE_KEY,{view:"train",mode:"calendar",activeSessionId:null,workoutId:1,week:1,exerciseIndex:0,logs:{},skips:{},serverStatus:{},measurements:{},notes:{},sessionNotes:{},modeOverrides:{},videoOpen:{},planArchive:{},selectedPlanId:null});let apiStatus="Ładowanie planu…",apiStatusKind="loading";
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}}function save(){localStorage.setItem(STATE_KEY,JSON.stringify(state))}function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function scrollToExerciseTop(){requestAnimationFrame(()=>{window.scrollTo({top:0,behavior:"smooth"})})}
window.addEventListener("beforeunload",e=>{if(hasActiveDraft()){e.preventDefault();e.returnValue=""}});
function hasActiveDraft(){if(state.mode!=="session")return false;const sess=currentSession();if(sessionDone(sess))return false;const prefix=planKey(`${sess.date}__${sess.id}__`);return Object.keys(state.logs||{}).some(k=>k.startsWith(prefix)&&Array.isArray(state.logs[k])&&state.logs[k].some(s=>s.kg||s.reps||s.rpe||s.done||s.freeNote)) || Object.keys(state.skips||{}).some(k=>k.startsWith(prefix)) || !!state.sessionNotes?.[sessionKey(sess)]}
function dateObj(iso){const[y,m,d]=iso.split("-").map(Number);return new Date(y,m-1,d)}function isoDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}function addDays(iso,days){const d=dateObj(iso);d.setDate(d.getDate()+days);return isoDate(d)}function todayKey(){return new Date().toISOString().slice(0,10)}function dateLabel(iso){return dateObj(iso).toLocaleDateString("pl-PL",{weekday:"short",day:"2-digit",month:"2-digit"})}
function planId(){return CURRENT_PLAN.planId||"unknown_plan"}function planKey(k){return `${planId()}__${k}`}function schedule(){const out=[];for(let week=1;week<=TOTAL_WEEKS;week++){for(const d of DAYS)out.push({id:`W${week}T${d.workoutId}`,week,date:addDays(START_DATE,(week-1)*7+d.offset),workoutId:d.workoutId})}return out}function workout(id=state.workoutId){return PLAN.find(w=>Number(w.id)===Number(id))||PLAN[0]}function currentSession(){return schedule().find(s=>s.id===state.activeSessionId)||schedule()[0]}function exercise(){const w=workout();return w.exercises[Math.min(state.exerciseIndex,w.exercises.length-1)]||{no:"",name:"Brak ćwiczeń",sets:1,reps:"-",rest:"-",notes:"",type:""}}function exerciseKey(ex=exercise(),sess=currentSession()){return planKey(`${sess.date}__${sess.id}__E${ex.no}`)}function serverSessionKey(sess=currentSession()){return planKey(`${sess.date}__${sess.id}`)}function serverStatusFor(sess=currentSession()){state.serverStatus=state.serverStatus||{};return state.serverStatus[serverSessionKey(sess)]||null}function statusSaysDone(sess=currentSession()){const st=serverStatusFor(sess);return !!st&&(st.status==="done"||String(st.status||"").toLowerCase()==="wykonany"||(Number(st.completed||0)>0&&Number(st.total||0)>0&&Number(st.completed)>=Number(st.total)))}
function sessionKey(sess=currentSession()){return planKey(`${sess.date}__${sess.id}`)}
function exerciseModeKey(ex=exercise()){return planKey(`mode__${norm(ex.name||"")}`)}
function normalizeExerciseType(ex){const raw=norm([ex.name,ex.notes,ex.rest,ex.reps,ex.type].join(" "));if(prescriptionForCurrentWeek(ex).length)return"sets";if(state.modeOverrides&&state.modeOverrides[exerciseModeKey(ex)])return state.modeOverrides[exerciseModeKey(ex)];if((ex.type||"")==="time")return"time";if((ex.type||"")==="mobility"||(ex.type||"")==="warmup")return"done";if((ex.type||"")==="core")return"sets";if(/orbitrek|rower|biezni|bieznia|marsz|cardio|airbike|ergometr|interwal/.test(raw))return"time";if(/rolowanie|rozciaganie|stretch|mobility|mobilizacja|aktywacja|cooldown|rozgrzewka/.test(raw))return"done";if(/plank|dead bug|bird dog|hollow|brzuch|core/.test(raw))return"sets";return"sets"}
function setExerciseMode(mode){const ex=exercise(),key=exerciseKey(ex),old=normalizeExerciseType(ex);if(old===mode)return;const existing=state.logs[key]||[];const dirty=existing.some(s=>s.kg||s.reps||s.rpe||s.done||s.freeNote);if(dirty&&!confirm("Zmiana trybu wyczyści wpisane serie/czas dla tego ćwiczenia. Kontynuować?"))return;state.modeOverrides=state.modeOverrides||{};state.modeOverrides[exerciseModeKey(ex)]=mode;delete state.logs[key];save();render()}
function countSets(ex){const mode=normalizeExerciseType(ex);if(mode==="time"||mode==="done")return 1;const n=parseInt(String(ex.sets||"").match(/\d+/)?.[0]||"0",10);if(n>0)return n;if((ex.type||"")==="core")return 3;return 5}
function prescriptionForCurrentWeek(ex,sess=currentSession()){const p=ex.prescriptions||{};return p[String(sess.week)]||p[sess.week]||[]}
function defaultSets(ex,sess=currentSession()){const mode=normalizeExerciseType(ex);const prescribed=prescriptionForCurrentWeek(ex,sess);if(mode==="sets"&&Array.isArray(prescribed)&&prescribed.length){return prescribed.map((p,i)=>({id:uid(),note:p.note||`Seria ${i+1}`,kg:String(p.kg||""),reps:String(p.reps||""),rpe:"",done:false,freeNote:""}))}if(mode==="time")return[{id:uid(),note:"Czas",kg:"",reps:"",rpe:"",done:false,freeNote:""}];if(mode==="done")return[{id:uid(),note:"Wykonane",kg:"",reps:"",rpe:"",done:false,freeNote:""}];return Array.from({length:countSets(ex)},(_,i)=>({id:uid(),note:`Seria ${i+1}`,kg:"",reps:"",rpe:"",done:false,freeNote:""}))}
function setsFor(ex=exercise(),sess=currentSession()){const key=exerciseKey(ex,sess);if(!state.logs[key])state.logs[key]=defaultSets(ex,sess);return state.logs[key]}function skipFor(ex=exercise(),sess=currentSession()){return state.skips?.[exerciseKey(ex,sess)]||null}function exerciseSkipped(ex,sess=currentSession()){return !!skipFor(ex,sess)}function exerciseDone(ex,sess=currentSession()){if(exerciseSkipped(ex,sess))return true;const s=setsFor(ex,sess);return s.length&&s.every(x=>x.done)}function sessionDone(sess=currentSession()){if(statusSaysDone(sess))return true;const w=workout(sess.workoutId);return w.exercises.length&&w.exercises.every(ex=>exerciseDone(ex,sess))}function sessionProgress(sess=currentSession()){const st=serverStatusFor(sess);if(st&&Number(st.total)>0)return Math.min(100,Math.round(Number(st.completed||0)/Number(st.total)*100));const w=workout(sess.workoutId);if(!w.exercises.length)return 0;if(sessionDone(sess))return 100;return Math.round(w.exercises.filter(ex=>exerciseDone(ex,sess)).length/w.exercises.length*100)}function sessionStatus(sess){if(sessionDone(sess))return"done";if(sess.date<todayKey())return"missed";if(sess.date===todayKey())return"due";return"future"}function statusLabel(s){return s==="done"?"zrobiony":s==="missed"?"pominięty":s==="due"?"dzisiaj":"przyszły"}
function setView(v){state.view=v;if(v!=="train")state.mode="calendar";render();scrollToExerciseTop()}function setSession(sess){state.activeSessionId=sess.id;state.workoutId=sess.workoutId;state.week=sess.week;state.exerciseIndex=0;state.mode="session";state.view="train";render();scrollToExerciseTop()}function exitSession(){state.mode="calendar";render();scrollToExerciseTop()}function overallProgress(){const s=schedule();return Math.round(s.filter(x=>sessionDone(x)).length/s.length*100)}function currentPlanStats(){const s=schedule();const done=s.filter(x=>sessionDone(x)).length;const missed=s.filter(x=>sessionStatus(x)==="missed").length;return{done,missed,total:s.length,progress:Math.round(done/s.length*100)}}
function rememberPlan(){const st=currentPlanStats();state.planArchive[planId()]={planId:planId(),planName:CURRENT_PLAN.planName||planId(),planStatus:CURRENT_PLAN.planStatus||"active",lastSeen:todayKey(),done:st.done,total:st.total,progress:st.progress,startDate:START_DATE};save()}
function render(){rememberPlan();save();document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===state.view));const st=document.getElementById("apiStatus");st.textContent=apiStatus;st.className=`api ${apiStatusKind}`;const sess=currentSession(),w=workout(sess.workoutId);if(state.view==="train"&&state.mode==="session")header(`${w.name} · ${dateLabel(sess.date)}`,`Ćwiczenie ${state.exerciseIndex+1}/${Math.max(1,w.exercises.length)} · tydzień ${sess.week}`);else header(state.view==="plan"?"Rozpiska planu":state.view==="measure"?"Pomiary":state.view==="history"?"Log treningowy":state.view==="plans"?"Moje plany":"Kalendarz treningów",`${CURRENT_PLAN.planName||"Plan"} · ${TOTAL_WEEKS} tygodni · start 12.05.2026`);document.getElementById("progressBar").style.width=`${state.view==="train"&&state.mode==="session"?sessionProgress(sess):overallProgress()}%`;if(state.view==="train"&&state.mode==="calendar")renderCalendar();if(state.view==="train"&&state.mode==="session")renderSession();if(state.view==="plan")renderPlan();if(state.view==="plans")renderPlans();if(state.view==="measure")renderMeasurements();if(state.view==="history")renderHistory()}function header(t,s){document.getElementById("headerTitle").textContent=t;document.getElementById("headerSub").textContent=s}
function renderCalendar(){const s=schedule(),done=s.filter(x=>sessionStatus(x)==="done").length,miss=s.filter(x=>sessionStatus(x)==="missed").length,left=s.length-done-miss;let html=`<div class="summary"><div class="kpi"><strong>${done}</strong><span class="subtitle">zrobione</span></div><div class="kpi"><strong>${miss}</strong><span class="subtitle">pominięte</span></div><div class="kpi"><strong>${left}</strong><span class="subtitle">przed Tobą</span></div></div><div class="legend"><span>🟡 do zrobienia</span><span>🟢 zrobiony</span><span>🔴 po dacie</span><span>🔵 przyszły</span></div><div class="calendar">`;for(let week=1;week<=TOTAL_WEEKS;week++){const items=s.filter(x=>x.week===week);html+=`<section class="weekCard"><div class="weekHead"><strong>Tydzień ${week}</strong><span class="subtitle">${dateLabel(items[0].date)} – ${dateLabel(items[3].date)}</span></div><div class="days">`;for(const it of items){const st=sessionStatus(it),prog=sessionProgress(it),wo=workout(it.workoutId);html+=`<button class="dayBtn status-${st}" onclick='setSession(${JSON.stringify(it)})'><div class="date">${dateLabel(it.date)}</div><div class="name">${wo.name.replace(" TRENING","")}</div><div class="subtitle">${statusLabel(st)}</div><div class="bar"><div style="width:${prog}%"></div></div><div class="subtitle">${prog}%</div></button>`}html+=`</div></section>`}document.getElementById("view").innerHTML=html+`</div>`}
function renderSession(){const sess=currentSession(),w=workout(),ex=exercise(),mode=normalizeExerciseType(ex),sets=setsFor(ex),skipped=skipFor(ex,sess);if(sessionDone(sess)){document.getElementById("view").innerHTML=finishHTML(sess);return}document.getElementById("view").innerHTML=`<section class="card"><div class="exerciseNav"><button class="btn secondary" onclick="exitSession()">← Kalendarz</button><button class="btn secondary navMini" onclick="prevExercise()" ${state.exerciseIndex===0?"disabled":""}>‹</button><button class="btn secondary navMini" onclick="nextExercise()" ${state.exerciseIndex>=w.exercises.length-1?"disabled":""}>›</button></div><div class="exerciseTop"><div><div class="subtitle">Ćwiczenie ${state.exerciseIndex+1}/${w.exercises.length}</div><div class="exercise-title">${esc(ex.name)}</div></div><span class="pill">${modeLabel(mode)}</span></div><div class="exerciseProgress">${w.exercises.map((e,i)=>`<div class="dot ${exerciseDone(e)?"done":i===state.exerciseIndex?"current":""}"></div>`).join("")}</div><div class="stats"><div class="stat"><small>Tryb</small><strong>${modeLabel(mode)}</strong></div><div class="stat"><small>Plan</small><strong>${esc(ex.sets||"-")}</strong></div><div class="stat"><small>Reps/czas</small><strong>${esc(ex.reps||"-")}</strong></div></div>${modeSwitchHTML(mode)}${videoBlock(ex.name)}<div class="note"><strong>Uwagi trenera</strong><br>${esc(ex.notes||"Brak uwag")}</div>${skipped?`<div class="note" style="border:1px solid #92400e"><strong>Ćwiczenie pominięte</strong><br>${esc(skipped.reason)}</div>`:mode==="time"?timeHTML(sets[0]):mode==="done"?doneHTML(sets[0]):sets.map((s,i)=>setHTML(s,i,sets)).join("")}${mode==="sets"&&!skipped?`<div class="actions"><button class="btn secondary" onclick="addSet()">+ Seria</button><button class="btn secondary" onclick="removeSet()">− Usuń</button></div>`:""}<div class="actions"><button class="btn secondary" onclick="skipExercise()">Pomiń ćwiczenie</button><button class="btn secondary" onclick="unskipExercise()">Cofnij pominięcie</button></div><textarea style="margin-top:12px" placeholder="Notatka do ćwiczenia / samopoczucie" oninput="state.notes[exerciseKey()]=this.value;save()">${esc(state.notes[exerciseKey()]||"")}</textarea></section>`}
function modeLabel(mode){return mode==="time"?"Czas":mode==="done"?"Wykonane":"Serie"}
function modeSwitchHTML(mode){return `<div class="actions" style="grid-template-columns:repeat(3,1fr);margin:10px 0"><button class="btn ${mode==="sets"?"":"secondary"}" onclick="setExerciseMode('sets')">Serie</button><button class="btn ${mode==="time"?"":"secondary"}" onclick="setExerciseMode('time')">Czas</button><button class="btn ${mode==="done"?"":"secondary"}" onclick="setExerciseMode('done')">Wykonane</button></div><div class="subtitle" style="margin:4px 0 10px">Apka zgaduje tryb z planu. Jeśli zgadła źle, popraw tutaj — zapamięta to dla tego ćwiczenia.</div>`}
function timeHTML(s){s=s||setsFor()[0];return `<div class="set ${s.done?"done":""}"><div class="doneCompact"><div><strong>✓ ${esc(s.note||"Czas")}</strong><div class="subtitle">${esc(s.reps||"")}${s.kg?` · poziom/opór ${esc(s.kg)}`:""}${s.rpe?` · RPE ${esc(s.rpe)}`:""}</div></div><button class="btn secondary tiny" onclick="toggleSet('${s.id}')">edytuj</button></div><div class="openSet"><div class="set-head"><span>Czas / cardio</span></div><div class="inputs"><div><label class="small">czas</label><input inputmode="text" placeholder="np. 10 min" value="${esc(s.reps||"")}" oninput="updateSet('${s.id}','reps',this.value)"></div><div><label class="small">poziom/opór</label><input inputmode="decimal" placeholder="opcjonalnie" value="${esc(s.kg||"")}" oninput="updateSet('${s.id}','kg',this.value)"></div><div><label class="small"><button class="btn secondary tiny" type="button" onclick="showRPE()">RPE?</button></label>${rpeSelectHTML(s)}</div></div><input style="margin-top:8px;font-size:14px;font-weight:500;text-align:left;padding:12px" placeholder="Notatka" value="${esc(s.freeNote||"")}" oninput="updateSet('${s.id}','freeNote',this.value)"><button class="btn good full" style="margin-top:10px" onclick="toggleSet('${s.id}')">Zalicz</button></div></div>`}
function doneHTML(s){s=s||setsFor()[0];return `<div class="set ${s.done?"done":""}"><div class="doneCompact"><div><strong>✓ Wykonane</strong><div class="subtitle">${esc(s.freeNote||"bez notatki")}</div></div><button class="btn secondary tiny" onclick="toggleSet('${s.id}')">edytuj</button></div><div class="openSet"><div class="set-head"><span>Wykonanie</span></div><textarea placeholder="Notatka opcjonalna — np. zakres, dyskomfort, samopoczucie" oninput="updateSet('${s.id}','freeNote',this.value)">${esc(s.freeNote||"")}</textarea><button class="btn good full" style="margin-top:10px" onclick="toggleSet('${s.id}')">Zalicz ćwiczenie</button></div></div>`}
function rpeSelectHTML(s){return `<select style="width:100%;background:var(--card2);color:var(--text);border:1px solid #3a3a3a;border-radius:16px;padding:11px 6px;font-weight:850;text-align:center" onchange="updateSet('${s.id}','rpe',this.value)"><option value="">RPE</option>${[6,7,8,9,10].map(v=>`<option value="${v}" ${String(s.rpe)===String(v)?"selected":""}>${v}</option>`).join("")}</select>`}
function setHTML(s,i,sets){const first=sets.findIndex(x=>!x.done),locked=i>first&&first>=0,prev=previousSetHint(i);return `<div class="set ${s.done?"done":""} ${locked?"locked":""}"><div class="doneCompact"><div><strong>✓ ${esc(s.note)}</strong><div class="subtitle">${esc(s.kg||"")} kg × ${esc(s.reps||"")} ${s.rpe?` · RPE ${esc(s.rpe)}`:""}</div></div><button class="btn secondary tiny" onclick="toggleSet('${s.id}')">edytuj</button></div><div class="openSet"><div class="set-head"><span>${esc(s.note)}</span>${locked?`<span class="subtitle">najpierw poprzednia</span>`:""}</div><div class="inputs"><div><label class="small">kg ${prev?`<span class="subtitle">ostatnio ${esc(prev)}</span>`:""}</label><input inputmode="decimal" placeholder="kg" value="${esc(s.kg)}" oninput="updateSet('${s.id}','kg',this.value)"></div><div><label class="small">reps</label><input inputmode="numeric" placeholder="reps" value="${esc(s.reps)}" oninput="updateSet('${s.id}','reps',this.value)"></div><div><label class="small"><button class="btn secondary tiny" type="button" onclick="showRPE()">RPE?</button></label>${rpeSelectHTML(s)}</div></div><input style="margin-top:8px;font-size:14px;font-weight:500;text-align:left;padding:12px" placeholder="Notatka do serii" value="${esc(s.freeNote||"")}" oninput="updateSet('${s.id}','freeNote',this.value)"><button class="btn good full" style="margin-top:10px" onclick="toggleSet('${s.id}')">Zalicz serię</button></div></div>`}
function updateSet(id,field,value){const s=setsFor().find(x=>x.id===id);if(s)s[field]=value;save()}function previousSetHint(setIndex){const sess=currentSession(),ex=exercise();const past=schedule().filter(x=>x.workoutId===sess.workoutId&&x.date<sess.date).sort((a,b)=>b.date.localeCompare(a.date));for(const ps of past){const arr=state.logs[exerciseKey(ex,ps)];if(arr&&arr[setIndex]&&arr[setIndex].kg)return `${arr[setIndex].kg} kg${arr[setIndex].reps?`×${arr[setIndex].reps}`:""}`}return ""}function skipExercise(){const reason=prompt("Dlaczego pomijasz ćwiczenie? Wpisz krótką notatkę dla trenera.");if(!reason||!reason.trim()){showToast("Notatka jest wymagana");return}state.skips=state.skips||{};state.skips[exerciseKey()]={reason:reason.trim(),at:new Date().toISOString()};save();render()}function unskipExercise(){if(state.skips)delete state.skips[exerciseKey()];save();render()}function toggleSet(id){const sets=setsFor(),idx=sets.findIndex(x=>x.id===id),first=sets.findIndex(x=>!x.done);if(!sets[idx])return;if(!sets[idx].done&&first>=0&&idx>first)return;sets[idx].done=!sets[idx].done;render();if(sets[idx].done&&exerciseDone(exercise()))celebrateNext()}function addSet(){setsFor().push({id:uid(),note:`Seria ${setsFor().length+1}`,kg:"",reps:"",rpe:"",done:false,freeNote:""});render()}function removeSet(){const s=setsFor();if(s.length>1)s.pop();render()}function nextExercise(){const w=workout();state.exerciseIndex=Math.min(w.exercises.length-1,state.exerciseIndex+1);render();scrollToExerciseTop()}function prevExercise(){state.exerciseIndex=Math.max(0,state.exerciseIndex-1);render();scrollToExerciseTop()}
function celebrateNext(){const w=workout();if(state.exerciseIndex>=w.exercises.length-1){showCelebration("🍌🍌🍌","Dobra robota!","Trening wykonany.",1850,()=>{render();scrollToExerciseTop()});return}const next=w.exercises[state.exerciseIndex+1];showCelebration("🍌","Ćwiczenie zrobione!",`Za chwilę: ${next.name}`,1550,()=>{state.exerciseIndex++;render();scrollToExerciseTop()})}function showCelebration(icon,title,text,ms,cb){const el=document.createElement("div");el.className="celebrationOverlay";el.innerHTML=`<div class="celebrationCard"><div class="${icon.length>2?"bananaBunch":"bananaOne"}">${icon}</div><div class="celebrationTitle">${esc(title)}</div><div class="subtitle">${esc(text)}</div></div>`;document.body.appendChild(el);setTimeout(()=>el.style.opacity="0",ms-350);setTimeout(()=>{el.remove();cb&&cb()},ms)}
function finishHTML(sess){const w=workout(sess.workoutId),skipped=w.exercises.filter(ex=>exerciseSkipped(ex,sess));const items=w.exercises.map(ex=>{const skip=skipFor(ex,sess);const sets=state.logs[exerciseKey(ex,sess)]||[];return `<div class="doneItem"><strong>${skip?"⚠️":"✅"} ${esc(ex.name)}</strong><div class="subtitle">${skip?`Pominięte: ${esc(skip.reason)}`:sets.map(s=>`${s.kg||""} kg × ${s.reps||""}${s.rpe?` · RPE ${s.rpe}`:""}`).join(" / ")}</div></div>`}).join("");return `<section class="finishScreen"><div class="finishHero"><div class="bananaBunch">🍌🍌🍌</div><h2>Dobra robota!</h2><div class="subtitle">Trening wykonany. Oto co zrobiłeś:</div></div><div class="list">${items}</div>${skipped.length?`<div class="note"><strong>Pominięte ćwiczenia</strong><br>${skipped.map(ex=>`${esc(ex.name)} — ${esc(skipFor(ex,sess).reason)}`).join("<br>")}</div>`:""}<textarea style="margin-top:12px" placeholder="Notatka do całego treningu — zeszyt treningowy" oninput="state.sessionNotes[sessionKey(sess)]=this.value;save()">${esc(state.sessionNotes?.[sessionKey(sess)]||"")}</textarea><div class="actions"><button class="btn secondary" onclick="exitSession()">Kalendarz</button><button class="btn good" onclick="syncWorkout(${JSON.stringify(sess).replace(/"/g,"&quot;")})">Zapisz do arkusza</button></div></section>`}
function renderPlan(){const w=workout(state.planPreviewId||1);document.getElementById("view").innerHTML=`<div class="actions" style="grid-template-columns:repeat(4,1fr);margin-bottom:12px">${PLAN.map(x=>`<button class="btn ${x.id===(state.planPreviewId||1)?"":"secondary"}" onclick="state.planPreviewId=${x.id};renderPlan();save()">${x.id}</button>`).join("")}</div><section class="card"><h2>${w.name}</h2><div class="subtitle" style="margin-bottom:12px">${esc(w.focus||"")} Podgląd rozpiski.</div><div class="list">${w.exercises.map(ex=>`<div class="item"><div class="subtitle">${esc(ex.no)} · ${esc(normalizeExerciseType(ex))}</div><strong>${esc(ex.name)}</strong><div class="subtitle">${esc(ex.sets||"")} × ${esc(ex.reps||"")} · ${esc(ex.rest||"")}</div></div>`).join("")}</div></section>`}
function renderPlans(){const st=currentPlanStats();const archive=Object.values(state.planArchive).sort((a,b)=>(b.lastSeen||"").localeCompare(a.lastSeen||""));const selected=archive.find(p=>p.planId===state.selectedPlanId)||archive.find(p=>p.planId===planId())||null;document.getElementById("view").innerHTML=`<section class="card"><h2>Aktywny plan</h2><button class="item activePlan planButton" onclick="state.selectedPlanId='${esc(planId())}';renderPlans();save()"><strong>${esc(CURRENT_PLAN.planName||planId())}</strong><div class="subtitle">${esc(planId())} · ${esc(CURRENT_PLAN.planStatus||"active")}</div><div class="metaGrid"><div class="metaBox"><small>Ukończenie</small><strong>${st.done}/${st.total} treningów</strong></div><div class="metaBox"><small>Postęp</small><strong>${st.progress}%</strong></div><div class="metaBox"><small>Start</small><strong>${START_DATE}</strong></div><div class="metaBox"><small>Status</small><strong>${esc(CURRENT_PLAN.planStatus||"active")}</strong></div></div><div class="progress"><div style="width:${st.progress}%"></div></div></button></section><section class="card" style="margin-top:12px"><h2>Plany archiwalne</h2><div class="subtitle" style="margin-bottom:12px">Tu zostaną poprzednie plany po zmianie aktywnego planu. Kliknięcie pokaże podgląd.</div><div class="list">${archive.filter(p=>p.planId!==planId()).map(p=>planArchiveButton(p)).join("")||`<div class="empty">Brak archiwalnych planów.</div>`}</div></section>${selected?planPreviewCard(selected):""}`}
function planArchiveButton(p){return `<button class="item planButton ${p.planId===state.selectedPlanId?"activePlan":""}" onclick="state.selectedPlanId='${esc(p.planId)}';renderPlans();save()"><strong>${esc(p.planName)}</strong><div class="subtitle">${esc(p.planId)} · ${esc(p.planStatus||"archived")}</div><div class="summaryLine"><span>Postęp</span><span>${p.done||0}/${p.total||0} · ${p.progress||0}%</span></div><div class="summaryLine"><span>Ostatnio otwarty</span><span>${esc(p.lastSeen||"-")}</span></div></button>`}
function planPreviewCard(p){const active=p.planId===planId();return `<section class="card" style="margin-top:12px"><h2>Podgląd planu</h2><div class="item ${active?"activePlan":""}"><strong>${esc(p.planName)}</strong><div class="subtitle">${esc(p.planId)} · ${active?"aktywny":"archiwalny"}</div><div class="summaryLine"><span>Start</span><span>${esc(p.startDate||START_DATE)}</span></div><div class="summaryLine"><span>Ukończenie</span><span>${p.done||0}/${p.total||0} treningów</span></div><div class="summaryLine"><span>Postęp</span><span>${p.progress||0}%</span></div><div class="summaryLine"><span>Ostatnio otwarty</span><span>${esc(p.lastSeen||"-")}</span></div></div>${active?`<div class="note">To jest obecnie aktywny plan. Pełną rozpiskę znajdziesz w zakładce Plan.</div><button class="btn full" onclick="setView('plan')">Pokaż rozpiskę aktywnego planu</button>`:`<div class="note">To jest zapis historii planu na tym urządzeniu. Pełny podgląd archiwalnej rozpiski będzie możliwy, gdy dodamy indeks planów po stronie backendu.</div>`}</section>`}
function renderMeasurements(){const key=planKey(`${todayKey()}__W${state.week}`),vals=state.measurements[key]||{};const entries=Object.entries(state.measurements).filter(([k])=>k.startsWith(planId()+"__")).sort().reverse();document.getElementById("view").innerHTML=`<section class="card"><h2>Pomiary i waga</h2><div class="subtitle" style="margin-bottom:14px">Data ${todayKey()} · tydzień ${state.week}</div>${MEASUREMENTS.map(m=>`<label class="measure-row"><span>${m}</span><input inputmode="decimal" placeholder="${m==="Waga"?"kg":"cm"}" value="${esc(vals[m]||"")}" oninput="setMeasurement('${m}',this.value)"></label>`).join("")}<button class="btn good full" onclick="saveMeasurements()">Zapisz pomiary</button></section><section class="card" style="margin-top:12px"><h2>Poprzednie pomiary</h2>${entries.length?`<div class="historyTable"><table><thead><tr><th>Data</th>${MEASUREMENTS.map(m=>`<th>${m}</th>`).join("")}</tr></thead><tbody>${entries.map(([k,v])=>`<tr><td>${esc(k.split("__")[1])}</td>${MEASUREMENTS.map(m=>`<td>${esc(v[m]||"-")}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`:`<div class="empty">Brak poprzednich pomiarów dla tego planu.</div>`}</section>`}
function setMeasurement(name,value){const key=planKey(`${todayKey()}__W${state.week}`);state.measurements[key]=state.measurements[key]||{};state.measurements[key][name]=value;save()}async function saveMeasurements(){const key=planKey(`${todayKey()}__W${state.week}`);await apiPost({action:"saveMeasurements",clientId:CLIENT_ID,planId:planId(),date:todayKey(),week:state.week,values:state.measurements[key]||{}},"✅ Pomiary zapisane do arkusza");await apiGetMeasurements()}
function renderHistory(){const sess=currentSession(),w=workout(sess.workoutId);document.getElementById("view").innerHTML=`<section class="card"><h2>Log treningowy</h2><div class="subtitle">${w.name} · ${dateLabel(sess.date)} · tydzień ${sess.week}</div>${w.exercises.map(ex=>{const sets=state.logs[exerciseKey(ex,sess)]||[];if(!sets.length)return"";return `<div class="summaryBlock"><strong>${esc(ex.name)}</strong>${sets.map((s,i)=>`<div class="summaryLine"><span>${i+1}. ${esc(s.note)}</span><span>${esc(s.kg||"-")} kg × ${esc(s.reps||"-")} ${s.rpe?`RPE ${esc(s.rpe)}`:""}</span></div>`).join("")}</div>`}).join("")}<div class="actions"><button class="btn secondary" onclick="setSession(${JSON.stringify(sess).replace(/"/g,"&quot;")})">Wróć</button><button class="btn good" onclick="syncWorkout(${JSON.stringify(sess).replace(/"/g,"&quot;")})">Zapisz do arkusza</button></div></section>`}
function normText(s){return String(s||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/ł/g,"l").replace(/[^a-z0-9]+/g," ").trim()}function videoForExercise(name){if(VIDEOS[name])return VIDEOS[name];const n=normText(name);for(const[k,u]of Object.entries(VIDEOS)){if(normText(k)===n||n.includes(normText(k))||normText(k).includes(n))return u}return""}function youtubeId(url){const s=String(url||"");let m=s.match(/youtu\.be\/([^?&/]+)/);if(m)return m[1];m=s.match(/[?&]v=([^?&]+)/);if(m)return m[1];m=s.match(/embed\/([^?&/]+)/);if(m)return m[1];return""}function videoBlock(name){const url=videoForExercise(name);if(!url)return"";const open=!!state.videoOpen[name],id=youtubeId(url);return `<div class="note"><button class="btn secondary full" onclick="toggleVideo('${esc(name)}')">${open?"Ukryj film":"▶ Pokaż film instruktażowy"}</button>${open&&id?`<div class="embed"><iframe src="https://www.youtube-nocookie.com/embed/${esc(id)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>`:`${open?`<div class="subtitle" style="margin-top:8px">Nie udało się zbudować embedu z linku: ${esc(url)}</div>`:""}`}</div>`}function toggleVideo(name){state.videoOpen[name]=!state.videoOpen[name];render()}
function showRPE(){document.getElementById("modalRoot").innerHTML=`<div class="modal" onclick="hideModal()"><div class="panel" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;gap:8px"><h2>Tabela RPE</h2><button class="btn secondary" onclick="hideModal()">Zamknij</button></div><table><thead><tr><th>RPE</th><th>Opis</th><th>Zapas</th></tr></thead><tbody>${RPE.map(r=>`<tr><td><strong>${esc(r[0])}</strong></td><td>${esc(r[1])}</td><td>${esc(r[2])}</td></tr>`).join("")}</tbody></table></div></div>`}function hideModal(){document.getElementById("modalRoot").innerHTML=""}function showToast(text){const el=document.createElement("div");el.className="toast";el.textContent=text;document.body.appendChild(el);setTimeout(()=>el.remove(),1200)}
function workoutPayload(sess=currentSession()){const w=workout(sess.workoutId);return{action:"saveWorkoutLog",clientId:CLIENT_ID,planId:planId(),sessionNote:state.sessionNotes?.[sessionKey(sess)]||"",session:{sessionId:sess.id,workoutDate:sess.date,week:sess.week,workoutId:w.id,workoutName:w.name,note:state.sessionNotes?.[sessionKey(sess)]||""},exercises:w.exercises.map(ex=>{const skip=skipFor(ex,sess);return{no:ex.no,name:ex.name,skipped:!!skip,skipNote:skip?.reason||"",sets:(state.logs[exerciseKey(ex,sess)]||[]).map((s,i)=>({setNo:i+1,plannedLabel:s.note,kg:s.kg||"",reps:s.reps||"",rpe:s.rpe||"",done:!!s.done,note:s.freeNote||""}))}})}}async function syncWorkout(sess=currentSession()){await apiPost(workoutPayload(sess),"✅ Trening zapisany do arkusza");await apiGetWorkoutLog()}async function apiPost(payload,msg){try{showToast("Zapisywanie…");const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});const data=await res.json();if(!data.ok)throw new Error(data.error||"Błąd backendu");apiStatus="Zapis działa";apiStatusKind="ok";showToast(msg);render();return data}catch(e){console.error(e);apiStatus="Błąd zapisu do arkusza";apiStatusKind="err";showToast("❌ Nie udało się zapisać");render();return null}}

function parseDoneFlag(v){return v===true||String(v||"").toLowerCase()==="true"||String(v||"")==="1"||String(v||"").toLowerCase()==="tak"}
function normalizeServerLogRow(r){
  const pid=r.plan_id||r.planId||planId();
  const date=r.workout_date||r.workoutDate||"";
  const sid=r.session_id||r.sessionId||"";
  const exNo=r.exercise_no||r.exerciseNo||"";
  if(!pid||!date||!sid||!exNo)return null;
  const key=`${pid}__${date}__${sid}__E${exNo}`;
  const setNo=parseInt(r.set_no||r.setNo||"1",10)||1;
  return {key,setNo,timestamp:r.timestamp||"",set:{
    id:`srv_${key}_${setNo}`,
    note:r.planned_label||r.plannedLabel||`Seria ${setNo}`,
    kg:String(r.kg||""),
    reps:String(r.reps||""),
    rpe:String(r.rpe||""),
    done:parseDoneFlag(r.done),
    freeNote:r.note||""
  }};
}
function hydrateLogsFromServer(rows){
  if(!Array.isArray(rows))return;
  const bySet={};
  rows.forEach(r=>{
    const pid=r.plan_id||r.planId||planId();
    if(pid!==planId())return;
    if(String(r.planned_label||r.plannedLabel||"").toUpperCase().includes("POMINI")){const date=r.workout_date||r.workoutDate||"";const sid=r.session_id||r.sessionId||"";const exNo=r.exercise_no||r.exerciseNo||"";if(date&&sid&&exNo){state.skips=state.skips||{};state.skips[`${pid}__${date}__${sid}__E${exNo}`]={reason:r.note||"Pominięte",at:r.timestamp||""}}return;}
    const n=normalizeServerLogRow(r);
    if(!n)return;
    const unique=`${n.key}__S${n.setNo}`;
    if(!bySet[unique]||String(n.timestamp).localeCompare(String(bySet[unique].timestamp))>=0){
      bySet[unique]=n;
    }
  });
  const grouped={};
  Object.values(bySet).forEach(n=>{
    grouped[n.key]=grouped[n.key]||[];
    grouped[n.key][n.setNo-1]=n.set;
  });
  Object.entries(grouped).forEach(([key,sets])=>{
    state.logs[key]=sets.filter(Boolean);
  });
  save();
}
function hydrateStatusesFromServer(rows){
  state.serverStatus=state.serverStatus||{}; state.sessionNotes=state.sessionNotes||{};
  if(!Array.isArray(rows))return;
  rows.forEach(r=>{
    const pid=r.plan_id||r.planId||planId();
    if(pid!==planId())return;
    const date=r.workout_date||r.workoutDate||"";
    const sid=r.session_id||r.sessionId||"";
    if(!date||!sid)return;
    const key=`${pid}__${date}__${sid}`;
    const next={status:r.status||"",completed:Number(r.completed_exercises||r.completedExercises||0),total:Number(r.total_exercises||r.totalExercises||0),timestamp:r.timestamp||""};
    const prev=state.serverStatus[key];
    if(!prev||String(next.timestamp).localeCompare(String(prev.timestamp||""))>=0)state.serverStatus[key]=next;
  });
  save();
}

function serverSessionBaseFromRow(r){
  const pid=r.plan_id||r.planId||planId();
  const date=r.workout_date||r.workoutDate||"";
  const sid=r.session_id||r.sessionId||"";
  if(pid!==planId()||!date||!sid)return "";
  return `${pid}__${date}__${sid}`;
}
function sessionBaseFromLogKey(key){
  const parts=String(key||"").split("__");
  if(parts.length<4)return "";
  return `${parts[0]}__${parts[1]}__${parts[2]}`;
}
function localSessionCompleteFromBase(base){
  const parts=String(base||"").split("__");
  if(parts.length<3)return false;
  const date=parts[1], sid=parts[2];
  const sess=schedule().find(x=>x.id===sid&&x.date===date);
  if(!sess)return false;
  const w=workout(sess.workoutId);
  if(!w.exercises.length)return false;
  return w.exercises.every(ex=>{
    const key=`${base}__E${ex.no}`;
    const sets=state.logs[key];
    return sets&&sets.length>0&&sets.every(s=>s.done);
  });
}
function pruneLocalCacheBeforeServerHydrate(serverLogs,serverStatuses){
  const serverBases=new Set();
  (serverLogs||[]).forEach(r=>{const b=serverSessionBaseFromRow(r);if(b)serverBases.add(b)});
  (serverStatuses||[]).forEach(r=>{const b=serverSessionBaseFromRow(r);if(b)serverBases.add(b)});

  state.serverStatus=state.serverStatus||{};
  Object.keys(state.serverStatus).forEach(key=>{
    if(key.startsWith(planId()+"__"))delete state.serverStatus[key];
  });

  Object.keys(state.logs||{}).forEach(key=>{
    if(!key.startsWith(planId()+"__"))return;
    const base=sessionBaseFromLogKey(key);
    if(!base)return;

    // If the session exists in backend, backend wins. We will hydrate it again from APP_LOG.
    if(serverBases.has(base)){delete state.logs[key];return;}

    // If local cache says a whole session is completed, but backend does not know it,
    // it is stale cache. Delete it. In-progress sessions stay as local drafts.
    if(localSessionCompleteFromBase(base)){delete state.logs[key];}
  });
  save();
}

function pruneCompletedLocalSessionsBeforeBackend(){
  // Backend/arkusz is the authority for completed sessions.
  // LocalStorage may keep only unfinished drafts. This runs even before APP_LOG is fetched,
  // so stale completed workouts from Chrome localStorage cannot pretend to be sheet data.
  const bases=new Set();
  Object.keys(state.logs||{}).forEach(key=>{
    if(!key.startsWith(planId()+"__"))return;
    const base=sessionBaseFromLogKey(key);
    if(base)bases.add(base);
  });
  bases.forEach(base=>{
    if(localSessionCompleteFromBase(base)){
      Object.keys(state.logs||{}).forEach(key=>{
        if(key.startsWith(base+"__E"))delete state.logs[key];
      });
    }
  });
  save();
}

async function apiGetWorkoutLog(){
  try{
    const res=await fetch(`${API_URL}?action=getWorkoutLog&client=${encodeURIComponent(CLIENT_ID)}&planId=${encodeURIComponent(planId())}&ts=${Date.now()}`);
    const data=await res.json();
    if(!data.ok)return;
    const logs=Array.isArray(data.logs)?data.logs:[];
    const statuses=Array.isArray(data.statuses)?data.statuses:[];
    pruneLocalCacheBeforeServerHydrate(logs,statuses);
    hydrateLogsFromServer(logs);
    hydrateStatusesFromServer(statuses);
    render();
  }catch(e){console.warn(e)}
}

async function apiGetPlan(){try{apiStatus="Łączenie z arkuszem…";apiStatusKind="loading";render();const res=await fetch(`${API_URL}?action=getPlan&client=${encodeURIComponent(CLIENT_ID)}&ts=${Date.now()}`);const data=await res.json();if(!data.ok)throw new Error(data.error||"Błąd backendu");CURRENT_PLAN={planId:data.planId||"unknown_plan",planName:data.planName||data.planId||"Plan",planStatus:data.planStatus||"active",clientId:data.clientId||CLIENT_ID,clientName:data.clientName||CLIENT_ID};if(Array.isArray(data.workouts)&&data.workouts.length)PLAN=data.workouts;if(data.videos)VIDEOS=data.videos;if(Array.isArray(data.rpe)&&data.rpe.length)RPE=data.rpe.map(x=>[x.rpe,x.description,x.reserve||""]);apiStatus=`Połączono · ${CURRENT_PLAN.clientName||CLIENT_ID} · ${CURRENT_PLAN.planId}`;apiStatusKind="ok"}catch(e){console.error(e);apiStatus="Offline/mock: nie udało się pobrać arkusza";apiStatusKind="err"}finally{render()}}
async function apiGetMeasurements(){try{const res=await fetch(`${API_URL}?action=getMeasurements&client=${encodeURIComponent(CLIENT_ID)}&ts=${Date.now()}`);const data=await res.json();if(!data.ok||!Array.isArray(data.measurements))return;Object.keys(state.measurements||{}).forEach(k=>{if(k.startsWith(planId()+"__"))delete state.measurements[k]});data.measurements.forEach(r=>{const pid=r.plan_id||planId();if(pid!==planId())return;const key=`${pid}__${r.measurement_date||r.date||todayKey()}__W${r.week||""}`;state.measurements[key]={};MEASUREMENTS.forEach(m=>{if(r[m])state.measurements[key][m]=r[m]})});save()}catch(e){console.warn(e)}}
apiGetPlan().then(()=>{pruneCompletedLocalSessionsBeforeBackend();render();return apiGetWorkoutLog()}).then(()=>apiGetMeasurements());
