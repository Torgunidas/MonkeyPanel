<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MonkeyPanel backend v0.1</title>
<style>
:root{
  --bg:#080808;--card:#141414;--card2:#1f1f1f;--line:#2c2c2c;--text:#f4f4f5;--muted:#a1a1aa;
  --greenBg:#052e16;--greenLine:#166534;--redBg:#450a0a;--redLine:#991b1b;--goldBg:#422006;--goldLine:#92400e;--blueBg:#111827;--blueLine:#374151;
  --accent:#f4f4f5;--accentText:#09090b
}
*{box-sizing:border-box}
html{overflow-y:scroll}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,textarea{font:inherit}
button{cursor:pointer}
.app{width:min(560px,100%);max-width:560px;margin:0 auto;min-height:100dvh;padding:12px 12px 96px}
.top{position:sticky;top:0;z-index:20;margin:-12px -12px 12px;padding:14px 12px 10px;background:rgba(8,8,8,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.row{display:flex;gap:10px;align-items:center;justify-content:space-between}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:850}
h1{font-size:22px;line-height:1.1;margin:3px 0 2px}
h2{font-size:20px;margin:0 0 8px}
.subtitle{color:var(--muted);font-size:14px}
.progress{height:8px;background:#262626;border-radius:99px;margin-top:12px;overflow:hidden}
.progress>div{height:100%;background:var(--accent);border-radius:99px;width:0%;transition:.25s}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0 12px}
.tab{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:18px;padding:9px 6px;font-size:12px}
.tab.active{background:var(--accent);color:var(--accentText);border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
.btn{border:0;border-radius:18px;padding:14px;font-weight:850;background:var(--accent);color:var(--accentText)}
.btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--line)}
.btn.good{background:#14532d;color:white}
.btn.danger{background:#7f1d1d;color:white}
.btn.full{width:100%}
.btn.tiny{padding:4px 8px;border-radius:999px;font-size:12px}
.pill{display:inline-flex;align-items:center;border-radius:999px;background:var(--card2);padding:5px 10px;color:var(--muted);font-size:12px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:12px;text-align:center}
.kpi strong{display:block;font-size:24px}
.legend{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 14px}
.legend span{font-size:12px;color:#ddd;border:1px solid var(--line);border-radius:999px;padding:5px 8px}
.calendar{display:grid;gap:12px}
.weekCard{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:12px}
.weekHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.days{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.dayBtn{min-height:104px;text-align:left;border-radius:20px;border:1px solid var(--line);padding:9px;color:var(--text);background:#111}
.dayBtn .date{font-size:12px;color:#ddd}
.dayBtn .name{font-size:13px;font-weight:900;line-height:1.1;margin-top:4px}
.dayBtn .bar{height:6px;border-radius:999px;background:rgba(255,255,255,.18);margin-top:8px;overflow:hidden}
.dayBtn .bar div{height:100%;border-radius:999px;background:white;width:0%}
.status-done{background:var(--greenBg);border-color:var(--greenLine)}
.status-due{background:var(--goldBg);border-color:var(--goldLine)}
.status-missed{background:var(--redBg);border-color:var(--redLine)}
.status-future{background:var(--blueBg);border-color:var(--blueLine)}
.exercise-title{font-size:28px;line-height:1.05;margin:6px 0 10px;font-weight:950}
.exerciseTop{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.exerciseProgress{display:flex;gap:5px;margin:12px 0 14px;overflow:hidden}
.dot{height:8px;flex:1;border-radius:99px;background:#303030}
.dot.done{background:#22c55e}
.dot.current{background:#f4f4f5}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.stat{background:#090909;border-radius:18px;padding:10px;text-align:center}
.stat small{display:block;color:var(--muted);font-size:11px;margin-bottom:3px}
.note{background:var(--card2);border-radius:18px;padding:12px;color:#e5e5e5;font-size:14px;line-height:1.35;margin:12px 0}
.videoToggle{margin:12px 0}
.embed{position:relative;width:100%;aspect-ratio:16/9;border-radius:20px;overflow:hidden;background:#000;border:1px solid var(--line);margin:10px 0 12px}
.embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.set{border:1px solid var(--line);background:#090909;border-radius:24px;padding:12px;margin:10px 0}
.set.done{border-color:var(--greenLine);background:rgba(20,83,45,.28);padding:10px 12px}.set.locked{opacity:.45}.set.locked input,.set.locked textarea,.set.locked button{pointer-events:none}
.set.done .doneCompact{display:flex}
.set.done .openSet{display:none}
.doneCompact{display:none;align-items:center;justify-content:space-between;gap:8px}
.set-head{display:flex;justify-content:space-between;gap:8px;font-weight:850;margin-bottom:8px}
.inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
label.small{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}
input,textarea{width:100%;background:var(--card2);color:var(--text);border:1px solid #3a3a3a;border-radius:16px;outline:none}
input{font-size:19px;font-weight:850;text-align:center;padding:10px 6px}
textarea{min-height:68px;padding:12px;resize:vertical}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.timer{background:#050505;border:1px solid var(--line);border-radius:26px;padding:16px;text-align:center;margin:12px 0}
.timer .time{font-size:48px;font-weight:950;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
.completion{background:var(--greenBg);border:1px solid var(--greenLine);border-radius:24px;padding:16px;margin:12px 0}.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:60;max-width:540px;margin:auto;background:#f4f4f5;color:#09090b;border-radius:22px;padding:16px;font-weight:900;text-align:center;box-shadow:0 18px 40px rgba(0,0,0,.45)}.celebrationOverlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .18s ease-out;transition:opacity .32s ease}.celebrationCard{width:min(500px,100%);border:1px solid var(--greenLine);background:linear-gradient(180deg,#073b1b,#07130b);border-radius:34px;padding:28px;text-align:center;box-shadow:0 30px 90px rgba(0,0,0,.7);animation:popIn .22s ease-out}.bananaOne{font-size:76px;line-height:1;margin-bottom:12px}.bananaBunch{font-size:96px;line-height:1;margin-bottom:10px;letter-spacing:-18px}.celebrationTitle{font-size:32px;font-weight:950;line-height:1.05;margin:0 0 8px}.celebrationText{color:#d4d4d8;font-size:17px}.finishScreen{background:linear-gradient(180deg,#073b1b,#0b0b0b 48%);border:1px solid var(--greenLine);border-radius:34px;padding:22px;margin-bottom:14px}.finishHero{text-align:center;padding:18px 6px 12px}.finishHero .bananaBunch{font-size:88px;margin-bottom:8px}.finishHero h2{font-size:36px;line-height:1.05;margin:0 0 8px}.doneList{display:grid;gap:10px;margin-top:14px}.doneItem{background:rgba(0,0,0,.35);border:1px solid rgba(34,197,94,.35);border-radius:22px;padding:12px}.doneItem strong{display:block;font-size:17px}.doneItem .meta{color:#a1a1aa;font-size:13px;margin-top:3px}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes popIn{from{transform:scale(.92);opacity:.6}to{transform:scale(1);opacity:1}}.summaryBlock{background:#090909;border:1px solid var(--line);border-radius:22px;padding:12px;margin:10px 0}.summaryLine{display:flex;justify-content:space-between;gap:8px;border-top:1px solid #272727;padding-top:6px;margin-top:6px}.historyTable{width:100%;overflow:auto}.historyTable table{min-width:620px}
.list{display:grid;gap:10px}
.item{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:14px;color:var(--text)}
.item .meta{font-size:12px;color:var(--muted);margin-bottom:3px}
.measure-row{display:flex;align-items:center;gap:12px;background:#090909;border:1px solid var(--line);border-radius:24px;padding:12px;margin-bottom:10px}
.measure-row span{width:86px;font-weight:900}
.measure-row input{text-align:right;font-size:24px;padding-right:14px}
.bottomNav{display:none!important;position:fixed;left:0;right:0;bottom:0;background:rgba(8,8,8,.96);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom))}
.bottomInner{max-width:560px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.empty{border:1px dashed #444;border-radius:24px;padding:32px;text-align:center;color:var(--muted)}
.log{font-size:13px;line-height:1.35;margin-bottom:10px}
.log-row{display:flex;justify-content:space-between;gap:8px;border-top:1px solid #272727;padding-top:6px;margin-top:6px}
.hidden{display:none!important}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:50;display:flex;align-items:flex-end;padding:12px}
.modal .panel{max-width:560px;width:100%;max-height:86dvh;overflow:auto;margin:0 auto;background:#111;border:1px solid var(--line);border-radius:28px;padding:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #333;padding:9px;text-align:left;vertical-align:top}
.back{margin-bottom:10px}.apiBadge{font-size:11px;color:var(--muted);margin-top:4px}.apiBadge.ok{color:#86efac}.apiBadge.err{color:#fca5a5}.apiBadge.loading{color:#fde68a}
</style>
</head>
<body>
<div class="app">
<header class="top">
  <div class="row">
    <div><div class="eyebrow">MonkeyPanel</div><h1 id="headerTitle">Plan treningowy</h1><div class="subtitle" id="headerSub">Start: wtorek 12.05.2026</div><div class="apiBadge loading" id="apiStatus">Ładowanie planu…</div></div>
    <button class="btn secondary hidden" id="exitSessionBtn" onclick="exitSession()">Kalendarz</button>
  </div>
  <div class="progress"><div id="progressBar"></div></div>
</header>
<nav class="tabs">
  <button class="tab active" data-view="train" onclick="setView('train')">🏋️<br>Trening</button>
  <button class="tab" data-view="plan" onclick="setView('plan')">📋<br>Plan</button>
  <button class="tab" data-view="measure" onclick="setView('measure')">📏<br>Pomiary</button>
  <button class="tab" data-view="history" onclick="setView('history')">✅<br>Podsum.</button>
</nav>
<main id="view"></main>
</div>
<div class="bottomNav hidden" id="bottomNav"><div class="bottomInner"><button class="btn secondary" onclick="prevExercise()">← Wstecz</button><button class="btn" onclick="nextUndoneOrNext()">Dalej →</button></div></div>
<div id="modalRoot"></div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbydQFQPaMX9nTgO2fo-hq4ITWZSVk-50y0vpA5rMFIifH5dPsZO8yP3WBlACnTPsSs_/exec";
let apiStatus="Ładowanie planu…";
let apiStatusKind="loading";
const START_DATE="2026-05-12";
let TOTAL_WEEKS=11;
const DAYS=[{dow:"wt.",workoutId:1,offset:0},{dow:"czw.",workoutId:2,offset:2},{dow:"sob.",workoutId:3,offset:4},{dow:"ndz.",workoutId:4,offset:5}];
let VIDEOS={
  "Dynamiczny Warm-up na dolne partie ciała":"https://youtu.be/LDSMptYXAw4",
  "Dynamiczny Warm-up na górne partie ciała":"https://youtu.be/f2gf1Pu73gs",
  "Full Body Active Flexibility Routine":"https://youtu.be/aUm3qE2dvB8?si=eDNTv9M_Agt105EA"
};
let RPE=[["10","Maksimum. Więcej nie dasz rady.","0"],["9.5","Bardzo ciężko. Może jedno powtórzenie by weszło.","0–1"],["9","Bardzo ciężko, ale jedno powtórzenie jeszcze da się zrobić.","1"],["8","Mocno, ale kontrolujesz. 2 powtórzenia w zapasie.","2"],["7","Średnio ciężko. 3 powtórzenia w zapasie.","3"],["6","Lekko.","4+"],["5 i mniej","Bardzo lekko / rozgrzewka.","dużo"]];
let PLAN=[
{id:1,name:"1 TRENING",focus:"Dół + klatka + core",exercises:[
{no:"1",name:"Orbitrek",sets:1,reps:"12 min",rest:"-",notes:"7 minut do przodu, 5 minut do tyłu",type:"time"},
{no:"1a",name:"Dynamiczny Warm-up na dolne partie ciała",sets:1,reps:"-",rest:"-",notes:"W rozpisce №1",type:"warmup"},
{no:"2",name:"Bulgary z sztangą",sets:"wg tygodnia",reps:"wg tygodnia",rest:"2–3 min",notes:"wg rozpiski",type:"strength",progressionKey:"Bulgary"},
{no:"3",name:"Trenażer na odwodzenie",sets:3,reps:"10–15",rest:"1 min",notes:"Superseria 1 min rest.",type:"accessory"},
{no:"3b",name:"Trenażer na przywodzenie",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"4",name:"Larsen Press",sets:"wg tygodnia",reps:"wg tygodnia",rest:"2–3 min",notes:"wg rozpiski",type:"strength",mainLift:"Larsen Press"},
{no:"5",name:"Rozpiętki hantlami na skośnej ławce",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"6",name:"Biceps z hantlami",sets:3,reps:"10–15",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"7",name:"Bird Dog",sets:3,reps:"10",rest:"1 min",notes:"Superseria 1 min rest.",type:"core"},
{no:"7b",name:"Brzuch — spięcia",sets:3,reps:"15–20",rest:"1 min",notes:"Po Bird Dog",type:"core"}]},
{id:2,name:"2 TRENING",focus:"Plecy + barki + tył",exercises:[
{no:"1",name:"Orbitrek",sets:1,reps:"12 min",rest:"-",notes:"7 minut do przodu, 5 minut do tyłu",type:"time"},
{no:"1a",name:"Dynamiczny Warm-up na dolne partie ciała",sets:1,reps:"-",rest:"-",notes:"W rozpisce №1",type:"warmup"},
{no:"2",name:"RDL",sets:"wg tygodnia",reps:"wg tygodnia",rest:"2–3 min",notes:"wg rozpiski",type:"strength",mainLift:"RDL"},
{no:"3",name:"Podciąganie",sets:3,reps:"5–8",rest:"2 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"4",name:"Wyciąg górny szerokim chwytem",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"5",name:"DB Pullover",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"6",name:"Maszyna siedząco na barki",sets:3,reps:"10–15",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"7",name:"Tył barku hantlem",sets:3,reps:"10–15",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"8",name:"Hiperextension",sets:3,reps:"10",rest:"1 min",notes:"Superseria 1 min rest.",type:"core"},
{no:"8b",name:"Dead Bug",sets:3,reps:"15–20",rest:"1 min",notes:"Po Hiperextension",type:"core"}]},
{id:3,name:"3 TRENING",focus:"Góra + push + core",exercises:[
{no:"1",name:"Orbitrek",sets:1,reps:"12 min",rest:"-",notes:"7 minut do przodu, 5 minut do tyłu",type:"time"},
{no:"1a",name:"Dynamiczny Warm-up na górne partie ciała",sets:1,reps:"-",rest:"-",notes:"W rozpisce №1",type:"warmup"},
{no:"2",name:"Bench Press",sets:"wg tygodnia",reps:"wg tygodnia",rest:"2–3 min",notes:"wg rozpiski",type:"strength",mainLift:"Bench Press"},
{no:"3",name:"Pompki z ciężarem",sets:"wg tygodnia",reps:"wg tygodnia",rest:"2–3 min",notes:"wg rozpiski",type:"strength",progressionKey:"Pompki"},
{no:"4",name:"Francuz hantlami",sets:3,reps:"10–15",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"5",name:"Hip Thrust ze sztangą",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"6",name:"Trenażer na dwójki",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
{no:"7",name:"Planki bokiem",sets:3,reps:"10",rest:"1 min",notes:"Superseria 1 min rest.",type:"core"},
{no:"7b",name:"Brzuch Y",sets:3,reps:"15–20",rest:"1 min",notes:"Po plankach",type:"core"}]},
{id:4,name:"4 TRENING",focus:"Cardio + mobilność",exercises:[
{no:"1",name:"Cardio — rower",sets:1,reps:"30 min",rest:"-",notes:"const. 30 min, avg. HB 125, avg. 126W",type:"time"},
{no:"2",name:"Rolowanie",sets:1,reps:"15–20 min",rest:"-",notes:"ROBIĆ!!!! To też trening.",type:"mobility"},
{no:"3",name:"Full Body Active Flexibility Routine",sets:1,reps:"-",rest:"-",notes:"W rozpisce №1",type:"mobility"}]}];
const MAIN_MAX={"Bench Press":80,"Larsen Press":70,"RDL":100};
const WEEK_PROGRESSIONS={1:{main:[[.65,5],[.75,5],[.85,"5+"],[.65,5,3]],bulgary:[4,10],pompki:[4,10]},2:{main:[[.70,5],[.80,5],[.90,"3+"],[.675,5,3]],bulgary:[4,8],pompki:[4,8]},3:{main:[[.75,5],[.85,3],[.95,"1+"],[.70,5,3]],bulgary:[4,6],pompki:[4,6]},4:{main:[[.40,5],[.50,5],[.60,5]],bulgary:[3,10,"Deload"],pompki:[3,10,"Deload"]}};
const MEASUREMENTS=["Udo","Dupa","Brzuch","Klatka","Biceps","Szyja","Waga"];
let state=load("monkeypanel.backend.v01",{view:"train",mode:"calendar",activeSessionId:null,workoutId:1,week:1,exerciseIndex:0,logs:{},measurements:{},notes:{},videoOpen:{},finishedSessions:{}});
let restSeconds=0,timerId=null,autoAdvanceTimer=null;
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}} function save(){localStorage.setItem("monkeypanel.backend.v01",JSON.stringify(state))}
function todayKey(){return new Date().toISOString().slice(0,10)} function dateObj(iso){const [y,m,d]=iso.split("-").map(Number);return new Date(y,m-1,d)} function isoDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`} function addDays(iso,days){const d=dateObj(iso);d.setDate(d.getDate()+days);return isoDate(d)} function formatPL(iso){return dateObj(iso).toLocaleDateString("pl-PL",{weekday:"short",day:"2-digit",month:"2-digit"})}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)} function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))} function roundTo2_5(x){return Math.floor(x/2.5)*2.5}
function normText(s){return String(s||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/ł/g,"l").replace(/[^a-z0-9]+/g," ").trim()}
function schedule(){const out=[];for(let week=1;week<=TOTAL_WEEKS;week++){for(const d of DAYS){out.push({id:`W${week}T${d.workoutId}`,week,date:addDays(START_DATE,(week-1)*7+d.offset),workoutId:d.workoutId,dow:d.dow})}}return out}
function currentSession(){return schedule().find(s=>s.id===state.activeSessionId)||schedule()[0]} function workout(id=state.workoutId){return PLAN.find(w=>w.id===id)||PLAN[0]} function exercise(){const w=workout();return w.exercises[Math.min(state.exerciseIndex,w.exercises.length-1)]}
function exerciseKey(ex=exercise()){const s=currentSession();return `${s.date}__${s.id}__E${ex.no}`} function sessionExerciseKeys(sess=currentSession()){return workout(sess.workoutId).exercises.map(ex=>`${sess.date}__${sess.id}__E${ex.no}`)}
function setSession(sess){state.activeSessionId=sess.id;state.workoutId=sess.workoutId;state.week=sess.week;state.exerciseIndex=0;state.mode="session";state.view="train";render()}
function targetForExercise(ex){const pg=WEEK_PROGRESSIONS[((state.week-1)%4)+1]||WEEK_PROGRESSIONS[1];if(ex.mainLift&&MAIN_MAX[ex.mainLift])return pg.main.map((r,i)=>{const[pct,reps,fslSets]=r;return{label:fslSets?`FSL ${fslSets}×`:`Seria ${i+1}`,kg:roundTo2_5(MAIN_MAX[ex.mainLift]*pct),reps}});if(ex.progressionKey==="Bulgary")return[{label:pg.bulgary[2]||"Plan",sets:pg.bulgary[0],reps:pg.bulgary[1],kg:""}];if(ex.progressionKey==="Pompki")return[{label:pg.pompki[2]||"Plan",sets:pg.pompki[0],reps:pg.pompki[1],kg:""}];return[{label:"Plan",sets:ex.sets,reps:ex.reps,kg:""}]}
function defaultSets(ex){const targets=targetForExercise(ex);if(ex.mainLift)return targets.flatMap(t=>Array.from({length:String(t.label).startsWith("FSL")?3:1},(_,i)=>({id:uid(),note:i?`${t.label} ${i+1}`:t.label,kg:String(t.kg),reps:String(t.reps).replace("+",""),rpe:"",done:false,freeNote:""})));const count=Number(targets[0]?.sets||ex.sets||1)||1;return Array.from({length:count},(_,i)=>({id:uid(),note:`Seria ${i+1}`,kg:"",reps:String(targets[0]?.reps||ex.reps||""),rpe:"",done:false,freeNote:""}))}
function setsFor(ex=exercise()){const key=exerciseKey(ex);if(!state.logs[key])state.logs[key]=defaultSets(ex);return state.logs[key]}
function exerciseDone(ex){const sets=setsFor(ex);return sets.length>0&&sets.every(s=>s.done)}
function sessionDone(sess=currentSession()){const w=workout(sess.workoutId);return w.exercises.every(ex=>{const key=`${sess.date}__${sess.id}__E${ex.no}`;const sets=state.logs[key];return sets&&sets.length&&sets.every(s=>s.done)})}
function sessionProgress(sess=currentSession()){if(sessionDone(sess))return 100;let done=0;const w=workout(sess.workoutId);w.exercises.forEach(ex=>{const key=`${sess.date}__${sess.id}__E${ex.no}`;const sets=state.logs[key];if(sets&&sets.length&&sets.every(s=>s.done))done++});return Math.round(done/w.exercises.length*100)}
function sessionStatus(sess){if(sessionDone(sess))return"done";if(sess.date<todayKey())return"missed";if(sess.date===todayKey())return"due";return"future"} function statusLabel(st){return st==="done"?"zrobiony":st==="missed"?"pominięty":st==="due"?"dzisiaj":"przyszły"}
function render(){save();const badge=document.getElementById("apiStatus");if(badge){badge.textContent=apiStatus;badge.className=`apiBadge ${apiStatusKind}`;}const sess=currentSession(),w=workout(sess.workoutId);document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===state.view));document.getElementById("exitSessionBtn").classList.toggle("hidden",!(state.view==="train"&&state.mode==="session"));document.getElementById("bottomNav").classList.toggle("hidden",!(state.view==="train"&&state.mode==="session"));if(state.view==="train"&&state.mode==="session"){document.getElementById("headerTitle").textContent=`${w.name} · ${formatPL(sess.date)}`;document.getElementById("headerSub").textContent=`Ćwiczenie ${state.exerciseIndex+1}/${w.exercises.length} · tydzień ${sess.week}`}else{document.getElementById("headerTitle").textContent=state.view==="plan"?"Rozpiska planu":state.view==="measure"?"Pomiary":state.view==="history"?"Podsumowanie":"Kalendarz treningów";document.getElementById("headerSub").textContent=`Plan ${TOTAL_WEEKS} tygodni · start 12.05.2026`}document.getElementById("progressBar").style.width=`${state.view==="train"&&state.mode==="session"?sessionProgress(sess):overallProgress()}%`;if(state.view==="train"&&state.mode==="calendar")renderCalendar();if(state.view==="train"&&state.mode==="session")renderSession();if(state.view==="plan")renderPlan();if(state.view==="measure")renderMeasurements();if(state.view==="history")renderHistory()}
function overallProgress(){const s=schedule();return Math.round(s.filter(x=>sessionDone(x)).length/s.length*100)}
function renderCalendar(){const s=schedule(),done=s.filter(x=>sessionStatus(x)==="done").length,missed=s.filter(x=>sessionStatus(x)==="missed").length,left=s.length-done-missed;let html=`<div class="summary"><div class="kpi"><strong>${done}</strong><span class="subtitle">zrobione</span></div><div class="kpi"><strong>${missed}</strong><span class="subtitle">pominięte</span></div><div class="kpi"><strong>${left}</strong><span class="subtitle">przed Tobą</span></div></div><div class="legend"><span>🟡 do zrobienia</span><span>🟢 zrobiony</span><span>🔴 po dacie</span><span>🔵 przyszły</span></div><div class="calendar">`;for(let week=1;week<=TOTAL_WEEKS;week++){const items=s.filter(x=>x.week===week);html+=`<section class="weekCard"><div class="weekHead"><strong>Tydzień ${week}</strong><span class="subtitle">${formatPL(items[0].date)} – ${formatPL(items[3].date)}</span></div><div class="days">`;for(const it of items){const st=sessionStatus(it),prog=sessionProgress(it),wo=workout(it.workoutId);html+=`<button class="dayBtn status-${st}" onclick='setSession(${JSON.stringify(it)})'><div class="date">${it.dow} ${formatPL(it.date).replace(/^...,\s*/,"")}</div><div class="name">${wo.name.replace(" TRENING","")}</div><div class="subtitle">${statusLabel(st)}</div><div class="bar"><div style="width:${prog}%"></div></div><div class="subtitle">${prog}%</div></button>`}html+=`</div></section>`}document.getElementById("view").innerHTML=html+`</div>`}

function latestSessionWithLogs(){

function dataCompleteness(sess){

 w.exercises.forEach(ex=>{const sets=state.logs[`${sess.date}__${sess.id}__E${ex.no}`]||[];sets.forEach(s=>{total+=3;if(!s.kg)missing++;if(!s.reps)missing++;if(!s.rpe)missing++})});
 return {missing,total,ok:missing===0&&total>0}
}

async function apiGetPlan(){
 try{
   apiStatus="Łączenie z arkuszem…"; apiStatusKind="loading"; render();
   const res=await fetch(`${API_URL}?action=getPlan&ts=${Date.now()}`);
   if(!res.ok) throw new Error(`HTTP ${res.status}`);
   const data=await res.json();
   if(!data.ok) throw new Error(data.error||"Backend zwrócił błąd");
   if(Array.isArray(data.workouts)&&data.workouts.length){
     PLAN=data.workouts.map(w=>({...w, exercises:(w.exercises||[]).map(ex=>({
       ...ex,
       sets: ex.sets || 1,
       reps: ex.reps || "-",
       rest: ex.rest || "-",
       notes: ex.notes || ""
     }))}));
   }
   if(data.videos&&typeof data.videos==="object") VIDEOS={...VIDEOS,...data.videos};
   if(Array.isArray(data.rpe)&&data.rpe.length) RPE=data.rpe.map(x=>[x.rpe,x.description,x.reserve||""]);
   TOTAL_WEEKS=Math.max(TOTAL_WEEKS,inferTotalWeeksFromPlan());
   apiStatus="Połączono z arkuszem"; apiStatusKind="ok";
 }catch(err){
   console.error(err);
   apiStatus="Offline/mock: nie udało się pobrać arkusza"; apiStatusKind="err";
 }finally{render();}
}
function inferTotalWeeksFromPlan(){return 11}
function buildWorkoutPayload(sess=currentSession()){
 const w=workout(sess.workoutId);

   action:"saveWorkoutLog",
   clientId:"gabriel",
   session:{sessionId:sess.id,workoutDate:sess.date,week:sess.week,workoutId:w.id,workoutName:w.name},
   exercises:w.exercises.map(ex=>({
     no:ex.no,
     name:ex.name,
     sets:(state.logs[`${sess.date}__${sess.id}__E${ex.no}`]||[]).map((s,i)=>({
       setNo:i+1,
       plannedLabel:s.note||`Seria ${i+1}`,
       kg:s.kg||"",
       reps:s.reps||"",
       rpe:s.rpe||"",
       done:!!s.done,
       note:s.freeNote||""
     }))
   }))
 };
}
async function syncCurrentWorkout(sess=currentSession()){
 await apiPost(buildWorkoutPayload(sess),"✅ Trening zapisany do arkusza");
}
async function apiPost(payload,successText){
 try{
   showToast("Zapisywanie do arkusza…");
   const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
   const data=await res.json();
   if(!res.ok||!data.ok) throw new Error(data.error||`HTTP ${res.status}`);
   apiStatus="Zapis działa"; apiStatusKind="ok"; showToast(successText||"✅ Zapisano"); render();
   return data;
 }catch(err){
   console.error(err);
   apiStatus="Błąd zapisu do arkusza"; apiStatusKind="err"; showToast("❌ Nie udało się zapisać do arkusza"); render();
   return null;
 }
}
function setView(v){state.view=v;if(v!=="train")state.mode="calendar";render()} function exitSession(){state.mode="calendar";clearTimer(false);render()}
function updateSet(id,field,value){const s=setsFor().find(x=>x.id===id);if(s)s[field]=value;save()}
function toggleSet(id){

 if(!s.done && idx>firstUndoneIndex(sets))return;

}

function scheduleAutoAdvance(){
 if(autoAdvanceTimer)clearTimeout(autoAdvanceTimer);
 const w=workout();
 if(state.exerciseIndex>=w.exercises.length-1){
   showWorkoutCelebration();
   autoAdvanceTimer=setTimeout(()=>{clearTimer(false);render()},1850);
   return;
 }
 const nextIndex=Math.min(w.exercises.length-1,state.exerciseIndex+1);
 showExerciseCelebration(w.exercises[nextIndex].name);
 autoAdvanceTimer=setTimeout(()=>{state.exerciseIndex=nextIndex;clearTimer(false);render()},1550)
} function addSet(){setsFor().push({id:uid(),note:`Seria ${setsFor().length+1}`,kg:"",reps:"",rpe:"",done:false,freeNote:""});render()} function removeSet(){const sets=setsFor();if(sets.length>1)sets.pop();render()}
function nextExercise(){const w=workout();state.exerciseIndex=Math.min(w.exercises.length-1,state.exerciseIndex+1);clearTimer(false);render()} function prevExercise(){state.exerciseIndex=Math.max(0,state.exerciseIndex-1);clearTimer(false);render()}
function nextUndoneOrNext(){const w=workout();const next=w.exercises.findIndex((ex,i)=>i>state.exerciseIndex&&!exerciseDone(ex));state.exerciseIndex=next>=0?next:Math.min(w.exercises.length-1,state.exerciseIndex+1);clearTimer(false);render()}
function saveExerciseNote(v){state.notes[exerciseKey()]=v;save()} function toggleVideo(name){state.videoOpen[name]=!state.videoOpen[name];render()}
function startRestFromExercise(){const m=String(exercise().rest||"").match(/(\d+)/);if(m){restSeconds=Number(m[1])*60;startTimer()}} function startTimer(){if(timerId)clearInterval(timerId);timerId=setInterval(()=>{restSeconds=Math.max(0,restSeconds-1);if(restSeconds===0)clearTimer(false);renderTimer()},1000)} function toggleTimer(){if(timerId){clearInterval(timerId);timerId=null}else startTimer();renderTimer()} function clearTimer(doRender=true){if(timerId)clearInterval(timerId);timerId=null;restSeconds=0;if(doRender)renderTimer()}
function setMeasurement(name,value){const key=`${todayKey()}__W${state.week}`;state.measurements[key]=state.measurements[key]||{};state.measurements[key][name]=value;save()}
function showRPE(){document.getElementById("modalRoot").innerHTML=`<div class="modal" onclick="hideModal()"><div class="panel" onclick="event.stopPropagation()"><div class="row"><h2>Tabela RPE</h2><button class="btn secondary" onclick="hideModal()">Zamknij</button></div><table><thead><tr><th>RPE</th><th>Opis</th><th>Zapas</th></tr></thead><tbody>${RPE.map(r=>`<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join("")}</tbody></table></div></div>`} function hideModal(){document.getElementById("modalRoot").innerHTML=""}
function csvEscape(v){const s=String(v??"");return /[";\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s} function download(name,text){const blob=new Blob([text],{type:"text/csv;charset=utf-8"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}
function exportWorkoutCSV(){const rows=[["date","session_id","week","workout","exercise_no","exercise","set","planned","kg","reps","rpe","done","note"]];Object.entries(state.logs).forEach(([key,sets])=>{const[date,sid,ePart]=key.split("__"),sess=schedule().find(s=>s.id===sid),wo=workout(sess?.workoutId||1),exNo=(ePart||"").replace("E",""),ex=wo.exercises.find(x=>String(x.no)===String(exNo));sets.forEach((s,i)=>rows.push([date,sid,sess?.week||"",wo.name,exNo,ex?.name||"",i+1,s.note||"",s.kg,s.reps,s.rpe,s.done?1:0,s.freeNote||""]))});download(`workout-log-${todayKey()}.csv`,rows.map(r=>r.map(csvEscape).join(";")).join("\n"))}
function exportMeasurementsCSV(){const rows=[["date","week",...MEASUREMENTS]];Object.entries(state.measurements).forEach(([key,vals])=>{const[date,w]=key.split("__W");rows.push([date,w,...MEASUREMENTS.map(m=>vals[m]||"")])});download(`measurements-${todayKey()}.csv`,rows.map(r=>r.map(csvEscape).join(";")).join("\n"))}
render();
apiGetPlan();
