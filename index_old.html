<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gabriel Training App v2</title>
  <style>
    :root{
      --bg:#080808;--card:#141414;--card2:#1f1f1f;--line:#2c2c2c;--text:#f4f4f5;--muted:#a1a1aa;
      --green:#22c55e;--greenBg:#052e16;--red:#ef4444;--redBg:#450a0a;--gold:#f59e0b;--goldBg:#422006;
      --blue:#60a5fa;--blueBg:#0b2a4a;--accent:#f4f4f5;--accentText:#09090b;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input,textarea{font:inherit}
    button{cursor:pointer}
    .app{max-width:560px;margin:0 auto;min-height:100dvh;padding:12px 12px 96px}
    .top{position:sticky;top:0;z-index:20;margin:-12px -12px 12px;padding:14px 12px 10px;background:rgba(8,8,8,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:800}
    h1{font-size:22px;line-height:1.1;margin:3px 0 2px}
    h2{font-size:20px;margin:0 0 8px}
    .subtitle{color:var(--muted);font-size:14px}
    .progress{height:8px;background:#262626;border-radius:99px;margin-top:12px;overflow:hidden}
    .progress>div{height:100%;background:var(--accent);border-radius:99px;width:0%;transition:.25s}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0 12px}
    .tab{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:18px;padding:9px 6px;font-size:12px}
    .tab.active{background:var(--accent);color:var(--accentText);border-color:var(--accent)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between}
    .pill{display:inline-flex;align-items:center;border-radius:999px;background:var(--card2);padding:5px 10px;color:var(--muted);font-size:12px}
    .exercise-title{font-size:28px;line-height:1.05;margin:6px 0 12px;font-weight:950}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
    .stat{background:#090909;border-radius:18px;padding:12px;text-align:center}
    .stat small{display:block;color:var(--muted);font-size:11px;margin-bottom:3px}
    .stat strong{font-size:15px}
    .note{background:var(--card2);border-radius:18px;padding:12px;color:#e5e5e5;font-size:14px;line-height:1.35;margin:12px 0}
    .embed{position:relative;width:100%;aspect-ratio:16/9;border-radius:20px;overflow:hidden;background:#000;border:1px solid var(--line);margin:12px 0}
    .embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
    .set{border:1px solid var(--line);background:#090909;border-radius:24px;padding:12px;margin:10px 0}
    .set.done{border-color:#166534;background:rgba(20,83,45,.28)}
    .set-head{display:flex;justify-content:space-between;gap:8px;font-weight:800;margin-bottom:8px}
    .inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    label.small{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}
    input,textarea{width:100%;background:var(--card2);color:var(--text);border:1px solid #3a3a3a;border-radius:16px;outline:none}
    input{font-size:20px;font-weight:850;text-align:center;padding:12px 6px}
    textarea{min-height:74px;padding:12px;resize:vertical}
    .btn{border:0;border-radius:18px;padding:14px 14px;font-weight:850;background:var(--accent);color:var(--accentText)}
    .btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--line)}
    .btn.danger{background:#7f1d1d;color:white}
    .btn.good{background:#14532d;color:white}
    .btn.full{width:100%}
    .btn.tiny{padding:4px 8px;border-radius:999px;font-size:12px}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .timer{background:#050505;border:1px solid var(--line);border-radius:26px;padding:16px;text-align:center;margin:12px 0}
    .timer .time{font-size:52px;font-weight:950;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
    .list{display:grid;gap:10px}
    .workouts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .item{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:14px;color:var(--text)}
    .item .meta{font-size:12px;color:var(--muted);margin-bottom:3px}
    .measure-row{display:flex;align-items:center;gap:12px;background:#090909;border:1px solid var(--line);border-radius:24px;padding:12px;margin-bottom:10px}
    .measure-row span{width:86px;font-weight:900}
    .measure-row input{text-align:right;font-size:24px;padding-right:14px}
    .bottomNav{position:fixed;left:0;right:0;bottom:0;background:rgba(8,8,8,.96);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));}
    .bottomInner{max-width:560px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .empty{border:1px dashed #444;border-radius:24px;padding:32px;text-align:center;color:var(--muted)}
    .log{font-size:13px;line-height:1.35;margin-bottom:10px}
    .log-row{display:flex;justify-content:space-between;gap:8px;border-top:1px solid #272727;padding-top:6px;margin-top:6px}
    .hidden{display:none!important}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
    .kpi{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:12px;text-align:center}
    .kpi strong{display:block;font-size:24px}
    .calendar{display:grid;gap:12px}
    .weekCard{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:12px}
    .weekHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .days{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
    .dayBtn{min-height:104px;text-align:left;border-radius:20px;border:1px solid var(--line);padding:9px;color:var(--text);background:#111}
    .dayBtn .date{font-size:12px;color:#ddd}
    .dayBtn .name{font-size:13px;font-weight:900;line-height:1.1;margin-top:4px}
    .dayBtn .bar{height:6px;border-radius:999px;background:rgba(255,255,255,.18);margin-top:8px;overflow:hidden}
    .dayBtn .bar div{height:100%;border-radius:999px;background:white;width:0%}
    .status-done{background:var(--greenBg);border-color:#166534}
    .status-due{background:var(--goldBg);border-color:#92400e}
    .status-missed{background:var(--redBg);border-color:#991b1b}
    .status-future{background:#111827;border-color:#374151}
    .legend{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 14px}
    .legend span{font-size:12px;color:#ddd;border:1px solid var(--line);border-radius:999px;padding:5px 8px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:50;display:flex;align-items:flex-end;padding:12px}
    .modal .panel{max-width:560px;width:100%;max-height:86dvh;overflow:auto;margin:0 auto;background:#111;border:1px solid var(--line);border-radius:28px;padding:16px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border-bottom:1px solid #333;padding:9px;text-align:left;vertical-align:top}
    th{color:#fff}
    .back{margin-bottom:10px}
    @media(min-width:700px){.modal{align-items:center}.days{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="row">
        <div>
          <div class="eyebrow">Gabriel Training</div>
          <h1 id="headerTitle">Plan treningowy</h1>
          <div class="subtitle" id="headerSub">Start: wtorek 12.05.2026</div>
        </div>
        <button class="btn secondary hidden" id="exitSessionBtn" onclick="exitSession()">Kalendarz</button>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-view="train" onclick="setView('train')">🏋️<br>Trening</button>
      <button class="tab" data-view="plan" onclick="setView('plan')">📋<br>Plan</button>
      <button class="tab" data-view="measure" onclick="setView('measure')">📏<br>Pomiary</button>
      <button class="tab" data-view="history" onclick="setView('history')">📤<br>Log</button>
    </nav>

    <main id="view"></main>
  </div>

  <div class="bottomNav hidden" id="bottomNav">
    <div class="bottomInner">
      <button class="btn secondary" onclick="prevExercise()">← Wstecz</button>
      <button class="btn" onclick="nextExercise()">Następne →</button>
    </div>
  </div>

  <div id="modalRoot"></div>

<script>
const SHEET_ID = "1yG5arDzehsa7ipmj9f_nw8CbiDrzNW71eXYjOhfw9EI";
const START_DATE = "2026-05-12";
const TOTAL_WEEKS = 9; // wywnioskowane z kolumn Tydzień 1–9 w arkuszu Plan
const DAYS = [
  {dow:"wt.", workoutId:1, offset:0},
  {dow:"czw.", workoutId:2, offset:2},
  {dow:"sob.", workoutId:3, offset:4},
  {dow:"ndz.", workoutId:4, offset:5},
];

const VIDEOS = {
  "Dynamiczny Warm-up na dolne partie ciala":"https://youtu.be/LDSMptYXAw4",
  "Dynamiczny Warm-up na dolne partie ciała":"https://youtu.be/LDSMptYXAw4",
  "Dynamiczny Warm-up na górne partie ciala":"https://youtu.be/f2gf1Pu73gs",
  "Dynamiczny Warm-up na górne partie ciała":"https://youtu.be/f2gf1Pu73gs",
  "Cool Down + Stretch na dolne partie ciala":"https://youtu.be/DvJtgLcNPEo",
  "Cool Down + Stretch na górne partie ciala":"https://youtu.be/0ZkuKwjyWtI",
  "Full Body Active Flexibility Routine":"https://youtu.be/aUm3qE2dvB8?si=eDNTv9M_Agt105EA"
};

const RPE = [
  ["10","Maksimum. Więcej nie dasz rady. Koniec.","0"],
  ["9.5","Bardzo ciężko. Może jedno powtórzenie by weszło.","0–1"],
  ["9","Bardzo ciężko, ale jedno powtórzenie jeszcze da się zrobić.","1"],
  ["8.5","Ciężko, może 1–2 jeszcze by się udało.","1–2"],
  ["8","Mocno, ale kontrolujesz. 2 powtórzenia w zapasie.","2"],
  ["7","Średnio ciężko. 3 powtórzenia w zapasie.","3"],
  ["6","Lekko. Mógłbyś robić i robić.","4+"],
  ["5 i mniej","Bardzo lekko. Rozgrzewka.","Dużo"],
];

const PLAN = [
  { id:1, name:"1 TRENING", focus:"Dół + klatka + core", exercises:[
    {no:"1",name:"Orbitrek",sets:1,reps:"12 min",rest:"-",notes:"7 minut do przodu, 5 minut do tyłu",type:"time"},
    {no:"1a",name:"Dynamiczny Warm-up na dolne partie ciała",sets:1,reps:"-",rest:"-",notes:"W rozpisce №1",type:"warmup"},
    {no:"2",name:"Bulgary z sztangą",sets:"wg tygodnia",reps:"wg tygodnia",rest:"2–3 min",notes:"wg rozpiski",type:"strength",progressionKey:"Bulgary"},
    {no:"3",name:"Trenażer na odwodzenie",sets:3,reps:"10–15",rest:"1 min",notes:"Superseria 1 min rest.",type:"accessory"},
    {no:"3b",name:"Trenażer na przywodzenie",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"4",name:"Larsen Press",sets:"wg tygodnia",reps:"wg tygodnia",rest:"2–3 min",notes:"wg rozpiski",type:"strength",mainLift:"Larsen Press"},
    {no:"5",name:"Rozpiętki hantlami na skośnej ławce",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"6",name:"Biceps z hantlami",sets:3,reps:"10–15",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"7",name:"Bird Dog",sets:3,reps:"10",rest:"1 min",notes:"Superseria 1 min rest.",type:"core"},
    {no:"7b",name:"Brzuch — spięcia",sets:3,reps:"15–20",rest:"1 min",notes:"Po Bird Dog",type:"core"},
  ]},
  { id:2, name:"2 TRENING", focus:"Plecy + barki + tył", exercises:[
    {no:"1",name:"Orbitrek",sets:1,reps:"12 min",rest:"-",notes:"7 minut do przodu, 5 minut do tyłu",type:"time"},
    {no:"1a",name:"Dynamiczny Warm-up na dolne partie ciała",sets:1,reps:"-",rest:"-",notes:"W rozpisce №1",type:"warmup"},
    {no:"2",name:"RDL",sets:"wg tygodnia",reps:"wg tygodnia",rest:"2–3 min",notes:"wg rozpiski",type:"strength",mainLift:"RDL"},
    {no:"3",name:"Podciąganie",sets:3,reps:"5–8",rest:"2 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"4",name:"Wyciąg górny szerokim chwytem",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"5",name:"DB Pullover",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"6",name:"Maszyna siedząco na barki",sets:3,reps:"10–15",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"7",name:"Tył barku hantlem",sets:3,reps:"10–15",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"8",name:"Hiperextension",sets:3,reps:"10",rest:"1 min",notes:"Superseria 1 min rest.",type:"core"},
    {no:"8b",name:"Dead Bug",sets:3,reps:"15–20",rest:"1 min",notes:"Po Hiperextension",type:"core"},
  ]},
  { id:3, name:"3 TRENING", focus:"Góra + push + core", exercises:[
    {no:"1",name:"Orbitrek",sets:1,reps:"12 min",rest:"-",notes:"7 minut do przodu, 5 minut do tyłu",type:"time"},
    {no:"1a",name:"Dynamiczny Warm-up na górne partie ciała",sets:1,reps:"-",rest:"-",notes:"W rozpisce №1",type:"warmup"},
    {no:"2",name:"Bench Press",sets:"wg tygodnia",reps:"wg tygodnia",rest:"2–3 min",notes:"wg rozpiski",type:"strength",mainLift:"Bench Press"},
    {no:"3",name:"Pompki z ciężarem",sets:"wg tygodnia",reps:"wg tygodnia",rest:"2–3 min",notes:"wg rozpiski",type:"strength",progressionKey:"Pompki"},
    {no:"4",name:"Francuz hantlami",sets:3,reps:"10–15",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"5",name:"Hip Thrust ze sztangą",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"6",name:"Trenażer na dwójki",sets:3,reps:"10–12",rest:"1 min",notes:"tempo 2200, progresja liniowa",type:"accessory"},
    {no:"7",name:"Planki bokiem",sets:3,reps:"10",rest:"1 min",notes:"Superseria 1 min rest.",type:"core"},
    {no:"7b",name:"Brzuch Y",sets:3,reps:"15–20",rest:"1 min",notes:"Po plankach",type:"core"},
  ]},
  { id:4, name:"4 TRENING", focus:"Cardio + mobilność", exercises:[
    {no:"1",name:"Cardio — rower",sets:1,reps:"30 min",rest:"-",notes:"const. 30 min, avg. HB 125, avg. 126W",type:"time"},
    {no:"2",name:"Rolowanie",sets:1,reps:"15–20 min",rest:"-",notes:"ROBIĆ!!!! To też trening.",type:"mobility"},
    {no:"3",name:"Full Body Active Flexibility Routine",sets:1,reps:"-",rest:"-",notes:"W rozpisce №1",type:"mobility"},
  ]}
];

const MAIN_MAX = {"Bench Press":80,"Larsen Press":70,"RDL":100};
const WEEK_PROGRESSIONS = {
  1:{main:[[.65,5],[.75,5],[.85,"5+"],[.65,5,3]],bulgary:[4,10],pompki:[4,10]},
  2:{main:[[.70,5],[.80,5],[.90,"3+"],[.675,5,3]],bulgary:[4,8],pompki:[4,8]},
  3:{main:[[.75,5],[.85,3],[.95,"1+"],[.70,5,3]],bulgary:[4,6],pompki:[4,6]},
  4:{main:[[.40,5],[.50,5],[.60,5]],bulgary:[3,10,"Deload"],pompki:[3,10,"Deload"]},
};
const MEASUREMENTS = ["Udo","Dupa","Brzuch","Klatka","Biceps","Szyja","Waga"];

let state = load("gabriel.training.v2", {
  view:"train", mode:"calendar", activeSessionId:null, workoutId:1, week:1, exerciseIndex:0,
  logs:{}, measurements:{}, notes:{}, finishedSessions:{}
});
let restSeconds = 0;
let timerId = null;

function load(k, fallback){ try { return JSON.parse(localStorage.getItem(k)) || fallback } catch { return fallback } }
function save(){ localStorage.setItem("gabriel.training.v2", JSON.stringify(state)); }
function todayKey(){ return new Date().toISOString().slice(0,10); }
function dateObj(iso){ const [y,m,d]=iso.split("-").map(Number); return new Date(y,m-1,d); }
function isoDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function addDays(iso, days){ const d=dateObj(iso); d.setDate(d.getDate()+days); return isoDate(d); }
function formatPL(iso){ return dateObj(iso).toLocaleDateString("pl-PL",{weekday:"short", day:"2-digit", month:"2-digit"}); }
function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }
function roundTo2_5(x){ return Math.floor(x/2.5)*2.5; }

function schedule(){
  const out=[];
  for(let week=1; week<=TOTAL_WEEKS; week++){
    for(const d of DAYS){
      const date = addDays(START_DATE, (week-1)*7 + d.offset);
      out.push({id:`W${week}T${d.workoutId}`, week, date, workoutId:d.workoutId, dow:d.dow});
    }
  }
  return out;
}
function currentSession(){ return schedule().find(s=>s.id===state.activeSessionId) || schedule()[0]; }
function workout(id=state.workoutId){ return PLAN.find(w=>w.id===id) || PLAN[0]; }
function exercise(){ const w=workout(); return w.exercises[Math.min(state.exerciseIndex,w.exercises.length-1)]; }
function exerciseKey(ex=exercise()){ const s=currentSession(); return `${s.date}__${s.id}__E${ex.no}`; }
function sessionExerciseKeys(sess=currentSession()){
  const w=workout(sess.workoutId);
  return w.exercises.map(ex=>`${sess.date}__${sess.id}__E${ex.no}`);
}
function setSession(sess){
  state.activeSessionId=sess.id; state.workoutId=sess.workoutId; state.week=sess.week; state.exerciseIndex=0; state.mode="session"; state.view="train"; render();
}
function sessionProgress(sess){
  const keys=sessionExerciseKeys(sess);
  const w=workout(sess.workoutId);
  let doneExercises=0, totalExercises=w.exercises.length;
  keys.forEach((k,i)=>{
    const sets=state.logs[k];
    if(sets && sets.some(s=>s.done)) doneExercises++;
  });
  if(state.finishedSessions[sess.id]) return 100;
  return Math.round(doneExercises/Math.max(1,totalExercises)*100);
}
function sessionStatus(sess){
  if(state.finishedSessions[sess.id]) return "done";
  if(sess.date < todayKey()) return "missed";
  if(sess.date === todayKey()) return "due";
  return "future";
}
function statusLabel(st){ return st==="done"?"zrobiony":st==="missed"?"pominięty":st==="due"?"dzisiaj":"do zrobienia"; }

function targetForExercise(ex){
  const pg = WEEK_PROGRESSIONS[((state.week-1)%4)+1] || WEEK_PROGRESSIONS[1];
  if(ex.mainLift && MAIN_MAX[ex.mainLift]){
    return pg.main.map((row,i)=>{
      const [pct,reps,fslSets] = row;
      return {label:fslSets?`FSL ${fslSets}×`:`Seria ${i+1}`, kg:roundTo2_5(MAIN_MAX[ex.mainLift]*pct), reps};
    });
  }
  if(ex.progressionKey==="Bulgary") return [{label:pg.bulgary[2]||"Plan", sets:pg.bulgary[0], reps:pg.bulgary[1], kg:""}];
  if(ex.progressionKey==="Pompki") return [{label:pg.pompki[2]||"Plan", sets:pg.pompki[0], reps:pg.pompki[1], kg:""}];
  return [{label:"Plan", sets:ex.sets, reps:ex.reps, kg:""}];
}
function defaultSets(ex){
  const targets = targetForExercise(ex);
  if(ex.mainLift){
    return targets.flatMap(t=>{
      const count = String(t.label).startsWith("FSL") ? 3 : 1;
      return Array.from({length:count},(_,i)=>({id:uid(), note:i?`${t.label} ${i+1}`:t.label, kg:String(t.kg), reps:String(t.reps).replace("+",""), rpe:"", done:false, freeNote:""}));
    });
  }
  const count = Number(targets[0]?.sets || ex.sets || 1) || 1;
  return Array.from({length:count},(_,i)=>({id:uid(), note:`Seria ${i+1}`, kg:"", reps:String(targets[0]?.reps || ex.reps || ""), rpe:"", done:false, freeNote:""}));
}
function setsFor(ex=exercise()){
  const key = exerciseKey(ex);
  if(!state.logs[key]) state.logs[key] = defaultSets(ex);
  return state.logs[key];
}
function render(){
  save();
  const sess = currentSession(), w=workout(sess.workoutId);
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===state.view));
  document.getElementById("exitSessionBtn").classList.toggle("hidden", !(state.view==="train" && state.mode==="session"));
  document.getElementById("bottomNav").classList.toggle("hidden", !(state.view==="train" && state.mode==="session"));
  if(state.view==="train" && state.mode==="session"){
    document.getElementById("headerTitle").textContent = `${w.name} · ${formatPL(sess.date)}`;
    document.getElementById("headerSub").textContent = `Tydzień ${sess.week} · ${w.focus}`;
  } else {
    document.getElementById("headerTitle").textContent = state.view==="plan" ? "Rozpiska planu" : state.view==="measure" ? "Pomiary" : state.view==="history" ? "Log i eksport" : "Kalendarz treningów";
    document.getElementById("headerSub").textContent = `Plan ${TOTAL_WEEKS} tygodni · start 12.05.2026`;
  }
  const progress = state.view==="train" && state.mode==="session" ? sessionProgress(sess) : overallProgress();
  document.getElementById("progressBar").style.width = `${progress}%`;

  if(state.view==="train" && state.mode==="calendar") renderCalendar();
  if(state.view==="train" && state.mode==="session") renderSession();
  if(state.view==="plan") renderPlan();
  if(state.view==="measure") renderMeasurements();
  if(state.view==="history") renderHistory();
}
function overallProgress(){
  const s=schedule(); return Math.round(s.filter(x=>state.finishedSessions[x.id]).length / s.length * 100);
}
function renderCalendar(){
  const s=schedule();
  const done=s.filter(x=>sessionStatus(x)==="done").length;
  const missed=s.filter(x=>sessionStatus(x)==="missed").length;
  const left=s.length-done-missed;
  let html = `
    <div class="summary">
      <div class="kpi"><strong>${done}</strong><span class="subtitle">zrobione</span></div>
      <div class="kpi"><strong>${missed}</strong><span class="subtitle">pominięte</span></div>
      <div class="kpi"><strong>${left}</strong><span class="subtitle">przed Tobą</span></div>
    </div>
    <div class="legend"><span>🟡 do zrobienia</span><span>🟢 zrobiony</span><span>🔴 po dacie</span><span>🔵 przyszły</span></div>
    <div class="calendar">
  `;
  for(let week=1; week<=TOTAL_WEEKS; week++){
    const items=s.filter(x=>x.week===week);
    html += `<section class="weekCard"><div class="weekHead"><strong>Tydzień ${week}</strong><span class="subtitle">${formatPL(items[0].date)} – ${formatPL(items[3].date)}</span></div><div class="days">`;
    for(const it of items){
      const st=sessionStatus(it), prog=sessionProgress(it), wo=workout(it.workoutId);
      html += `<button class="dayBtn status-${st}" onclick='setSession(${JSON.stringify(it)})'>
        <div class="date">${it.dow} ${formatPL(it.date).replace(/^...,\s*/,"")}</div>
        <div class="name">${wo.name.replace(" TRENING","")}</div>
        <div class="subtitle">${statusLabel(st)}</div>
        <div class="bar"><div style="width:${prog}%"></div></div>
        <div class="subtitle">${prog}%</div>
      </button>`;
    }
    html += `</div></section>`;
  }
  html += `</div>`;
  document.getElementById("view").innerHTML = html;
}
function renderSession(){
  const w=workout(), ex=exercise(), sets=setsFor(ex);
  const video = VIDEOS[ex.name] || ex.link;
  document.getElementById("view").innerHTML = `
    <button class="btn secondary back" onclick="exitSession()">← Wróć do kalendarza</button>
    <section class="card">
      <div class="row">
        <div>
          <div class="subtitle">Ćwiczenie ${state.exerciseIndex+1}/${w.exercises.length} · nr ${esc(ex.no)}</div>
          <div class="exercise-title">${esc(ex.name)}</div>
        </div>
        <span class="pill">${esc(ex.type)}</span>
      </div>
      <div class="stats">
        <div class="stat"><small>Serie</small><strong>${esc(ex.sets)}</strong></div>
        <div class="stat"><small>Reps</small><strong>${esc(ex.reps)}</strong></div>
        <div class="stat"><small>Przerwa</small><strong>${esc(ex.rest)}</strong></div>
      </div>
      ${video ? embedHTML(video) : ""}
      <div class="note"><strong>Uwagi trenera</strong><br>${esc(ex.notes || "Brak uwag")}</div>
      <div id="timerBox"></div>
      <div id="setsBox">${sets.map((s,i)=>setHTML(s,i)).join("")}</div>
      <div class="actions">
        <button class="btn secondary" onclick="addSet()">+ Seria</button>
        <button class="btn secondary" onclick="removeSet()">− Usuń</button>
      </div>
      <textarea style="margin-top:12px" placeholder="Notatka do ćwiczenia / samopoczucie" oninput="saveExerciseNote(this.value)">${esc(state.notes[exerciseKey()]||"")}</textarea>
      <button class="btn good full" style="margin-top:12px" onclick="finishSession()">Zakończ cały trening ✓</button>
    </section>
  `;
  renderTimer();
}
function youtubeId(url){
  const s=String(url);
  let m=s.match(/youtu\.be\/([^?&]+)/); if(m) return m[1];
  m=s.match(/[?&]v=([^?&]+)/); if(m) return m[1];
  m=s.match(/youtube\.com\/embed\/([^?&]+)/); if(m) return m[1];
  return null;
}
function embedHTML(url){
  const id=youtubeId(url);
  if(!id) return `<a class="note" href="${esc(url)}" target="_blank">Otwórz film</a>`;
  return `<div class="embed"><iframe src="https://www.youtube-nocookie.com/embed/${esc(id)}" title="Film instruktażowy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>`;
}
function setHTML(s,i){
  return `
    <div class="set ${s.done?"done":""}">
      <div class="set-head"><span>${esc(s.note || `Seria ${i+1}`)}</span><span>${s.done?"✓":""}</span></div>
      <div class="inputs">
        <div><label class="small">kg</label><input inputmode="decimal" value="${esc(s.kg)}" oninput="updateSet('${s.id}','kg',this.value)"></div>
        <div><label class="small">reps</label><input inputmode="numeric" value="${esc(s.reps)}" oninput="updateSet('${s.id}','reps',this.value)"></div>
        <div><label class="small">RPE <button class="btn secondary tiny" type="button" onclick="showRPE()">?</button></label><input inputmode="decimal" value="${esc(s.rpe)}" oninput="updateSet('${s.id}','rpe',this.value)"></div>
      </div>
      <input style="margin-top:8px;font-size:14px;font-weight:500;text-align:left;padding:12px" placeholder="Notatka do serii" value="${esc(s.freeNote||"")}" oninput="updateSet('${s.id}','freeNote',this.value)">
      <button class="btn ${s.done?"secondary":"good"} full" style="margin-top:10px" onclick="toggleSet('${s.id}')">${s.done?"Cofnij zaliczenie":"Zalicz serię"}</button>
    </div>
  `;
}
function renderTimer(){
  const box=document.getElementById("timerBox");
  if(!box) return;
  if(restSeconds<=0){ box.innerHTML=""; return; }
  const m=String(Math.floor(restSeconds/60)).padStart(2,"0");
  const s=String(restSeconds%60).padStart(2,"0");
  box.innerHTML = `<div class="timer"><div class="subtitle">⏱ Przerwa</div><div class="time">${m}:${s}</div><div class="actions"><button class="btn secondary" onclick="toggleTimer()">${timerId?"Pauza":"Start"}</button><button class="btn secondary" onclick="clearTimer()">Wyczyść</button></div></div>`;
}
function renderPlan(){
  let html = `<div class="workouts">${PLAN.map(w=>`<button class="btn secondary" onclick="showPlanWorkout(${w.id})"><strong>${w.name}</strong><br><span class="subtitle">${w.focus}</span></button>`).join("")}</div><div id="planDetails"></div>`;
  document.getElementById("view").innerHTML = html;
  showPlanWorkout(state.planPreviewId || 1);
}
function showPlanWorkout(id){
  state.planPreviewId=id; save();
  const w=workout(id);
  const el=document.getElementById("planDetails");
  if(!el) return;
  el.innerHTML = `<section class="card"><h2>${w.name}</h2><div class="subtitle" style="margin-bottom:12px">${w.focus}. To jest tylko podgląd rozpiski — nie uruchamia treningu.</div><div class="list">${w.exercises.map(ex=>`
    <div class="item">
      <div class="meta">${esc(ex.no)} · ${esc(ex.type)}</div>
      <strong>${esc(ex.name)}</strong>
      <div class="subtitle">${esc(ex.sets)} × ${esc(ex.reps)} · ${esc(ex.rest)}</div>
      <div class="subtitle">${esc(ex.notes || "")}</div>
    </div>`).join("")}</div></section>`;
}
function renderMeasurements(){
  const key=`${todayKey()}__W${state.week}`;
  const vals=state.measurements[key] || {};
  document.getElementById("view").innerHTML = `
    <section class="card">
      <h2>Pomiary i waga</h2>
      <div class="subtitle" style="margin-bottom:14px">Data ${todayKey()} · tydzień ${state.week}</div>
      ${MEASUREMENTS.map(m=>`
        <label class="measure-row"><span>${m}</span><input inputmode="decimal" placeholder="${m==="Waga"?"kg":"cm"}" value="${esc(vals[m]||"")}" oninput="setMeasurement('${m}',this.value)"></label>
      `).join("")}
      <button class="btn full" onclick="exportMeasurementsCSV()">Eksportuj pomiary CSV</button>
    </section>
  `;
}
function renderHistory(){
  const keys=Object.keys(state.logs).reverse();
  document.getElementById("view").innerHTML = `
    <section class="card" style="margin-bottom:12px">
      <h2>Eksport dla trenera</h2>
      <p class="subtitle">Na razie zapis do arkusza jest przygotowany logicznie, ale bez endpointu Google Apps Script aplikacja nie może pisać do komórek. Publiczny link daje tylko odczyt.</p>
      <button class="btn full" onclick="exportWorkoutCSV()">Eksportuj log treningu CSV</button>
      <button class="btn secondary full" style="margin-top:8px" onclick="exportPayloadJSON()">Eksportuj JSON pod Apps Script</button>
    </section>
    ${keys.length ? keys.map(k=>logHTML(k,state.logs[k])).join("") : `<div class="empty">Brak zapisanych serii.</div>`}
  `;
}
function logHTML(key,sets){
  return `<div class="card log"><div class="subtitle">${esc(key)}</div>${sets.map((s,i)=>`<div class="log-row"><span>${i+1}. ${esc(s.note)}</span><strong>${esc(s.kg||"-")} kg × ${esc(s.reps||"-")} ${s.rpe?`RPE ${esc(s.rpe)}`:""}</strong></div>`).join("")}</div>`;
}

function setView(v){ state.view=v; if(v!=="train") state.mode="calendar"; render(); }
function exitSession(){ state.mode="calendar"; clearTimer(false); render(); }
function saveExerciseNote(v){ state.notes[exerciseKey()] = v; save(); }
function updateSet(id,field,value){
  const sets=setsFor(); const s=sets.find(x=>x.id===id); if(s) s[field]=value; save();
}
function toggleSet(id){
  const sets=setsFor(); const s=sets.find(x=>x.id===id); if(!s) return;
  s.done = !s.done; if(s.done) startRestFromExercise(); render();
}
function addSet(){ setsFor().push({id:uid(),note:`Seria ${setsFor().length+1}`,kg:"",reps:"",rpe:"",done:false,freeNote:""}); render(); }
function removeSet(){ const sets=setsFor(); if(sets.length>1) sets.pop(); render(); }
function nextExercise(){ const w=workout(); state.exerciseIndex=Math.min(w.exercises.length-1,state.exerciseIndex+1); clearTimer(false); render(); }
function prevExercise(){ state.exerciseIndex=Math.max(0,state.exerciseIndex-1); clearTimer(false); render(); }
function finishSession(){ state.finishedSessions[currentSession().id] = {date:todayKey(), at:new Date().toISOString()}; render(); }
function startRestFromExercise(){
  const ex=exercise(); const match=String(ex.rest||"").match(/(\d+)/);
  if(match){ restSeconds=Number(match[1])*60; startTimer(); }
}
function startTimer(){
  if(timerId) clearInterval(timerId);
  timerId=setInterval(()=>{ restSeconds=Math.max(0,restSeconds-1); if(restSeconds===0) clearTimer(false); renderTimer(); },1000);
}
function toggleTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } else { startTimer(); } renderTimer(); }
function clearTimer(doRender=true){ if(timerId) clearInterval(timerId); timerId=null; restSeconds=0; if(doRender) renderTimer(); }
function setMeasurement(name,value){
  const key=`${todayKey()}__W${state.week}`;
  state.measurements[key] = state.measurements[key] || {};
  state.measurements[key][name] = value; save();
}
function showRPE(){
  document.getElementById("modalRoot").innerHTML = `<div class="modal" onclick="closeModal(event)"><div class="panel" onclick="event.stopPropagation()">
    <div class="row"><h2>Tabela RPE</h2><button class="btn secondary" onclick="hideModal()">Zamknij</button></div>
    <table><thead><tr><th>RPE</th><th>Jak to odczuwasz?</th><th>Powtórzeń w zapasie</th></tr></thead><tbody>
    ${RPE.map(r=>`<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join("")}
    </tbody></table>
  </div></div>`;
}
function hideModal(){ document.getElementById("modalRoot").innerHTML=""; }
function closeModal(e){ if(e.target.classList.contains("modal")) hideModal(); }

function csvEscape(v){ const s=String(v??""); return /[";\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; }
function download(name,text,type="text/csv;charset=utf-8"){
  const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url);
}
function exportWorkoutCSV(){
  const rows=[["date","session_id","week","workout","exercise_no","exercise","set","planned","kg","reps","rpe","done","note"]];
  Object.entries(state.logs).forEach(([key,sets])=>{
    const [date,sessionId,ePart]=key.split("__");
    const sess=schedule().find(s=>s.id===sessionId);
    const wo=workout(sess?.workoutId || 1);
    const exNo=(ePart||"").replace("E","");
    const ex=wo.exercises.find(x=>String(x.no)===String(exNo));
    sets.forEach((s,i)=>rows.push([date,sessionId,sess?.week||"",wo.name,exNo,ex?.name||"",i+1,s.note||"",s.kg,s.reps,s.rpe,s.done?1:0,s.freeNote||""]));
  });
  download(`workout-log-${todayKey()}.csv`, rows.map(r=>r.map(csvEscape).join(";")).join("\n"));
}
function exportMeasurementsCSV(){
  const rows=[["date","week",...MEASUREMENTS]];
  Object.entries(state.measurements).forEach(([key,vals])=>{
    const [date,w]=key.split("__W"); rows.push([date,w,...MEASUREMENTS.map(m=>vals[m]||"")]);
  });
  download(`measurements-${todayKey()}.csv`, rows.map(r=>r.map(csvEscape).join(";")).join("\n"));
}
function exportPayloadJSON(){
  const payload={sheetId:SHEET_ID, version:2, exportedAt:new Date().toISOString(), state};
  download(`training-payload-${todayKey()}.json`, JSON.stringify(payload,null,2), "application/json;charset=utf-8");
}

render();
</script>
</body>
</html>
